---
# Canary Deployment Configuration
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: hootner-frontend-canary
  namespace: hootner
spec:
  hosts:
    - hootner-frontend
  http:
    # Route 10% traffic to green (canary)
    - match:
        - headers:
            canary:
              exact: "always"
      route:
        - destination:
            host: hootner-frontend
            subset: green
          weight: 100
    # Progressive canary rollout
    - route:
        - destination:
            host: hootner-frontend
            subset: blue
          weight: 90
        - destination:
            host: hootner-frontend
            subset: green
          weight: 10

---
# Mirror Traffic to Green (Shadow Deployment)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: hootner-frontend-shadow
  namespace: hootner
spec:
  hosts:
    - hootner-frontend
  http:
    - route:
        - destination:
            host: hootner-frontend
            subset: blue
          weight: 100
      mirror:
        host: hootner-frontend
        subset: green
      mirrorPercentage:
        value: 10.0

---
# A/B Testing Configuration
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: hootner-frontend-ab-testing
  namespace: hootner
spec:
  hosts:
    - hootner-frontend
  http:
    # User-based routing
    - match:
        - headers:
            user-group:
              exact: "beta"
      route:
        - destination:
            host: hootner-frontend
            subset: green
    # Location-based routing
    - match:
        - headers:
            x-country:
              exact: "US"
      route:
        - destination:
            host: hootner-frontend
            subset: green
          weight: 50
        - destination:
            host: hootner-frontend
            subset: blue
          weight: 50
    # Default routing
    - route:
        - destination:
            host: hootner-frontend
            subset: blue
          weight: 100
