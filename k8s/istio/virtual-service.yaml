---
# Virtual Service for Blue-Green Deployment
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: hootner-frontend
  namespace: hootner
spec:
  hosts:
    - hootner-frontend
    - hootner.com
    - "*.hootner.com"
  gateways:
    - hootner-gateway
    - mesh
  http:
    - match:
        - headers:
            x-version:
              exact: "green"
      route:
        - destination:
            host: hootner-frontend
            subset: green
          weight: 100
    - match:
        - headers:
            x-version:
              exact: "blue"
      route:
        - destination:
            host: hootner-frontend
            subset: blue
          weight: 100
    - route:
        - destination:
            host: hootner-frontend
            subset: blue
          weight: 90
        - destination:
            host: hootner-frontend
            subset: green
          weight: 10
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: 5xx,reset,connect-failure,refused-stream

---
# Destination Rule for Traffic Splitting
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: hootner-frontend
  namespace: hootner
spec:
  host: hootner-frontend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 2
    loadBalancer:
      simple: LEAST_CONN
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
  subsets:
    - name: blue
      labels:
        version: blue
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            http1MaxPendingRequests: 50
            http2MaxRequests: 100
    - name: green
      labels:
        version: green
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            http1MaxPendingRequests: 50
            http2MaxRequests: 100

---
# Gateway
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: hootner-gateway
  namespace: hootner
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "hootner.com"
        - "*.hootner.com"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "hootner.com"
        - "*.hootner.com"
      tls:
        mode: SIMPLE
        credentialName: hootner-tls-cert

---
# Service Entry for External Services
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-mongodb
  namespace: hootner
spec:
  hosts:
    - mongodb.external.com
  ports:
    - number: 27017
      name: mongodb
      protocol: TCP
  location: MESH_EXTERNAL
  resolution: DNS

---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-redis
  namespace: hootner
spec:
  hosts:
    - redis.external.com
  ports:
    - number: 6379
      name: redis
      protocol: TCP
  location: MESH_EXTERNAL
  resolution: DNS
