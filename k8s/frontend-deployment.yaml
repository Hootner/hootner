---
# Blue Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hootner-frontend-blue
  namespace: hootner
  labels:
    app: hootner-frontend
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hootner-frontend
      version: blue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hootner-frontend
        version: blue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hootner-frontend
      containers:
        - name: frontend
          image: hootner/frontend:blue
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: hootner-config
                  key: api.url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hootner-secrets
                  key: redis.url
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30

