---
# Service
apiVersion: v1
kind: Service
metadata:
  name: hootner-frontend
  namespace: hootner
  labels:
    app: hootner-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: hootner-frontend

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hootner-frontend
  namespace: hootner
