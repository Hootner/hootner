AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HOOTNER - Complete Enterprise Infrastructure (The Big Spiral - 21414 Burst)

Parameters:
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: sk_test_placeholder
    Description: Stripe secret key

Resources:
  # API Gateway
  HootnerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: '''*'''
        AllowHeaders: '''*'''
        AllowOrigin: '''*'''
      EndpointConfiguration: REGIONAL

  HootnerApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: hootner-api-key
      Enabled: true

  HootnerUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: hootner-plan
      ApiStages:
        - ApiId: !Ref HootnerApi
          Stage: prod
      Quota:
        Limit: 10000000
        Period: MONTH
      Throttle:
        RateLimit: 10000
        BurstLimit: 21414

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref HootnerApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref HootnerUsagePlan

  # DynamoDB
  HootnerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hootner-activities
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # Lambda Functions
  GraphQLFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/graphql/
      Handler: lambda.handler
      Runtime: nodejs20.x
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref HootnerTable
          JWT_SECRET_ARN: !Ref JWTSecret
          STRIPE_SECRET_ARN: !Ref StripeKey
          API_SECRETS_ARN: !Ref APISecrets
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HootnerTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref JWTSecret
                - !Ref StripeKey
                - !Ref APISecrets
      Events:
        GraphQL:
          Type: Api
          Properties:
            RestApiId: !Ref HootnerApi
            Path: /graphql
            Method: ANY
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref HootnerApi
            Path: /api/{proxy+}
            Method: ANY

  # Secrets
  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/jwt-secret
      GenerateSecretString:
        PasswordLength: 64

  JWTSecretRotation:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref JWTSecret
      RotationLambdaARN: !GetAtt GraphQLFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  StripeKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/stripe-key
      SecretString: !Sub '{"key": "${StripeSecretKey}"}'

  StripeKeyRotation:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref StripeKey
      RotationLambdaARN: !GetAtt GraphQLFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: 90

  APISecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/api-secrets
      SecretString: !Sub |
        {
          "graphqlEndpoint": "https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/graphql"
        }

  APISecretsRotation:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref APISecrets
      RotationLambdaARN: !GetAtt GraphQLFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  # S3 Buckets
  VideoStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-videos-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedHeaders: ['*']

  VideoStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideoStorageBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${VideoStorageBucket.Arn}/*'
              - !GetAtt VideoStorageBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-uploads-${AWS::AccountId}

  UploadBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${UploadBucket.Arn}/*'
              - !GetAtt UploadBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

  StaticAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-frontend-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: dashboard.html

  # CloudFront
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: Hootner OAI

  StaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticAssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub '${StaticAssetsBucket.Arn}/*'
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${StaticAssetsBucket.Arn}/*'
              - !GetAtt StaticAssetsBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

  CloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticAssetsBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
          - Id: ApiOrigin
            DomainName: !Sub '${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        CacheBehaviors:
          - PathPattern: '/graphql'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            ForwardedValues:
              QueryString: true
              Headers: ['*']
            MinTTL: 0
            DefaultTTL: 0
          - PathPattern: '/api/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            ForwardedValues:
              QueryString: true
              Headers: ['*']
            MinTTL: 0

  # Cognito
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: hootner-users
      AutoVerifiedAttributes: [email]
      Schema:
        - Name: email
          Required: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: hootner-web-app
      GenerateSecret: false

  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      SubnetId: !Ref PublicSubnet

  # Redis
  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Redis access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.0.0.0/16

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Redis subnet group
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      CacheNodeType: cache.t3.micro
      Engine: redis
      NumCacheNodes: 1
      VpcSecurityGroupIds:
        - !Ref RedisSecurityGroup
      CacheSubnetGroupName: !Ref RedisSubnetGroup

  # SQS
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: hootner-dlq

  VideoProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: hootner-video-processing
      VisibilityTimeout: 900
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  # SNS
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: hootner-notifications
      Subscription:
        - Protocol: email
          Endpoint: admin@hootner.com

  # CloudWatch Alarms
  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hootner-api-errors
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref NotificationTopic

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hootner-lambda-throttles
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hootner-dynamodb-throttles
      MetricName: UserErrors
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold

  # EventBridge
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: hootner-events

  VideoUploadRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source: [hootner.videos]
        detail-type: [VideoUploaded]
      Targets:
        - Arn: !GetAtt VideoProcessingQueue.Arn
          Id: ProcessVideo

  # Step Functions
  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole

  VideoTranscodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/graphql/
      Handler: lambda.handler
      Runtime: nodejs20.x

  ThumbnailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/graphql/
      Handler: lambda.handler
      Runtime: nodejs20.x

  VideoProcessingStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: video-processing-workflow
      RoleArn: !GetAtt StepFunctionsRole.Arn
      DefinitionString: !Sub |
        {
          "StartAt": "TranscodeVideo",
          "States": {
            "TranscodeVideo": {
              "Type": "Task",
              "Resource": "${VideoTranscodeFunction.Arn}",
              "Next": "GenerateThumbnail"
            },
            "GenerateThumbnail": {
              "Type": "Task",
              "Resource": "${ThumbnailFunction.Arn}",
              "End": true
            }
          }
        }

Metadata:
  AWS::Composer::Groups:
    FrontendLayer:
      Label: Frontend & CDN
      Members:
        - StaticAssetsBucket
        - CloudFront
        - CloudFrontOAI
        - StaticAssetsBucketPolicy
    ApiLayer:
      Label: API & Gateway
      Members:
        - HootnerApi
        - HootnerApiKey
        - HootnerUsagePlan
        - UsagePlanKey
        - GraphQLFunction
    DataLayer:
      Label: Data Storage
      Members:
        - HootnerTable
        - VideoStorageBucket
        - UploadBucket
        - RedisCluster
        - RedisSecurityGroup
        - RedisSubnetGroup
    AuthLayer:
      Label: Authentication
      Members:
        - UserPool
        - UserPoolClient
        - JWTSecret
        - StripeKey
        - APISecrets
    NetworkLayer:
      Label: Network & VPC
      Members:
        - VPC
        - PublicSubnet
        - PrivateSubnet1
        - PrivateSubnet2
        - InternetGateway
        - AttachGateway
        - EIP
        - NATGateway
    MonitoringLayer:
      Label: Monitoring & Alerts
      Members:
        - ApiErrorAlarm
        - LambdaThrottleAlarm
        - DynamoDBThrottleAlarm
        - NotificationTopic
    ProcessingLayer:
      Label: Async Processing
      Members:
        - VideoProcessingQueue
        - DeadLetterQueue
        - EventBus
        - VideoUploadRule
        - VideoProcessingStateMachine
        - StepFunctionsRole
        - VideoTranscodeFunction
        - ThumbnailFunction

Outputs:
  ApiGatewayKey:
    Description: API Gateway Key
    Value: !Ref HootnerApiKey
    Export:
      Name: HootnerApiKey

  ApiEndpoint:
    Description: API Gateway Endpoint
    Value: !Sub https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: HootnerApiEndpoint

  GraphQLEndpoint:
    Description: GraphQL Endpoint
    Value: !Sub https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/graphql
    Export:
      Name: HootnerGraphQLEndpoint

  CloudFrontURL:
    Description: CloudFront Distribution URL
    Value: !GetAtt CloudFront.DomainName
    Export:
      Name: HootnerCloudFrontURL

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: HootnerUserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  VideoStorageBucket:
    Description: Video Storage Bucket
    Value: !Ref VideoStorageBucket

  UploadBucket:
    Description: Upload Bucket
    Value: !Ref UploadBucket

  StaticAssetsBucket:
    Description: Frontend Bucket
    Value: !Ref StaticAssetsBucket

  RedisEndpoint:
    Description: Redis Endpoint
    Value: !GetAtt RedisCluster.RedisEndpoint.Address

  VideoProcessingQueueUrl:
    Description: Video Processing Queue URL
    Value: !Ref VideoProcessingQueue

  StateMachineArn:
    Description: Step Functions State Machine ARN
    Value: !Ref VideoProcessingStateMachine
