AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HOOTNER API Keys & Secrets for CloudFront Apps

Resources:
  # API Gateway with API Key
  HootnerApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: hootner-cloudfront-key
      Enabled: true

  HootnerUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: hootner-plan
      ApiStages:
        - ApiId: !Ref HootnerApi
          Stage: prod
      Quota:
        Limit: 100000
        Period: MONTH
      Throttle:
        BurstLimit: 200
        RateLimit: 100

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref HootnerApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref HootnerUsagePlan

  # Secrets Manager - All API Keys
  APISecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/api-keys
      SecretString: !Sub |
        {
          "API_GATEWAY_KEY": "${HootnerApiKey}",
          "GRAPHQL_ENDPOINT": "https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/graphql",
          "JWT_SECRET": "${JWTSecret}",
          "STRIPE_KEY": "${StripeKey}",
          "CLOUDFRONT_DOMAIN": "daxqx65ar35pp.cloudfront.net"
        }

  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/jwt-secret
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: secret
        PasswordLength: 64

  StripeKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/stripe-key
      SecretString: '{"key": "REPLACE_WITH_STRIPE_KEY"}'

  # Lambda Layer for API Keys
  APIKeysLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: hootner-api-keys
      ContentUri: layers/api-keys/
      CompatibleRuntimes:
        - nodejs18.x

  # Environment Config for All Functions
  SharedConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /hootner/config
      Type: String
      Value: !Sub |
        {
          "apiGatewayKey": "${HootnerApiKey}",
          "graphqlEndpoint": "https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/graphql",
          "cloudfrontDomain": "daxqx65ar35pp.cloudfront.net",
          "dynamoTable": "${HootnerTable}",
          "region": "${AWS::Region}"
        }

  # API Gateway
  HootnerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        ApiKeyRequired: true
      Cors:
        AllowOrigin: '''https://daxqx65ar35pp.cloudfront.net'''
        AllowHeaders: '''*'''
        AllowMethods: '''*'''

  # DynamoDB Table
  HootnerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HootnerActivities
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # Lambda Functions with API Key Access
  VideoPlayerFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - HootnerTable
      - APISecrets
      - HootnerApi
      - APIKeysLayer
      - StripeKey
      - JWTSecret
    Properties:
      CodeUri: api/graphql/
      Handler: lambda.handler
      Runtime: nodejs18.x
      Layers:
        - !Ref APIKeysLayer
      Environment:
        Variables:
          API_KEY_SECRET: !Ref APISecrets
          DYNAMODB_TABLE: !Ref HootnerTable
          STRIPE_SECRET: !Ref StripeKey
          JWT_SECRET: !Ref JWTSecret
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HootnerTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref APISecrets
                - !Ref StripeKey
                - !Ref JWTSecret
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref HootnerApi
            Path: /api/videos
            Method: ANY

