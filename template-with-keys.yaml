Outputs:
  ApiGatewayKey:
    Description: API Gateway Key for CloudFront Apps
    Value: !Ref HootnerApiKey
    Export:
      Name: HootnerApiKey

  ApiEndpoint:
    Description: API Gateway Endpoint
    Value: !Sub https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: HootnerApiEndpoint

  GraphQLEndpoint:
    Description: GraphQL Endpoint
    Value: !Sub https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/graphql
    Export:
      Name: HootnerGraphQLEndpoint

  SecretsArn:
    Description: Secrets Manager ARN
    Value: !Ref APISecrets
    Export:
      Name: HootnerSecretsArn

  ConfigParameter:
    Description: SSM Parameter with all config
    Value: !Ref SharedConfig
    Export:
      Name: HootnerConfigParam