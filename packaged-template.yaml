          \ \"label\": \"15% off at 10K users\"},\n  {\"threshold\": 50000, \"discount\"\
          : 0.20, \"label\": \"20% off at 50K users\"},\n  {\"threshold\": 100000,\
          \ \"discount\": 0.25, \"label\": \"25% off at 100K users\"}\n]\n"
  HighUsageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: ${AWS::StackName}-high-usage
      AlarmDescription: Alert when usage exceeds tier limits
      MetricName: ActiveUsers
      Namespace: Hootner
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
      - Ref: AlarmNotificationTopic
  GraphQLPricingPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName:
        Fn::Sub: ${AWS::StackName}-graphql-pricing-access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - lambda:InvokeFunction
          Resource:
          - Fn::GetAtt:
            - PricingCalculatorFunction
            - Arn
          - Fn::GetAtt:
            - UsageTrackingFunction
            - Arn
        - Effect: Allow
          Action:
          - ssm:GetParameter
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/pricing/*
      Roles:
      - Ref: GraphQLFunctionRole
  ApiDeploymentWithStripe:
    Type: AWS::ApiGatewayV2::Deployment
    Properties:
      ApiId:
        Ref: HttpApi
      Description: Production deployment with Stripe webhooks
