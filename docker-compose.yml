version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: test
      MONGO_INITDB_ROOT_PASSWORD: test
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  graphql-api:
    build: ./api/graphql
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis
    environment:
      MONGODB_URI: mongodb://test:test@mongodb:27017/test
      REDIS_URL: redis://redis:6379
      NODE_ENV: development

volumes:
  mongodb_data:
  redis_data: