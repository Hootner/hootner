# HOOTNER Enterprise Platform - Docker Compose
# Production-ready container orchestration

version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: hootner/frontend:latest
    container_name: hootner-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
      - DATABASE_URL=postgresql://hootner:hootner123@postgres:5432/hootner
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
    networks:
      - hootner-network
    depends_on:
      - postgres
      - redis
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # GraphQL API Service
  api:
    build:
      context: ./api/graphql
      dockerfile: Dockerfile
    image: hootner/api:latest
    container_name: hootner-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hootner:hootner123@postgres:5432/hootner
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-jwt-secret-key
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    volumes:
      - ./logs:/app/logs
    networks:
      - hootner-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AI Services
  ai-agents:
    build:
      context: .
      dockerfile: Dockerfile.ai
    image: hootner/ai-agents:latest
    container_name: hootner-ai-agents
    ports:
      - "5001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hootner:hootner123@postgres:5432/hootner
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
      - ai-models:/app/models
    networks:
      - hootner-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.payment
    image: hootner/payment:latest
    container_name: hootner-payment
    ports:
      - "5002:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hootner:hootner123@postgres:5432/hootner
      - REDIS_URL=redis://redis:6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    volumes:
      - ./logs:/app/logs
    networks:
      - hootner-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Performance Monitor
  performance-monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    image: hootner/monitor:latest
    container_name: hootner-monitor
    ports:
      - "5004:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hootner:hootner123@postgres:5432/hootner
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
    networks:
      - hootner-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hootner-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hootner
      - POSTGRES_USER=hootner
      - POSTGRES_PASSWORD=hootner123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - hootner-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hootner -d hootner"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hootner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - hootner-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server /usr/local/etc/redis/redis.conf

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hootner-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    networks:
      - hootner-network
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: hootner-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - hootner-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: hootner-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - hootner-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  hootner-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai-models:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local