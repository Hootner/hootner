<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player Server</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Video Library -->
      <div class="library" id="library">
        <h1>🎬 Video Library</h1>
        <div class="library-controls">
          <input
            type="text"
            id="searchInput"
            placeholder="Search videos..."
            class="search-bar"
          />
          <select id="sortSelect" class="sort-dropdown">
            <option value="title">Sort by Title</option>
            <option value="duration">Sort by Duration</option>
            <option value="added">Sort by Added Date</option>
          </select>
          <button id="uploadBtn" class="upload-btn">📤 Upload Video</button>
          <input
            type="file"
            id="fileUpload"
            accept="video/*"
            style="display: none"
          />
        </div>
        <div class="video-grid" id="videoGrid"></div>
      </div>

      <!-- Video Player -->
      <div class="player-container" id="playerContainer">
        <div class="video-player" id="videoPlayer">
          <div class="play-overlay" id="playOverlay">
            <div class="play-icon">▶</div>
            <div class="video-title" id="videoTitle">
              Select a video to play
            </div>
          </div>

          <video id="video" preload="metadata"></video>
          <div class="loading" id="loading">Loading...</div>

          <div class="controls">
            <div class="progress-container" id="progressContainer">
              <div class="progress-bar" id="progressBar">
                <div class="progress-filled" id="progressFilled"></div>
                <div class="progress-handle" id="progressHandle"></div>
              </div>
            </div>

            <div class="control-buttons">
              <button class="btn play-btn" id="playBtn" title="Play/Pause">
                ▶
              </button>
              <button class="btn" id="rewindBtn" title="Rewind 10s">⏪</button>
              <button class="btn" id="forwardBtn" title="Forward 10s">
                ⏩
              </button>

              <div class="time-display" id="timeDisplay">00:00 / 00:00</div>

              <div class="volume-container">
                <button class="btn" id="volumeBtn" title="Mute/Unmute">
                  🔊
                </button>
                <input
                  type="range"
                  class="volume-slider"
                  id="volumeSlider"
                  min="0"
                  max="100"
                  value="70"
                />
              </div>

              <select
                id="speedSelect"
                class="speed-dropdown"
                title="Playback Speed"
              >
                <option value="1">1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>

              <button
                class="btn fullscreen-btn"
                id="fullscreenBtn"
                title="Fullscreen"
              >
                ⛶
              </button>
            </div>
          </div>
        </div>

        <div class="metadata" id="metadata" style="display: none">
          <p id="videoDesc"></p>
          <span id="videoViews">Views: 0</span> |
          <span id="videoDate">Uploaded: N/A</span>
        </div>

        <div class="recommendations">
          <h3>Next Up</h3>
          <div class="rec-grid" id="recGrid"></div>
        </div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
