<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00ffff" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>HOOTNER — Login</title>

    <!-- Reuse the shared static styling shipped in dist/ -->
    <link rel="stylesheet" href="/styles.css" />

    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(440px, calc(100vw - 40px));
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .brand .mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: rgba(0, 255, 255, 0.18);
        border: 1px solid rgba(0, 255, 255, 0.35);
        display: grid;
        place-items: center;
        font-weight: 800;
        color: #00ffff;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      .sub {
        margin: 6px 0 0;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
      }

      label {
        display: block;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
        margin: 14px 0 8px;
      }

      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
        outline: none;
      }

      input:focus {
        border-color: rgba(0, 255, 255, 0.55);
        box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.12);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        user-select: none;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
      }

      .checkbox input {
        width: 16px;
        height: 16px;
      }

      .btn {
        width: 100%;
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(0, 255, 255, 0.5);
        background: #00ffff;
        color: #000;
        font-weight: 800;
        cursor: pointer;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .link {
        color: #00ffff;
        text-decoration: none;
        font-size: 13px;
      }

      .err {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 80, 80, 0.35);
        background: rgba(255, 80, 80, 0.12);
        color: rgba(255, 255, 255, 0.92);
        display: none;
      }

      .ok {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(0, 255, 0, 0.25);
        background: rgba(0, 255, 0, 0.10);
        color: rgba(255, 255, 255, 0.92);
        display: none;
      }

      .footer {
        margin-top: 14px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
      }

      .kbd {
        padding: 1px 6px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom-color: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(0,0,0,0.25);
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="brand">
        <div class="mark">H</div>
        <div>
          <h1>Sign in to HOOTNER</h1>
          <p class="sub">PWA login page (static) — wire to your auth API when ready.</p>
        </div>
      </div>

      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <div class="row">
          <label class="checkbox">
            <input id="remember" name="remember" type="checkbox" checked />
            Remember me
          </label>
          <a class="link" href="/">Back</a>
        </div>

        <button id="submitBtn" class="btn" type="submit">Login</button>
      </form>

      <div id="error" class="err"></div>
      <div id="success" class="ok"></div>

      <div class="footer">
        Tip: after login succeeds, we store `hootner.token` in localStorage.<br />
        For now this page POSTs to <span class="kbd">/api/login</span> unless `window.HOOTNER_CONFIG.API_URL` is present.
      </div>
    </main>

    <script>
      (function () {
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('error');
        const successEl = document.getElementById('success');

        function setError(msg) {
          successEl.style.display = 'none';
          errorEl.textContent = msg;
          errorEl.style.display = 'block';
        }

        function setSuccess(msg) {
          errorEl.style.display = 'none';
          successEl.textContent = msg;
          successEl.style.display = 'block';
        }

        function getLoginUrl() {
          // If your full-stack injects a config object at runtime, prefer it.
          const base = window.HOOTNER_CONFIG && window.HOOTNER_CONFIG.API_URL;
          if (typeof base === 'string' && base.length > 0) {
            try {
              return new URL('login', base).toString();
            } catch {
              // fall through
            }
          }
          // Default for local/dev reverse-proxy setups
          return '/api/login';
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();

          const formData = new FormData(form);
          const payload = {
            email: String(formData.get('email') || '').trim(),
            password: String(formData.get('password') || ''),
            remember: Boolean(formData.get('remember'))
          };

          if (!payload.email || !payload.password) {
            setError('Please enter an email and password.');
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = 'Signing in…';

          try {
            const res = await fetch(getLoginUrl(), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              const text = await res.text().catch(() => '');
              setError(text || `Login failed (${res.status}).`);
              return;
            }

            const data = await res.json().catch(() => ({}));
            const token = data.token || data.access_token || data.accessToken;
            if (token) {
              localStorage.setItem('hootner.token', String(token));
            }

            setSuccess('Login successful. Redirecting…');
            setTimeout(() => {
              window.location.href = '/';
            }, 600);
          } catch (err) {
            setError('Network error. Check connectivity (PWA offline?) and try again.');
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login';
          }
        });
      })();
    </script>
  </body>
</html>
