<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../html-pages/styles.css" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Metrics Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="glass-ui.css">
  <script src="glass-ui.js" defer></script>
</head>
</head>
<body class="bg-gray-900 text-white p-6">
  <h1 class="text-3xl font-bold mb-6">📊 Upload Metrics Dashboard</h1>
  
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-gray-800 p-4 rounded-lg">
      <div class="text-gray-400 text-sm">Total Uploads</div>
      <div class="text-3xl font-bold" id="totalUploads">0</div>
    </div>
    <div class="bg-gray-800 p-4 rounded-lg">
      <div class="text-gray-400 text-sm">Success Rate</div>
      <div class="text-3xl font-bold text-green-400" id="successRate">0%</div>
    </div>
    <div class="bg-gray-800 p-4 rounded-lg">
      <div class="text-gray-400 text-sm">Malware Blocked</div>
      <div class="text-3xl font-bold text-red-400" id="malwareBlocked">0</div>
    </div>
    <div class="bg-gray-800 p-4 rounded-lg">
      <div class="text-gray-400 text-sm">Avg Upload Time</div>
      <div class="text-3xl font-bold" id="avgTime">0s</div>
    </div>
  </div>
  
  <div class="grid grid-cols-2 gap-4">
    <div class="bg-gray-800 p-4 rounded-lg">
      <h2 class="text-xl font-bold mb-4">Upload Trends</h2>
      <canvas id="uploadChart"></canvas>
    </div>
    <div class="bg-gray-800 p-4 rounded-lg">
      <h2 class="text-xl font-bold mb-4">Security Events</h2>
      <canvas id="securityChart"></canvas>
    </div>
  </div>
  
  <script>
    async function loadMetrics() {
      const logs = JSON.parse(localStorage.getItem('auditLogs') || '[]');
      
      const uploads = logs.filter(l => l.action === 'upload_completed');
      const failed = logs.filter(l => l.action === 'upload_failed');
      const malware = logs.filter(l => l.action === 'malware_blocked');
      
      document.getElementById('totalUploads').textContent = uploads.length;
      document.getElementById('successRate').textContent = 
        ((uploads.length / (uploads.length + failed.length)) * 100 || 0).toFixed(1) + '%';
      document.getElementById('malwareBlocked').textContent = malware.length;
      
      // Charts
      new Chart(document.getElementById('uploadChart'), {
        type: 'line',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{
            label: 'Uploads',
            data: [12, 19, 15, 25, 22, 30, 28],
            borderColor: '#00ffff',
            tension: 0.4
          }]
        }
      });
      
      new Chart(document.getElementById('securityChart'), {
        type: 'doughnut',
        data: {
          labels: ['Malware', 'CSRF', 'Rate Limit', 'XSS'],
          datasets: [{
            data: [malware.length, 5, 8, 2],
            backgroundColor: ['#ef4444', '#f59e0b', '#eab308', '#84cc16']
          }]
        }
      });
    }
    
    loadMetrics();
    setInterval(loadMetrics, 5000);
  </script>
</body>
</html>
