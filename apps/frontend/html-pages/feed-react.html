<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦉 Social Feed - Hootner (React)</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --neon-green: #00ff41;
        --neon-cyan: #00ffff;
        --neon-magenta: #ff00ff;
        --neon-yellow: #ffff00;
        --text-primary: #00ff41;
        --text-secondary: #00ffff;
        --bg-dark: #0a0a0f;
      }

      body {
        background: #0a0a0f;
        color: #00ff41;
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
      }

      nav {
        height: 80px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
      }

      .main-content {
        margin-top: 80px;
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <nav class="bg-slate-900 border-b border-slate-700">
      <div
        style="
          padding: 12px 40px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div style="display: flex; align-items: center; gap: 24px">
          <a
            href="index.html"
            style="
              font-size: 24px;
              font-weight: bold;
              background: linear-gradient(135deg, #00ff00, #00ffff, #ff00ff);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              text-decoration: none;
            "
            >🦉 HOOTNER</a
          >
          <div style="position: relative">
            <span
              style="
                color: #00ffff;
                cursor: pointer;
                font-size: 20px;
                padding: 8px;
                position: relative;
                display: inline-block;
              "
            >
              🔔
              <span
                style="
                  position: absolute;
                  top: -2px;
                  right: 2px;
                  background: #ef4444;
                  color: white;
                  border-radius: 50%;
                  width: 16px;
                  height: 16px;
                  font-size: 10px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-weight: bold;
                "
                >3</span
              >
            </span>
          </div>
        </div>
        <div class="flex gap-2 items-center">
          <a
            href="profile.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >👤 Profile</a
          >
          <a
            href="design-showcase.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >🎨 Design</a
          >
          <a
            href="feed.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >📰 Social</a
          >
          <a
            href="marketplace.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >🛒 Marketplace</a
          >
          <a
            href="dashboard.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >📈 Dashboard</a
          >
          <a
            href="video-player.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >▶️ Video</a
          >
          <a
            href="auto-editor.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >✂️ Editor</a
          >
          <a
            href="code-editor.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >💻 Code</a
          >
          <a
            href="settings.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >⚙️ Settings</a
          >
          <a
            href="login.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >🔐 Login</a
          >
        </div>
      </div>
    </nav>

    <div class="main-content">
      <div id="root"></div>
    </div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const NotificationBell = () => {
        const [showNotifications, setShowNotifications] = useState(false);
        const [notificationCount, setNotificationCount] = useState(3);

        const notifications = [
          { id: 1, text: 'New like on your post', time: '2m ago' },
          { id: 2, text: 'User followed you', time: '5m ago' },
          { id: 3, text: 'New comment received', time: '10m ago' },
        ];

        const handleBellClick = () => {
          setShowNotifications(!showNotifications);
          if (!showNotifications) setNotificationCount(0);
        };

        return (
          <div style={{ position: 'relative' }}>
            <span
              onClick={handleBellClick}
              style={{
                color: '#00ffff',
                cursor: 'pointer',
                fontSize: '20px',
                padding: '8px',
                position: 'relative',
                display: 'inline-block',
              }}
            >
              🔔
              {notificationCount > 0 && (
                <span
                  style={{
                    position: 'absolute',
                    top: '-2px',
                    right: '2px',
                    background: '#ef4444',
                    color: 'white',
                    borderRadius: '50%',
                    width: '16px',
                    height: '16px',
                    fontSize: '10px',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    fontWeight: 'bold',
                  }}
                >
                  {notificationCount}
                </span>
              )}
            </span>
            {showNotifications && (
              <div
                style={{
                  position: 'absolute',
                  top: '100%',
                  right: '0',
                  background: '#1e293b',
                  border: '1px solid #334155',
                  borderRadius: '8px',
                  width: '300px',
                  zIndex: 1001,
                  marginTop: '8px',
                }}
              >
                <div
                  style={{
                    padding: '12px',
                    borderBottom: '1px solid #334155',
                    color: '#00ff41',
                    fontWeight: 'bold',
                  }}
                >
                  Notifications
                </div>
                {notifications.map(notif => (
                  <div
                    key={notif.id}
                    style={{
                      padding: '12px',
                      borderBottom: '1px solid #334155',
                      color: '#00ffff',
                      fontSize: '14px',
                    }}
                  >
                    <div>{notif.text}</div>
                    <div
                      style={{
                        color: '#64748b',
                        fontSize: '12px',
                        marginTop: '4px',
                      }}
                    >
                      {notif.time}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      };

      const PostCard = ({ post, onLike, onShare }) => (
        <article
          style={{
            background: 'rgba(10,10,15,0.8)',
            borderRadius: '12px',
            border: '2px solid rgba(0,255,65,0.3)',
            padding: '40px',
            marginBottom: '24px',
            boxShadow: '0 0 20px rgba(0,255,65,0.3)',
          }}
        >
          <div
            style={{
              display: 'flex',
              alignItems: 'center',
              gap: '12px',
              marginBottom: '16px',
            }}
          >
            <div
              style={{
                width: '40px',
                height: '40px',
                background: 'linear-gradient(135deg,#00ff41,#00ffff)',
                borderRadius: '50%',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '20px',
              }}
            >
              🦉
            </div>
            <div>
              <div style={{ fontWeight: 600, color: '#00ff41' }}>
                {post.author}
              </div>
              <div style={{ fontSize: '14px', color: '#00ffff' }}>
                {post.time}
              </div>
            </div>
          </div>
          <p style={{ color: '#00ffff', marginBottom: '16px' }}>
            {post.content}
          </p>
          <div style={{ display: 'flex', gap: '16px' }}>
            <button
              onClick={() => onLike(post.id)}
              style={{
                background: 'none',
                border: 'none',
                color: post.liked ? '#ff00ff' : '#00ffff',
                cursor: 'pointer',
                fontSize: '14px',
              }}
            >
              ❤️ {post.likes}
            </button>
            <button
              onClick={() => onShare(post.id)}
              style={{
                background: 'none',
                border: 'none',
                color: '#00ffff',
                cursor: 'pointer',
                fontSize: '14px',
              }}
            >
              🔗 {post.shares}
            </button>
          </div>
        </article>
      );

      const Feed = () => {
        const [posts, setPosts] = useState([]);

        useEffect(() => {
          const initialPosts = Array.from({ length: 10 }, (_, i) => ({
            id: i + 1,
            author: `User ${i + 1}`,
            content: `Post #${i + 1}. This is a sample post with some content.`,
            time: `${Math.floor(Math.random() * 24)}h ago`,
            likes: Math.floor(Math.random() * 500),
            shares: Math.floor(Math.random() * 20),
            liked: false,
          }));
          setPosts(initialPosts);
        }, []);

        const handleLike = id => {
          setPosts(prev =>
            prev.map(post =>
              post.id === id
                ? {
                    ...post,
                    liked: !post.liked,
                    likes: post.likes + (post.liked ? -1 : 1),
                  }
                : post
            )
          );
        };

        const handleShare = id => {
          setPosts(prev =>
            prev.map(post =>
              post.id === id ? { ...post, shares: post.shares + 1 } : post
            )
          );
          alert('🔗 Link copied!');
        };

        return (
          <div
            style={{ maxWidth: '1400px', margin: '0 auto', padding: '24px' }}
          >
            {posts.map(post => (
              <PostCard
                key={post.id}
                post={post}
                onLike={handleLike}
                onShare={handleShare}
              />
            ))}
          </div>
        );
      };

      ReactDOM.render(<Feed />, document.getElementById('root'));
    </script>
  </body>
</html>
