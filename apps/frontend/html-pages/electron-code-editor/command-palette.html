<!doctype html>
<div
  id="commandPalette"
  style="
    display: none;
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    background: var(--sidebar-bg);
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    z-index: 10000;
  "
>
  <input
    type="text"
    id="commandInput"
    placeholder="Type a command..."
    style="
      width: 100%;
      padding: 16px;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 16px;
      outline: none;
    "
  />
  <div id="commandResults" style="max-height: 400px; overflow-y: auto"></div>
</div>

<style>
  .command-item { padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s; }
  .command-item:hover,
  .command-item.selected { background: var(--hover); }
  .command-item strong { color: var(--accent); }
</style>

<script>
  const commandPalette = { visible: false,
    selectedIndex: 0,
    commands: [
      { name: 'Git: Commit', cmd: 'git commit', desc: 'Commit staged changes' },
      { name: 'Git: Switch Branch',
        cmd: 'git branch',
        desc: 'Switch to another branch', },
      { name: 'Git: View Log', cmd: 'git log', desc: 'Show commit history' },
      { name: 'AI: Refactor Code',
        cmd: 'ai refactor',
        desc: 'Refactor current code', },
      { name: 'Plugin: Install',
        cmd: 'plugin install',
        desc: 'Browse plugin marketplace', },
      { name: 'Theme: Dark', cmd: 'theme dark', desc: 'Switch to dark theme' },
      { name: 'Theme: Light',
        cmd: 'theme light',
        desc: 'Switch to light theme', },
      { name: 'View: Zen Mode',
        cmd: 'zen mode',
        desc: 'Toggle distraction-free mode', },
      { name: 'Format: Document',
        cmd: 'format code',
        desc: 'Format current document', },
    ],

    toggle() { this.visible = !this.visible;
      const palette = document.getElementById('commandPalette');
      palette.style.display = this.visible ? 'block' : 'none';

      if (this.visible) { document.getElementById('commandInput').focus();
        this.render(this.commands); } },

    render(commands) { const results = document.getElementById('commandResults');
      results.textContent = commands
        .map(
          (cmd, i) => `
        <div class="command-item ${i === this.selectedIndex ? 'selected' : ''}"
             onclick="commandPalette.execute('${cmd.cmd}')">
          <strong>${cmd.name}</strong>
          <div style="font-size:12px; color:var(--text-muted);">${cmd.desc}</div>
        </div>
      `
        )
        .join(''); },

    search(query) { if (!query) { this.render(this.commands);
        return; }

      const filtered = featureExpansions
        .fuzzySearch(
          query,
          this.commands.map(c => c.name)
        )
        .map(name => this.commands.find(c => c.name === name))
        .filter(Boolean);

      this.selectedIndex = 0;
      this.render(filtered.length > 0 ? filtered : this.commands); },

    execute(cmd) { featureExpansions.executeCommand(cmd);
      this.toggle(); },

    handleKey(e) { if (!this.visible) return;

      switch (e.key) { case 'ArrowDown':
          e.preventDefault();
          this.selectedIndex = Math.min(this.selectedIndex + 1, this.commands.length - 1);
          this.render(this.commands);
          break;
        case 'ArrowUp':
          e.preventDefault();
          this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
          this.render(this.commands);
          break;
        case 'Enter':
          e.preventDefault();
          const selected = document.querySelector('.command-item.selected');
          if (selected) selected.click();
          break;
        case 'Escape':
          this.toggle();
          break; } }, };

  document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'P') { e.preventDefault();
      commandPalette.toggle(); }
    commandPalette.handleKey(e); });

  document.getElementById('commandInput')?.addEventListener('input', e => { commandPalette.search(e.target.value); });
</script>
