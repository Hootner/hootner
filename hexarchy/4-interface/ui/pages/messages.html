<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  
  <!-- Session Revocation System -->
  <script src="../assets/security/session-revocation.js"></script>
  
  <link rel="stylesheet" href="shared-styles.css" />
  <title>💬 Messages - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #0a0a0f);
      color: #00ff00;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .message-bubble {
      max-width: 70%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .message-sent {
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      color: white;
      margin-left: auto;
      box-shadow: 0 4px 12px rgba(0, 255, 255, 0.3);
    }

    .message-received {
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid rgba(0, 255, 0, 0.3);
      box-shadow: 0 2px 8px rgba(0, 255, 0, 0.2);
    }

    .chat-container {
      height: calc(100vh - 280px);
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    @media (max-width: 768px) {
      .chat-container {
        height: calc(100vh - 240px);
      }
    }

    .typing-indicator {
      display: inline-flex;
      gap: 4px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #00ff00;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    .conversation-item {
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .conversation-item:hover {
      background: rgba(0, 255, 0, 0.1) !important;
      transform: translateX(4px);
    }

    .conversation-item.active {
      background: rgba(0, 255, 0, 0.15) !important;
      border-color: rgba(0, 255, 0, 0.5) !important;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 255, 0, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 0, 0.5);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 255, 0, 0.7);
    }

    .emoji-picker {
      display: none;
      position: absolute;
      bottom: 60px;
      right: 20px;
      background: rgba(10, 10, 15, 0.95);
      border: 2px solid rgba(0, 255, 0, 0.3);
      border-radius: 12px;
      padding: 16px;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .emoji-picker.active {
      display: block;
    }

    .online-indicator {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        height: 100vh;
        z-index: 50;
        transition: left 0.3s ease;
        width: 80%;
        max-width: 350px;
      }

      .sidebar.mobile-open {
        left: 0;
      }

      .mobile-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 40;
      }

      .mobile-overlay.active {
        display: block;
      }
    }
  </style>
</head>

<body class="min-h-screen">
  <script src="../components/auth-guard.js"></script>
  <script src="../components/header-enhanced.js"></script>

  <div style="padding: 20px; max-width: 1400px; margin: 0 auto; display: flex; gap: 24px; height: calc(100vh - 120px);">

    <!-- Conversations List -->
    <div
      style="width: 350px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 16px; padding: 24px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 1.5rem; font-weight: bold; color: #00ff00;">💬 Messages</h2>
        <button onclick="newMessage()"
          style="padding: 8px 16px; background: linear-gradient(135deg, #00ffff, #ff00ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">+
          New</button>
      </div>

      <div style="margin-bottom: 16px;">
        <input type="text" id="search-conversations" placeholder="🔍 Search conversations..."
          style="width: 100%; padding: 12px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 8px; color: #00ff00;">
      </div>

      <div id="conversations-list" style="display: flex; flex-direction: column; gap: 12px;">
        <!-- Conversations will be loaded here -->
      </div>
    </div>

    <!-- Chat Area -->
    <div
      style="flex: 1; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 16px; display: flex; flex-direction: column;">

      <!-- Chat Header -->
      <div id="chat-header" style="padding: 20px; border-bottom: 2px solid rgba(0, 255, 0, 0.3); display: none;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div
            style="width: 50px; height: 50px; background: linear-gradient(135deg, #00ff00, #00ffff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #000;">
            👤</div>
          <div>
            <h3 id="chat-name" style="font-size: 1.25rem; font-weight: bold; color: #00ff00;"></h3>
            <p id="chat-status" style="color: #00ffff; font-size: 0.875rem;"></p>
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="messages-container" class="chat-container"
        style="flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px;">
        <div style="text-align: center; color: #6b7280; padding: 40px;">
          Select a conversation to start messaging
        </div>
      </div>

      <!-- Message Input -->
      <div id="message-input-area" style="padding: 20px; border-top: 2px solid rgba(0, 255, 0, 0.3); display: none;">
        <div style="display: flex; gap: 12px;">
          <input type="text" id="message-input" placeholder="Type your message..."
            style="flex: 1; padding: 12px 16px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 8px; color: #00ff00;">
          <button onclick="sendMessage()"
            style="padding: 12px 24px; background: linear-gradient(135deg, #00ff00, #00ffff); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../components/footer-enhanced.js"></script>

  <script>
    const API_URL = 'http://localhost:4000/api/messages';
    let socket;
    let currentConversation = null;
    let conversations = [];
    let messages = [];

    // Mock data for demo
    const mockConversations = [
      { id: '1', name: 'React Components Seller', lastMessage: 'Thanks for your interest!', timestamp: '2 min ago', unread: 2, avatar: '💻' },
      { id: '2', name: 'UI Design Team', lastMessage: 'Design files are ready', timestamp: '1 hour ago', unread: 0, avatar: '🎨' },
      { id: '3', name: 'API Support', lastMessage: 'Integration guide sent', timestamp: '3 hours ago', unread: 1, avatar: '🔌' },
      { id: '4', name: 'Marketplace Admin', lastMessage: 'Product approved!', timestamp: 'Yesterday', unread: 0, avatar: '🛒' }
    ];

    const mockMessages = {
      '1': [
        { id: '1', text: 'Hi! I\'m interested in your React Component Pack', sender: 'me', timestamp: '10:30 AM' },
        { id: '2', text: 'Thanks for your interest! It includes 50+ professional components', sender: 'them', timestamp: '10:32 AM' },
        { id: '3', text: 'Does it include TypeScript definitions?', sender: 'me', timestamp: '10:33 AM' },
        { id: '4', text: 'Yes, full TypeScript support with detailed documentation', sender: 'them', timestamp: '10:35 AM' }
      ]
    };

    function initializeSocket() {
      socket = io('http://localhost:4000');
      socket.on('message', (message) => {
        if (message.conversationId === currentConversation) {
          addMessageToChat(message);
        }
        updateConversationsList();
      });
    }

    function loadConversations() {
      conversations = mockConversations;
      renderConversations();
    }

    function renderConversations() {
      const container = document.getElementById('conversations-list');
      container.innerHTML = conversations.map(conv => `
          <div onclick="selectConversation('${conv.id}')" style="padding: 16px; background: rgba(0, 255, 0, 0.05); border: 1px solid rgba(0, 255, 0, 0.2); border-radius: 12px; cursor: pointer; transition: all 0.3s;" onmouseover="this.style.background='rgba(0, 255, 0, 0.1)'" onmouseout="this.style.background='rgba(0, 255, 0, 0.05)'">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #00ff00, #00ffff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">${conv.avatar}</div>
              <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <h4 style="color: #00ff00; font-weight: bold; font-size: 0.875rem;">${conv.name}</h4>
                  ${conv.unread > 0 ? `<span style="background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem;">${conv.unread}</span>` : ''}
                </div>
              </div>
            </div>
            <p style="color: #00ffff; font-size: 0.75rem; margin-bottom: 4px;">${conv.lastMessage}</p>
            <p style="color: #6b7280; font-size: 0.625rem;">${conv.timestamp}</p>
          </div>
        `).join('');
    }

    function selectConversation(id) {
      currentConversation = id;
      const conv = conversations.find(c => c.id === id);

      document.getElementById('chat-header').style.display = 'block';
      document.getElementById('message-input-area').style.display = 'block';
      document.getElementById('chat-name').textContent = conv.name;
      document.getElementById('chat-status').textContent = 'Online';

      loadMessages(id);
    }

    function loadMessages(conversationId) {
      messages = mockMessages[conversationId] || [];
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('messages-container');
      container.innerHTML = messages.map(msg => `
          <div style="display: flex; ${msg.sender === 'me' ? 'justify-content: flex-end' : 'justify-content: flex-start'};">
            <div class="message-bubble ${msg.sender === 'me' ? 'message-sent' : 'message-received'}" style="padding: 12px 16px; border-radius: 16px; margin-bottom: 8px;">
              <p style="margin: 0; font-size: 0.875rem;">${msg.text}</p>
              <p style="margin: 4px 0 0 0; font-size: 0.625rem; opacity: 0.7;">${msg.timestamp}</p>
            </div>
          </div>
        `).join('');

      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();

      if (!text || !currentConversation) return;

      const message = {
        id: Date.now().toString(),
        text,
        sender: 'me',
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        conversationId: currentConversation
      };

      addMessageToChat(message);
      input.value = '';

      // Simulate response after 2 seconds
      setTimeout(() => {
        const response = {
          id: (Date.now() + 1).toString(),
          text: 'Thanks for your message! I\'ll get back to you soon.',
          sender: 'them',
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          conversationId: currentConversation
        };
        addMessageToChat(response);
      }, 2000);
    }

    function addMessageToChat(message) {
      if (!mockMessages[message.conversationId]) {
        mockMessages[message.conversationId] = [];
      }
      mockMessages[message.conversationId].push(message);

      if (message.conversationId === currentConversation) {
        renderMessages();
      }
    }

    function newMessage() {
      const email = prompt('Enter email or username to start a new conversation:');
      if (email) {
        const newConv = {
          id: Date.now().toString(),
          name: email,
          lastMessage: 'New conversation',
          timestamp: 'Now',
          unread: 0,
          avatar: '👤'
        };
        conversations.unshift(newConv);
        renderConversations();
        selectConversation(newConv.id);
      }
    }

    // Initialize
    loadConversations();
    // initializeSocket(); // Uncomment when backend is ready

    // Enter key to send message
    document.getElementById('message-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>

</html>
