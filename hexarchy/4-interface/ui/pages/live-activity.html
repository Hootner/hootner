<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Session Revocation System -->
    <script src="../assets/security/session-revocation.js"></script>
    
    <link rel="stylesheet" href="shared-styles.css" />
    <title>🔥 Live Activity - HOOTNER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.95), rgba(5, 5, 10, 0.95));
            color: #00ff00;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid rgba(0, 255, 0, 0.3);
            border-radius: 16px;
        }

        .pulse {
            width: 16px;
            height: 16px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            50% { opacity: 0.7; }
            100% { opacity: 1; box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); }
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff4444, #00ff00, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .activity-feed::-webkit-scrollbar {
            width: 8px;
        }

        .activity-feed::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.05);
            border-radius: 10px;
        }

        .activity-feed::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.3);
            border-radius: 10px;
        }

        .activity-feed::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 0, 0.5);
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-left: 4px solid;
            border-radius: 8px;
            transition: all 0.3s;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .activity-item:hover {
            background: rgba(10, 10, 15, 0.8);
            border-color: rgba(0, 255, 0, 0.5);
        }

        .activity-item.new {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .activity-item.warning {
            border-left-color: #ffff00;
        }

        .activity-item.error {
            border-left-color: #ff4444;
        }

        .activity-item.success {
            border-left-color: #00ff00;
        }

        .activity-emoji {
            font-size: 2rem;
            flex-shrink: 0;
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .activity-content {
            flex: 1;
        }

        .activity-text {
            font-size: 1.1rem;
            color: #00ff00;
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 0.85rem;
            color: #00ffff;
            opacity: 0.7;
        }

        .activity-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .activity-tag {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 0.75rem;
            color: #00ffff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff00;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #00ffff;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(0, 255, 0, 0.2);
            border-color: rgba(0, 255, 0, 0.6);
        }

        .btn.active {
            background: rgba(0, 255, 0, 0.3);
            border-color: rgba(0, 255, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="pulse"></div>
            <h1>🔥 Live Activity (Real-time)</h1>
        </header>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="per-min">0</div>
                <div class="stat-label">Events/Min</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="active-users">127</div>
                <div class="stat-label">Active Users</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="uptime">99.9%</div>
                <div class="stat-label">System Uptime</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn active" onclick="filterEvents('all')">📊 All Events</button>
            <button class="btn" onclick="filterEvents('video')">🎥 Videos</button>
            <button class="btn" onclick="filterEvents('security')">🔐 Security</button>
            <button class="btn" onclick="filterEvents('deploy')">🚀 Deployments</button>
            <button class="btn" onclick="filterEvents('ai')">🤖 AI Agents</button>
        </div>

        <div class="activity-feed" id="activityFeed"></div>
    </div>

    <script>
        // Configuration for backend connection
        const CONFIG = {
            API_URL: 'http://localhost:4000/graphql',
            WS_URL: 'ws://localhost:4000/graphql',
            FALLBACK_TO_DEMO: true // Use demo data if backend unavailable
        };

        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;

        // Map backend events to display format
        function mapBackendEventToDisplay(event) {
            const emojiMap = {
                'VIDEO_UPLOADED': '🎥',
                'DEPLOYMENT_SUCCESS': '🚀',
                'SECURITY_SCAN': '🔐',
                'AI_AGENT_ACTIVATED': '🤖',
                'PAYMENT_PROCESSED': '💰',
                'AUTO_SCALING': '⚡',
                'NEW_USER': '👥',
                'ANALYTICS_REPORT': '📊',
                'COLLABORATION_SESSION': '💬',
                'ALERT_CRITICAL': '🔴',
                'SYSTEM_HEALTHY': '✅',
                'DEPLOYMENT_FAILED': '❌'
            };

            return {
                emoji: emojiMap[event.type] || '📋',
                text: event.message || event.description || 'System event occurred',
                type: event.type.toLowerCase(),
                tag: event.category || event.service || 'SYSTEM',
                timestamp: new Date(event.timestamp || Date.now())
            };
        }

        // Connect to GraphQL WebSocket
        function connectToBackend() {
            console.log('🔌 Attempting WebSocket connection to', CONFIG.WS_URL);
            
            ws = new WebSocket(CONFIG.WS_URL);

            ws.onopen = () => {
                console.log('✅ WebSocket connected to backend');
                reconnectAttempts = 0;
                
                // Subscribe to activity stream
                const subscription = {
                    id: '1',
                    type: 'start',
                    payload: {
                        query: `subscription {
                            activityStream {
                                id
                                type
                                message
                                description
                                category
                                service
                                timestamp
                                userId
                                metadata
                            }
                        }`
                    }
                };
                
                ws.send(JSON.stringify(subscription));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Handle subscription data
                    if (data.payload && data.payload.data && data.payload.data.activityStream) {
                        const backendEvent = data.payload.data.activityStream;
                        const displayEvent = mapBackendEventToDisplay(backendEvent);
                        
                        console.log('📨 New real event:', displayEvent);
                        addRealActivity(displayEvent);
                    }
                } catch (e) {
                    console.error('⚠️ Error parsing WebSocket message:', e);
                }
            };

            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
            };

            ws.onclose = () => {
                console.warn('⚠️ WebSocket disconnected');
                
                // Attempt reconnection
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    console.log(`🔄 Reconnecting... (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
                    setTimeout(connectToBackend, 3000);
                } else {
                    console.warn('⚠️ Max reconnection attempts reached, falling back to demo mode');
                    if (CONFIG.FALLBACK_TO_DEMO) {
                        initializeDemoMode();
                    }
                }
            };
        }

        function addRealActivity(activity) {
            totalCount++;
            eventCounts[activity.type] = (eventCounts[activity.type] || 0) + 1;
            
            if (currentFilter === 'all' || currentFilter === activity.type) {
                const feed = document.getElementById('activityFeed');
                const element = createRealActivityElement(activity);
                feed.insertBefore(element, feed.firstChild);

                // Keep only last 8 items
                while (feed.children.length > 8) {
                    feed.removeChild(feed.lastChild);
                }
            }

            document.getElementById('total-count').textContent = totalCount;
        }

        function createRealActivityElement(activity) {
            const div = document.createElement('div');
            
            div.className = `activity-item ${activity.type}`;
            if (activity.type === 'security_scan' || activity.type === 'alert_critical') {
                div.classList.add('error');
            } else if (activity.type === 'deployment_success') {
                div.classList.add('success');
            } else if (activity.type === 'ai_agent_activated') {
                div.classList.add('warning');
            } else {
                div.classList.add('new');
            }

            div.innerHTML = `
                <div class="activity-emoji">${activity.emoji}</div>
                <div class="activity-content">
                    <div class="activity-text">${activity.text}</div>
                    <div class="activity-time">${formatTime(activity.timestamp)}</div>
                    <div class="activity-meta">
                        <span class="activity-tag">${activity.tag}</span>
                        <span class="activity-tag">LIVE</span>
                    </div>
                </div>
            `;

            return div;
        }
            { emoji: '🎥', text: 'New video uploaded by @creator_pro', type: 'video', tag: 'Content' },
            { emoji: '🚀', text: 'Deployment successful: v2.1.4', type: 'deploy', tag: 'Release' },
            { emoji: '🤖', text: 'AI Agent "SecurityBot" activated', type: 'ai', tag: 'ML' },
            { emoji: '💰', text: 'Payment processed: $49.99', type: 'payment', tag: 'Revenue' },
            { emoji: '💬', text: 'New collaboration session started', type: 'collab', tag: 'Users' },
            { emoji: '🔐', text: 'Security scan completed: All clear', type: 'security', tag: 'Security' },
            { emoji: '⚡', text: 'Auto-scaling triggered: +2 instances', type: 'deploy', tag: 'Infrastructure' },
            { emoji: '👥', text: 'New user registered: @dev_ninja', type: 'user', tag: 'Growth' },
            { emoji: '📊', text: 'Analytics report generated', type: 'analytics', tag: 'Insights' },
            { emoji: '🔔', text: 'System alert: High memory usage on server-3', type: 'alert', tag: 'Critical' },
            { emoji: '🎯', text: 'Campaign milestone reached: 10K views', type: 'campaign', tag: 'Marketing' },
            { emoji: '✅', text: 'Database backup completed successfully', type: 'deploy', tag: 'Maintenance' },
        ];

        let totalCount = 0;
        let currentFilter = 'all';
        let eventCounts = {};

        function getRandomActivity() {
            return activityTemplates[Math.floor(Math.random() * activityTemplates.length)];
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);

            if (seconds < 60) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return date.toLocaleDateString();
        }

        function createActivityElement(activity) {
            const div = document.createElement('div');
            const timestamp = new Date();
            
            div.className = `activity-item ${activity.type}`;
            if (activity.type === 'security' || activity.type === 'alert') {
                div.classList.add('error');
            } else if (activity.type === 'deploy') {
                div.classList.add('success');
            } else if (activity.type === 'ai') {
                div.classList.add('warning');
            } else {
                div.classList.add('new');
            }

            div.innerHTML = `
                <div class="activity-emoji">${activity.emoji}</div>
                <div class="activity-content">
                    <div class="activity-text">${activity.text}</div>
                    <div class="activity-time">${formatTime(timestamp)}</div>
                    <div class="activity-meta">
                        <span class="activity-tag">${activity.tag}</span>
                        <span class="activity-tag">${activity.type.toUpperCase()}</span>
                    </div>
                </div>
            `;

            return div;
        }

        function addNewActivity() {
            totalCount++;
            const activity = getRandomActivity();
            eventCounts[activity.type] = (eventCounts[activity.type] || 0) + 1;
            
            if (currentFilter === 'all' || currentFilter === activity.type) {
                const feed = document.getElementById('activityFeed');
                const element = createActivityElement(activity);
                feed.insertBefore(element, feed.firstChild);

                // Keep only last 8 items
                while (feed.children.length > 8) {
                    feed.removeChild(feed.lastChild);
                }
            }

            document.getElementById('total-count').textContent = totalCount;
        }

        function updatePerMinute() {
            const baseCount = Math.floor(Math.random() * 5) + 3;
            document.getElementById('per-min').textContent = baseCount;
        }

        function filterEvents(type) {
            currentFilter = type;
            document.querySelectorAll('.controls .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const feed = document.getElementById('activityFeed');
            feed.innerHTML = '';
            
            // Regenerate with filter
            for (let i = 0; i < 10; i++) {
                const activity = getRandomActivity();
                if (type === 'all' || type === activity.type) {
                    const element = createActivityElement(activity);
                    feed.appendChild(element);
                }
            }
        }

        // Initialize
        async function initializeActivityFeed() {
            console.log('🚀 Live Activity Feed Initializing...');
            console.log('📡 Attempting to connect to real backend...');
            
            // Try to connect to real backend immediately
            connectToBackend();
            
            // Set a timeout - if no real data in 5 seconds, use demo
            setTimeout(() => {
                if (reconnectAttempts === 0 && !ws) {
                    console.log('⏱️ No backend response, falling back to demo mode');
                    initializeDemoMode();
                }
            }, 5000);
        }

        function initializeDemoMode() {
            console.log('📊 Running in DEMO mode - using simulated data');
            for (let i = 0; i < 8; i++) {
                addNewActivity();
            }

            // Add new activity every 2-4 seconds
            setInterval(() => {
                addNewActivity();
            }, Math.random() * 2000 + 2000);

            // Update per-minute counter
            setInterval(updatePerMinute, 60000);
            updatePerMinute();
        }

        // Start the feed
        initializeActivityFeed();

        // Update time displays every 10 seconds
        setInterval(() => {
            document.querySelectorAll('.activity-time').forEach(el => {
                // Time updates would go here
            });
        }, 10000);
    </script>
</body>
</html>
