<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 AI Video Generator - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e, #0a0a0f);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #00ff00;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .glass { 
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .glass-light {
      background: rgba(10, 10, 15, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 0, 0.1);
    }
    
    .neon { 
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3),
                  0 0 40px rgba(0, 255, 0, 0.2);
    }
    
    .neon-hover:hover {
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5),
                  0 0 60px rgba(0, 255, 0, 0.3);
      transform: translateY(-2px);
    }
    
    .progress-bar { transition: width 0.3s ease; }
    
    .btn-primary {
      background: linear-gradient(135deg, #00ff00, #00ffff);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
    }
    
    .btn-secondary {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid rgba(0, 255, 0, 0.3);
      color: #00ff00;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-secondary:hover {
      background: rgba(0, 255, 0, 0.2);
      border-color: rgba(0, 255, 255, 0.5);
      color: #00ffff;
    }
    
    .preset-card {
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.05), rgba(0, 255, 255, 0.05));
      border: 2px solid rgba(0, 255, 0, 0.2);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    
    .preset-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
      transform: rotate(45deg);
      transition: all 0.5s;
    }
    
    .preset-card:hover::before {
      left: 100%;
    }
    
    .preset-card:hover {
      border-color: rgba(0, 255, 255, 0.6);
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(0, 255, 255, 0.3);
    }
    
    .preset-card.active {
      border-color: #00ffff;
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.15), rgba(0, 255, 255, 0.15));
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
    }
    
    .video-card {
      background: rgba(10, 10, 15, 0.9);
      border: 2px solid rgba(0, 255, 0, 0.2);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }
    
    .video-card:hover {
      border-color: rgba(0, 255, 255, 0.5);
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(0, 255, 255, 0.3);
    }
    
    .video-card video {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #000;
    }
    
    .input-field {
      background: rgba(10, 10, 15, 0.8);
      border: 2px solid rgba(0, 255, 0, 0.3);
      border-radius: 8px;
      color: #00ff00;
      padding: 12px 16px;
      width: 100%;
      transition: all 0.3s;
      font-size: 14px;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }
    
    .tab-button {
      background: rgba(0, 255, 0, 0.05);
      border: 2px solid rgba(0, 255, 0, 0.2);
      color: #00ff00;
      padding: 12px 24px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .tab-button:hover {
      background: rgba(0, 255, 0, 0.1);
    }
    
    .tab-button.active {
      background: rgba(0, 255, 255, 0.2);
      border-color: #00ffff;
      color: #00ffff;
      box-shadow: 0 -5px 20px rgba(0, 255, 255, 0.3);
    }
    
    .badge {
      background: linear-gradient(135deg, #00ff00, #00ffff);
      color: #000;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .badge-pro {
      background: linear-gradient(135deg, #ff00ff, #00ffff);
    }
    
    .queue-item {
      background: rgba(10, 10, 15, 0.7);
      border: 1px solid rgba(0, 255, 0, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s;
    }
    
    .queue-item:hover {
      border-color: rgba(0, 255, 255, 0.4);
      background: rgba(10, 10, 15, 0.9);
    }
    
    .loader {
      border: 3px solid rgba(0, 255, 0, 0.2);
      border-top: 3px solid #00ffff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .slide-in {
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
    ::-webkit-scrollbar-thumb { 
      background: linear-gradient(135deg, #00ff00, #00ffff);
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover { 
      background: linear-gradient(135deg, #00ffff, #ff00ff);
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }
      .text-4xl { font-size: 2rem !important; }
      .glass { padding: 16px !important; }
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold mb-8 bg-gradient-to-r from-green-400 to-cyan-400 bg-clip-text text-transparent">
      🎬 AI Video Generator
    </h1>
    
    <div class="glass rounded-xl p-6 neon mb-6">
      <h3 class="text-lg font-semibold mb-4 text-cyan-400">Generate Video</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Prompt</label>
          <textarea id="prompt" class="w-full p-3 bg-gray-800 border border-gray-600 rounded-lg text-white" 
                    placeholder="A futuristic city with flying cars at sunset..." rows="3"></textarea>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2">Duration (seconds)</label>
            <select id="duration" class="w-full p-3 bg-gray-800 border border-gray-600 rounded-lg text-white">
              <option value="3">3 seconds</option>
              <option value="5" selected>5 seconds</option>
              <option value="10">10 seconds</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Quality</label>
            <select id="quality" class="w-full p-3 bg-gray-800 border border-gray-600 rounded-lg text-white">
              <option value="512">512p</option>
              <option value="720" selected>720p</option>
              <option value="1080">1080p</option>
            </select>
          </div>
        </div>
        
        <button id="generateBtn" onclick="generateVideo()" 
                class="w-full bg-gradient-to-r from-green-500 to-cyan-500 text-white py-3 px-6 rounded-lg font-semibold hover:from-green-600 hover:to-cyan-600 transition-all">
          🚀 Generate Video
        </button>
      </div>
    </div>
    
    <div id="progressPanel" class="glass rounded-xl p-6 neon mb-6 hidden">
      <h3 class="text-lg font-semibold mb-4 text-cyan-400">Generation Progress</h3>
      <div class="space-y-3">
        <div class="flex justify-between text-sm">
          <span id="progressText">Initializing...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="w-full bg-gray-700 rounded-full h-3">
          <div id="progressBar" class="bg-gradient-to-r from-green-400 to-cyan-400 h-3 rounded-full progress-bar" style="width: 0%"></div>
        </div>
        <div id="progressDetails" class="text-xs text-gray-400"></div>
      </div>
    </div>
    
    <div id="resultsPanel" class="glass rounded-xl p-6 neon hidden">
      <h3 class="text-lg font-semibold mb-4 text-cyan-400">Generated Videos</h3>
      <div id="videoResults" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
  </div>

  <script>
    let socket;
    let currentJobId = null;
    
    function initVideoGenerator() {
      try {
        socket = io('http://localhost:5003');
        socket.on('progress', updateProgress);
        socket.on('completed', onVideoCompleted);
        socket.on('error', onVideoError);
      } catch (e) {
        console.log('Video generation service unavailable');
      }
    }
    
    async function generateVideo() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        alert('Please enter a prompt');
        return;
      }
      
      const duration = parseInt(document.getElementById('duration').value);
      const quality = parseInt(document.getElementById('quality').value);
      
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('progressPanel').classList.remove('hidden');
      
      try {
        const response = await fetch('http://localhost:5003/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            num_frames: duration * 24,
            height: quality,
            width: Math.floor(quality * 16/9)
          })
        });
        
        const data = await response.json();
        currentJobId = data.job_id;
        
        updateProgress({ progress: 0, step: 0, total: 100 });
      } catch (error) {
        console.error('Generation failed:', error);
        simulateGeneration();
      }
    }
    
    function updateProgress(data) {
      const percent = data.progress || 0;
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';
      document.getElementById('progressText').textContent = getProgressText(percent);
      document.getElementById('progressDetails').textContent = 
        `Step ${data.step || 0} of ${data.total || 100}`;
    }
    
    function getProgressText(percent) {
      if (percent < 20) return 'Initializing AI model...';
      if (percent < 40) return 'Processing prompt...';
      if (percent < 60) return 'Generating frames...';
      if (percent < 80) return 'Applying effects...';
      if (percent < 100) return 'Finalizing video...';
      return 'Complete!';
    }
    
    function onVideoCompleted(data) {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('progressPanel').classList.add('hidden');
      
      const resultsPanel = document.getElementById('resultsPanel');
      const videoResults = document.getElementById('videoResults');
      
      const videoCard = document.createElement('div');
      videoCard.className = 'bg-gray-800 rounded-lg p-4';
      videoCard.innerHTML = `
        <video controls class="w-full rounded mb-3">
          <source src="${data.download_url}" type="video/mp4">
        </video>
        <div class="text-sm text-gray-400">
          Generated in ${data.generation_time?.toFixed(1) || 'N/A'}s
        </div>
        <button onclick="downloadVideo('${data.download_url}')" 
                class="mt-2 bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">
          📥 Download
        </button>
      `;
      
      videoResults.appendChild(videoCard);
      resultsPanel.classList.remove('hidden');
    }
    
    function onVideoError(data) {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('progressPanel').classList.add('hidden');
      alert('Generation failed: ' + data.error);
    }
    
    function simulateGeneration() {
      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 10;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          setTimeout(() => {
            onVideoCompleted({
              download_url: '/demo-video.mp4',
              generation_time: 45.2
            });
          }, 500);
        }
        updateProgress({ progress: Math.floor(progress), step: Math.floor(progress), total: 100 });
      }, 300);
    }
    
    function downloadVideo(url) {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'generated-video.mp4';
      a.click();
    }
    
    document.addEventListener('DOMContentLoaded', initVideoGenerator);
  </script>
</body>
</html>
