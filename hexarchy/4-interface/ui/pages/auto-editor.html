<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Session Revocation System -->
    <script src="../assets/security/session-revocation.js"></script>
    
    <title>✂️ Auto Editor - Hootner</title>
    <link rel="stylesheet" href="shared-styles.css" />
    <!-- WARNING: CDN usage introduces supply chain risks. For production, host these locally with SRI hashes -->
    <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js"
      integrity="sha384-placeholder"
      crossorigin="anonymous"
    ></script>
    <style>
      .notif-item {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(0, 255, 0, 0.1);
        cursor: pointer;
        transition: background 0.2s;
      }
      .notif-item:hover {
        background: rgba(0, 255, 0, 0.05);
      }
      .notif-item.unread {
        background: rgba(0, 255, 255, 0.05);
        border-left: 3px solid #00ffff;
      }
      #notif-dropdown::-webkit-scrollbar {
        width: 6px;
      }
      #notif-dropdown::-webkit-scrollbar-track {
        background: rgba(0, 255, 0, 0.1);
      }
      #notif-dropdown::-webkit-scrollbar-thumb {
        background: rgba(0, 255, 0, 0.5);
        border-radius: 3px;
      }
      #notif-dropdown {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #notif-badge {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>

    <style>
      /* Content size fixes */
      body {
        padding-top: 260px !important;
        min-height: calc(100vh - 260px) !important;
      }
      nav {
        height: 250px !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        z-index: 1000 !important;
      }
      .main-content {
        margin-top: 0 !important;
        padding: 20px !important;
      }
    </style>

    <style>
      html {
        font-size: 12px !important;
      }
      body {
        zoom: 0.75 !important;
        transform: scale(1.1) !important;
        transform-origin: 0 0 !important;
        width: 90.91% !important;
      }
    </style>
    <style>
      /* Futuristic Cyberpunk Interface */
      @keyframes hologram {
        0% {
          opacity: 0.8;
          transform: translateY(0px);
        }
        50% {
          opacity: 1;
          transform: translateY(-2px);
        }
        100% {
          opacity: 0.8;
          transform: translateY(0px);
        }
      }
      @keyframes neural {
        0% {
          stroke-dashoffset: 100;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
      @keyframes quantum {
        0% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.1);
        }
        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      @keyframes matrix {
        0% {
          transform: translateY(-100vh);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh);
          opacity: 0;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 20px #00ffff;
        }
        50% {
          box-shadow:
            0 0 40px #ff00ff,
            0 0 60px #00ff00;
        }
      }
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-2px, 2px);
        }
        40% {
          transform: translate(-2px, -2px);
        }
        60% {
          transform: translate(2px, 2px);
        }
        80% {
          transform: translate(2px, -2px);
        }
        100% {
          transform: translate(0);
        }
      }
      @keyframes borderGlow {
        0% {
          border-color: #00ffff;
          box-shadow: 0 0 10px #00ffff;
        }
        33% {
          border-color: #ff00ff;
          box-shadow: 0 0 15px #ff00ff;
        }
        66% {
          border-color: #00ff00;
          box-shadow: 0 0 20px #00ff00;
        }
        100% {
          border-color: #00ffff;
          box-shadow: 0 0 10px #00ffff;
        }
      }
      .futuristic-border {
        border: 2px solid #00ffff;
        animation: borderGlow 3s ease-in-out infinite;
        border-radius: 8px;
      }
      .holographic {
        animation: none;
        background: linear-gradient(45deg, #00ffff, #ff00ff, #00ff00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .neural-network {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
      }
      .quantum-loader {
        width: 60px;
        height: 60px;
        position: relative;
        animation: none;
        transform-style: preserve-3d;
        perspective: 1000px;
      }
      .quantum-ring {
        border: 2px solid transparent;
        border-top: 2px solid #00ffff;
        border-radius: 50%;
        position: absolute;
        transform: rotateX(45deg) rotateY(30deg) translateZ(20px);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      }
      .matrix-rain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -2;
        overflow: hidden;
      }
      .matrix-char {
        position: absolute;
        color: #00ff00;
        font-family: monospace;
        animation: none;
      }
      .cyber-grid {
        background-image:
          linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .neon-pulse {
        animation: none;
      }
      .glitch-effect {
        animation: none;
      }
      * {
        border: 2px solid transparent !important;
      }
      .p-4,
      .p-6,
      .rounded,
      .border {
        border: 2px solid #00ffff !important;
        animation: borderGlow 3s ease-in-out infinite !important;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.5) !important;
      }
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.05) 0%, transparent 70%);
        pointer-events: none;
        z-index: -1;
      }
      .enhanced-text {
        text-shadow:
          0 0 10px currentColor,
          0 0 20px currentColor,
          0 0 30px currentColor;
      }
      button {
        transition: all 0.3s ease;
        transform: perspective(1000px) rotateX(0deg);
      }
      button:hover {
        transform: perspective(1000px) rotateX(-5deg) translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 255, 255, 0.3);
      }
      input,
      textarea {
        background: rgba(0, 0, 0, 0.5) !important;
        border: 1px solid #00ffff !important;
        color: #00ff00 !important;
        box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2) !important;
      }
      .particle {
        position: fixed;
        width: 2px;
        height: 2px;
        background: #00ffff;
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
        opacity: 0.7;
      }
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: linear-gradient(45deg, #0a0a0f, #1a1a2e);
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(45deg, #00ffff, #ff00ff);
        border-radius: 6px;
        animation: none;
      }
    </style>
  </head>
  <body
    style="
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: #00ff00;
    "
    class="cyber-grid"
  >
    <div class="matrix-rain"></div>
    <nav class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
      <div
        style="
          padding: 10px 15px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 18px;
        "
      >
        <div style="display: flex; align-items: center; gap: 24px">
          <a
            href="dashboard.html"
            style="
              font-size: 48px;
              font-weight: bold;
              background: linear-gradient(135deg, #00ff00, #00ffff, #ff00ff);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              text-decoration: none;
              margin-left: 0;
            "
            >🦉 HOOTNER</a
          >
          <div style="position: relative">
            <button
              onclick="toggleNotifications()"
              style="
                background: none;
                border: none;
                color: #00ffff;
                cursor: pointer;
                font-size: 24px;
                padding: 8px 16px;
                position: relative;
              "
              title="Notifications"
            >
              🔔
              <span
                id="notif-badge"
                style="
                  position: absolute;
                  top: 2px;
                  right: 2px;
                  background: #ef4444;
                  color: white;
                  border-radius: 50%;
                  width: 14px;
                  height: 14px;
                  font-size: 9px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-weight: bold;
                "
                >3</span
              >
            </button>
            <div
              id="notif-dropdown"
              style="
                display: none;
                position: fixed;
                top: 60px;
                right: 20px;
                width: 400px;
                max-width: calc(100vw - 40px);
                max-height: calc(100vh - 80px);
                background: rgba(10, 10, 15, 0.98);
                border: 2px solid rgba(0, 255, 0, 0.3);
                border-radius: 8px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
                z-index: 9999;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <div
                style="
                  padding: 12px 16px;
                  border-bottom: 1px solid rgba(0, 255, 0, 0.2);
                  flex-shrink: 0;
                "
              >
                <div
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 12px;
                  "
                >
                  <h3 style="color: #00ff00; font-size: 16px; font-weight: bold; margin: 0">
                    Notifications
                  </h3>
                  <div style="display: flex; gap: 8px; align-items: center">
                    <button
                      onclick="toggleNotifSound()"
                      id="sound-btn"
                      style="
                        background: none;
                        border: none;
                        color: #00ffff;
                        cursor: pointer;
                        font-size: 16px;
                      "
                      title="Toggle sound"
                    >
                      🔔
                    </button>
                    <button
                      onclick="clearAllNotifications()"
                      style="
                        background: none;
                        border: none;
                        color: #ef4444;
                        cursor: pointer;
                        font-size: 16px;
                      "
                      title="Clear all"
                    >
                      🗑️
                    </button>
                    <button
                      onclick="markAllRead()"
                      style="
                        background: none;
                        border: none;
                        color: #00ffff;
                        cursor: pointer;
                        font-size: 12px;
                      "
                    >
                      Mark all read
                    </button>
                  </div>
                </div>
                <input
                  type="text"
                  id="notif-search"
                  oninput="filterNotifications()"
                  placeholder="🔍 Search notifications..."
                  style="
                    width: 100%;
                    padding: 8px;
                    background: rgba(0, 0, 0, 0.3);
                    border: 1px solid rgba(0, 255, 0, 0.3);
                    border-radius: 4px;
                    color: #00ff00;
                    font-size: 13px;
                    margin-bottom: 8px;
                  "
                />
                <div style="display: flex; gap: 4px; flex-wrap: wrap">
                  <button
                    class="notif-filter active"
                    data-filter="all"
                    onclick="setNotifFilter('all')"
                    style="
                      padding: 4px 12px;
                      background: rgba(0, 255, 255, 0.2);
                      border: 1px solid rgba(0, 255, 255, 0.3);
                      border-radius: 12px;
                      color: #00ffff;
                      font-size: 11px;
                      cursor: pointer;
                    "
                  >
                    All
                  </button>
                  <button
                    class="notif-filter"
                    data-filter="like"
                    onclick="setNotifFilter('like')"
                    style="
                      padding: 4px 12px;
                      background: transparent;
                      border: 1px solid rgba(0, 255, 0, 0.3);
                      border-radius: 12px;
                      color: #00ff00;
                      font-size: 11px;
                      cursor: pointer;
                    "
                  >
                    ❤️ Likes
                  </button>
                  <button
                    class="notif-filter"
                    data-filter="comment"
                    onclick="setNotifFilter('comment')"
                    style="
                      padding: 4px 12px;
                      background: transparent;
                      border: 1px solid rgba(0, 255, 0, 0.3);
                      border-radius: 12px;
                      color: #00ff00;
                      font-size: 11px;
                      cursor: pointer;
                    "
                  >
                    💬 Comments
                  </button>
                  <button
                    class="notif-filter"
                    data-filter="follow"
                    onclick="setNotifFilter('follow')"
                    style="
                      padding: 4px 12px;
                      background: transparent;
                      border: 1px solid rgba(0, 255, 0, 0.3);
                      border-radius: 12px;
                      color: #00ff00;
                      font-size: 11px;
                      cursor: pointer;
                    "
                  >
                    👤 Follows
                  </button>
                  <button
                    class="notif-filter"
                    data-filter="system"
                    onclick="setNotifFilter('system')"
                    style="
                      padding: 4px 12px;
                      background: transparent;
                      border: 1px solid rgba(0, 255, 0, 0.3);
                      border-radius: 12px;
                      color: #00ff00;
                      font-size: 11px;
                      cursor: pointer;
                    "
                  >
                    ⚠️ System
                  </button>
                </div>
              </div>
              <div
                id="notif-list"
                style="
                  flex: 1;
                  overflow-y: auto;
                  min-height: 200px;
                  max-height: calc(100vh - 280px);
                "
              ></div>
              <div
                style="
                  padding: 12px;
                  text-align: center;
                  border-top: 1px solid rgba(0, 255, 0, 0.2);
                  display: flex;
                  gap: 8px;
                  justify-content: center;
                "
              >
                <button
                  onclick="loadMoreNotifications()"
                  style="
                    background: none;
                    border: none;
                    color: #00ffff;
                    font-size: 13px;
                    cursor: pointer;
                    text-decoration: underline;
                  "
                >
                  Load more
                </button>
                <span style="color: #6b7280">•</span>
                <a href="#" style="color: #00ffff; font-size: 13px; text-decoration: none"
                  >View all</a
                >
              </div>
            </div>
          </div>
        </div>
        <div class="flex gap-2 items-center">
          <a
            href="dashboard.html"
            style="font-size: 20px; text-decoration: none; padding: 8px 16px"
            class="text-green-400 font-medium"
            >← Back to Dashboard</a
          >
        </div>
      </div>
    </nav>

    <div style="padding: 20px">
      <div class="h-screen flex flex-col">
        <div
          style="
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid rgba(0, 255, 0, 0.3);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
          "
          class="flex-1 flex flex-col"
        >
          <div class="p-6" style="border-bottom: 1px solid rgba(0, 255, 0, 0.3)">
            <div style="display: flex; align-items: center; gap: 20px">
              <h2 class="text-2xl font-bold holographic enhanced-text">✂️ Auto Editor</h2>
              <div class="quantum-loader">
                <div class="quantum-ring" style="width: 100%; height: 100%"></div>
                <div
                  class="quantum-ring"
                  style="
                    width: 80%;
                    height: 80%;
                    top: 10%;
                    left: 10%;
                    border-color: #ff00ff;
                    animation-delay: -0.5s;
                  "
                ></div>
                <div
                  class="quantum-ring"
                  style="
                    width: 60%;
                    height: 60%;
                    top: 20%;
                    left: 20%;
                    border-color: #00ff00;
                    animation-delay: -1s;
                  "
                ></div>
              </div>
            </div>
            <p style="color: #00ffff" class="holographic enhanced-text">
              AI-powered collaborative video editing with FFmpeg
            </p>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 p-6 flex-1">
            <div
              style="
                background: rgba(10, 10, 15, 0.6);
                border: 1px solid rgba(0, 255, 0, 0.3);
                border-radius: 8px;
              "
              class="p-4 overflow-y-auto flex flex-col"
            >
              <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold holographic neon-pulse">📽️ Timeline</h3>
                <span id="timeline-stats" class="text-xs" style="color: #00ffff"
                  >0 clips • 0:00 total</span
                >
              </div>
              <div id="timeline" class="space-y-2 flex-1"></div>
              <div class="flex gap-2 mt-2">
                <button
                  onclick="undo()"
                  style="
                    background: linear-gradient(135deg, #ff00ff, #00ffff);
                    color: #fff;
                    font-weight: bold;
                  "
                  class="flex-1 px-4 py-2 rounded hover:opacity-80"
                >
                  ↩️ Undo
                </button>
                <button
                  onclick="redo()"
                  style="
                    background: linear-gradient(135deg, #ff00ff, #00ffff);
                    color: #fff;
                    font-weight: bold;
                  "
                  class="flex-1 px-4 py-2 rounded hover:opacity-80"
                >
                  ↪️ Redo
                </button>
              </div>
              <button
                onclick="addClip()"
                style="
                  background: linear-gradient(135deg, #00ff00, #00ffff);
                  color: #000;
                  font-weight: bold;
                "

              >
                + Add Clip
              </button>
              <button
                onclick="addClipFromUrl()"
                style="
                  background: linear-gradient(135deg, #00ff00, #00ffff);
                  color: #000;
                  font-weight: bold;
                "
                class="mt-2 w-full px-4 py-2 rounded hover:opacity-80"
              >
                🌐 Add from URL
              </button>
              <button
                onclick="loadFromCloud()"
                style="
                  background: linear-gradient(135deg, #4285f4, #34a853);
                  color: #fff;
                  font-weight: bold;
                "
                class="mt-2 w-full px-4 py-2 rounded hover:opacity-80"
              >
                ☁️ Load from Cloud
              </button>
              <button
                onclick="exportVideo()"
                style="
                  background: linear-gradient(135deg, #ff00ff, #00ffff);
                  color: #fff;
                  font-weight: bold;
                "
                class="mt-2 w-full px-4 py-2 rounded hover:opacity-80"
              >
                📤 Export Video
              </button>
              <button
                onclick="uploadToCloud()"
                style="
                  background: linear-gradient(135deg, #ea4335, #fbbc04);
                  color: #fff;
                  font-weight: bold;
                "
                class="mt-2 w-full px-4 py-2 rounded hover:opacity-80"
              >
                ☁️ Upload to Cloud
              </button>
            </div>

            <div
              style="
                background: #000;
                border: 2px solid rgba(0, 255, 0, 0.3);
                border-radius: 8px;
                position: relative;
              "
              class="flex flex-col lg:col-span-1"
            >
              <div
                style="
                  position: absolute;
                  top: 10px;
                  right: 10px;
                  z-index: 10;
                  display: flex;
                  gap: 8px;
                "
              >
                <button
                  onclick="playAll()"
                  style="
                    background: rgba(0, 0, 0, 0.7);
                    border: 1px solid rgba(0, 255, 0, 0.5);

                    padding: 8px 12px;

                    cursor: pointer;

                  "
                  title="Play All"

                  ▶️ All
                </button>
                <button

                    background: rgba(0, 0, 0, 0.7);
                    border: 1px solid rgba(0, 255, 0, 0.5);
                    color: #00ff00;
                    padding: 8px 12px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                  "
                  title="Rewind 5s"
                >
                  ⏪
                </button>
                <button
                  onclick="document.getElementById('preview').currentTime += 5"

                    background: rgba(0, 0, 0, 0.7);
                    border: 1px solid rgba(0, 255, 0, 0.5);
                    color: #00ff00;
                    padding: 8px 12px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                  "
                  title="Forward 5s"

                  ⏩
                </button>
                <button

                    document.getElementById('preview').playbackRate =

                    background: rgba(0, 0, 0, 0.7);
                    border: 1px solid rgba(0, 255, 0, 0.5);
                    color: #00ff00;
                    padding: 8px 12px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                  "
                  title="Speed"
                >
                  ⚡
                </button>
                <button
                  onclick="toggleFullscreen()"
                  style="
                    background: rgba(0, 0, 0, 0.7);
                    border: 1px solid rgba(0, 255, 0, 0.5);
                    color: #00ff00;
                    padding: 8px 12px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                  "
                  title="Fullscreen"
                >
                  🖥️
                </button>
                <button
                  onclick="previewEffects()"
                  style="
                    background: rgba(0, 0, 0, 0.7);
                    border: 1px solid rgba(0, 255, 0, 0.5);
                    color: #00ff00;
                    padding: 8px 12px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                  "
                  title="Preview Effects"
                >
                  🎥 Effects
                </button>
              </div>
              <video
                id="preview"
                style="display: none; width: 100%; height: 100%; object-fit: contain"

              ></video>
              <canvas id="preview-canvas" style="display: none; width: 100%; height: 100%"></canvas>

                id="placeholder"
                style="color: #00ff00"
                class="text-center flex-1 flex flex-col items-center justify-center"
              >
                <div class="text-6xl mb-4">🎬</div>
                <p class="text-lg mb-2">Add clips to preview</p>
                <p class="text-sm" style="color: #00ffff">Drag & drop or click "Add Clip"</p>
              </div>
            </div>

            <div
              style="
                background: rgba(10, 10, 15, 0.6);
                border: 1px solid rgba(0, 255, 0, 0.3);
                border-radius: 8px;
              "
              class="p-4 overflow-y-auto flex flex-col"
            >
              <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold holographic neon-pulse">🤖 AI Suggestions</h3>
                <button
                  onclick="renderSuggestions()"
                  style="
                    background: none;
                    border: none;
                    color: #00ffff;
                    cursor: pointer;
                    font-size: 16px;
                  "
                  title="Refresh"
                >
                  🔄
                </button>
              </div>
              <div id="suggestions" class="space-y-2 flex-1"></div>
              <div class="mt-4 flex gap-2">
                <input
                  id="ai-prompt"
                  type="text"
                  placeholder="e.g., Add funny effects"
                  style="
                    flex: 1;
                    padding: 8px;
                    background: rgba(0, 0, 0, 0.3);
                    border: 1px solid rgba(0, 255, 0, 0.3);
                    border-radius: 4px;
                    color: #00ff00;
                    font-size: 13px;
                  "
                />
                <button
                  onclick="askAI()"
                  style="
                    background: linear-gradient(135deg, #00ff00, #00ffff);
                    color: #000;
                    font-weight: bold;
                    padding: 8px 12px;
                    border-radius: 4px;
                  "
                >
                  🤖 Apply
                </button>
              </div>
              <div
                class="mt-4 p-3 rounded"
                style="background: rgba(255, 0, 255, 0.1); border: 1px solid rgba(255, 0, 255, 0.3)"
              >
                <p class="text-xs" style="color: #ff00ff">
                  💡 Tip: Click suggestions to apply AI enhancements
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        let ffmpeg = null;
        let isFFmpegLoaded = false;
        let undoStack = [];
        let redoStack = [];
        let analyticsLogs = JSON.parse(localStorage.getItem('analytics')) || [];

        let clips = [];
        let currentClip = null;
        let notifSound = true;
        let notifFilter = 'all';
        let cloudProvider = 'aws';
        const notifications = [
          { id: 1, type: 'system', msg: 'Video export completed', time: '2m ago', unread: true },
          { id: 2, type: 'comment', msg: 'Sarah commented on your edit', time: '5m ago', unread: true },
          { id: 3, type: 'like', msg: 'John liked your video', time: '10m ago', unread: true }
        ];

        const suggestions = [
          { action: 'trim', desc: 'Remove silent parts', icon: '✂️' },
          { action: 'enhance', desc: 'Improve audio quality', icon: '🎵' },
          { action: 'transition', desc: 'Add smooth transitions', icon: '✨' },
          { action: 'color', desc: 'Color correction', icon: '🎨' },
          { action: 'subtitle', desc: 'Auto-generate subtitles', icon: '📝' },
          { action: 'music', desc: 'Add background music', icon: '🎼' },
          { action: 'effects', desc: 'Apply visual effects', icon: '🌟' },
          { action: 'stabilize', desc: 'Stabilize shaky footage', icon: '📹' },
          { action: 'silence', desc: 'Remove silent parts', icon: '🔇' },
          { action: 'subtitles', desc: 'Generate subtitles', icon: '🗨️' },
          { action: 'voiceover', desc: 'Add voiceover', icon: '🗣️' },
          { action: 'noise', desc: 'Reduce background noise', icon: '📢' },
          { action: 'smart', desc: 'Smart assembly', icon: '🧠' },
          { action: 'overlay', desc: 'Add text overlay', icon: '📝' },
          { action: 'extractaudio', desc: 'Extract audio', icon: '🎧' }
        ];

        function logAnalytics(event) {
          analyticsLogs.push({ event, timestamp: new Date().toISOString() });
          localStorage.setItem('analytics', JSON.stringify(analyticsLogs));
        }

        function formatDuration(seconds) {
          const min = Math.floor(seconds / 60);
          const sec = Math.floor(seconds % 60);
          return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleNotifications() {
          const dropdown = document.getElementById('notif-dropdown');
          dropdown.style.display = dropdown.style.display === 'none' ? 'flex' : 'none';
          if (dropdown.style.display === 'flex') renderNotifications();
        }

        function toggleNotifSound() {
          notifSound = !notifSound;
          document.getElementById('sound-btn').textContent = notifSound ? '🔔' : '🔕';
        }

        function clearAllNotifications() {
          notifications.length = 0;
          renderNotifications();
          document.getElementById('notif-badge').style.display = 'none';
        }

        function markAllRead() {
          notifications.forEach(n => n.unread = false);
          renderNotifications();
          document.getElementById('notif-badge').style.display = 'none';
        }

        function setNotifFilter(filter) {
          notifFilter = filter;
          document.querySelectorAll('.notif-filter').forEach(btn => {
            btn.style.background = btn.dataset.filter === filter ? 'rgba(0,255,255,0.2)' : 'transparent';
            btn.style.borderColor = btn.dataset.filter === filter ? 'rgba(0,255,255,0.3)' : 'rgba(0,255,0,0.3)';
            btn.style.color = btn.dataset.filter === filter ? '#00ffff' : '#00ff00';
          });
          renderNotifications();
        }

        function filterNotifications() {
          renderNotifications();
        }

        function loadMoreNotifications() {
          alert('Loading more notifications...');
        }

        function renderNotifications() {
          const list = document.getElementById('notif-list');
          const search = document.getElementById('notif-search').value.toLowerCase();
          const filtered = notifications.filter(n =>
            (notifFilter === 'all' || n.type === notifFilter) &&
            n.msg.toLowerCase().includes(search)
          );

          list.innerHTML = filtered.length ? filtered.map(n => `
            <div class="notif-item ${n.unread ? 'unread' : ''}" onclick="markRead(${n.id})">
              <div style="display:flex;justify-content:space-between;align-items:start;">
                <div style="flex:1;">
                  <p style="color:#00ff00;font-size:14px;margin:0 0 4px 0;">${n.msg}</p>
                  <span style="color:#6b7280;font-size:12px;">${n.time}</span>
                </div>
                ${n.unread ? '<span style="color:#00ffff;font-size:12px;">●</span>' : ''}
              </div>
            </div>
          `).join('') : '<p style="color:#6b7280;text-align:center;padding:20px;">No notifications</p>';

          const unreadCount = notifications.filter(n => n.unread).length;
          const badge = document.getElementById('notif-badge');
          badge.textContent = unreadCount;
          badge.style.display = unreadCount ? 'flex' : 'none';
        }

        function markRead(id) {
          const notif = notifications.find(n => n.id === id);
          if (notif) notif.unread = false;
          renderNotifications();
        }

        function renderTimeline() {
          const timeline = document.getElementById('timeline');
          timeline.innerHTML = clips.map((c, i) => `
            <div draggable="true" ondragstart="dragStart(${i})" ondragover="allowDrop(event)" ondrop="drop(${i})" style="background:rgba(0,255,0,0.1);border:1px solid rgba(0,255,0,0.3);color:#00ff00;cursor:move;" class="p-3 rounded hover:bg-opacity-20">
              <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-medium">📹 Clip ${i + 1}</span>
                <div>
                  <button onclick="extractAudio(${i})" style="color:#00ffff;background:none;border:none;cursor:pointer;" title="Extract Audio">🎧</button>
                  <button onclick="removeClip(${i})" style="color:#ef4444;background:none;border:none;cursor:pointer;" title="Remove">✕</button>
                </div>
              </div>
              <div class="text-xs" style="color:#00ffff;">${formatDuration(c.duration)}</div>
              <div class="mt-2 flex gap-1">
                <button onclick="playClip(${i})" style="background:rgba(0,255,255,0.2);border:none;color:#00ffff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;">▶️ Play</button>
                <button onclick="editClip(${i})" style="background:rgba(0,255,0,0.2);border:none;color:#00ff00;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;">✏️ Edit</button>
              </div>
            </div>
          `).join('');
          const totalDuration = clips.reduce((sum, c) => sum + c.duration, 0);
          document.getElementById('timeline-stats').textContent = `${clips.length} clips • ${formatDuration(totalDuration)} total`;
        }

        let draggedIndex = null;
        function dragStart(i) { draggedIndex = i; }
        function allowDrop(e) { e.preventDefault(); }
        function drop(i) {
          if (draggedIndex !== null && draggedIndex !== i) {
            pushToUndo();
            const [item] = clips.splice(draggedIndex, 1);
            clips.splice(i, 0, item);
            renderTimeline();
            logAnalytics('clip_reordered');
          }
        }

        function pushToUndo() {
          undoStack.push(JSON.parse(JSON.stringify(clips)));
          redoStack = [];
        }

        function undo() {
          if (undoStack.length > 0) {
            redoStack.push(JSON.parse(JSON.stringify(clips)));
            clips = undoStack.pop();
            renderTimeline();
            logAnalytics('undo');
          }
        }

        function redo() {
          if (redoStack.length > 0) {
            undoStack.push(JSON.parse(JSON.stringify(clips)));
            clips = redoStack.pop();
            renderTimeline();
            logAnalytics('redo');
          }
        }

        function addClip() {
          pushToUndo();
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'video/*';
          input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
              processClip(file);
            }
          };
          input.click();
          logAnalytics('add_clip');
        }

        function addClipFromUrl() {
          pushToUndo();
          const url = prompt('Enter video URL:');
          if (url) {
            fetch(url)
              .then(res => res.blob())
              .then(blob => {
                processClip(blob, url);
              })
              .catch(err => alert('Error fetching URL: ' + err));
          }
          logAnalytics('add_clip_url');
        }

        function processClip(file, name = file.name) {
          const url = URL.createObjectURL(file);
          const video = document.createElement('video');
          video.src = url;
          video.onloadedmetadata = () => {
            clips.push({ name, duration: video.duration, file, url });
            renderTimeline();
            renderSuggestions();
            if (clips.length === 1) {
              document.getElementById('placeholder').style.display = 'none';
              document.getElementById('preview').style.display = 'block';
              document.getElementById('preview').src = url;
            }
          };
        }

        function removeClip(i) {
          pushToUndo();
          clips.splice(i, 1);
          renderTimeline();
          if (clips.length === 0) {
            document.getElementById('placeholder').style.display = 'flex';
            document.getElementById('preview').style.display = 'none';
          }
          logAnalytics('remove_clip');
        }

        function extractAudio(i) {
          const clip = clips[i];
          if (clip.file) {
            (async () => {
              if (!isFFmpegLoaded) await loadFFmpeg();
              ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
              await ffmpeg.run('-i', 'input.mp4', '-vn', 'output.mp3');
              const data = ffmpeg.FS('readFile', 'output.mp3');
              const blob = new Blob([data.buffer], { type: 'audio/mp3' });
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = `${clip.name}.mp3`;
              a.click();
              logAnalytics('extract_audio');
            })();
          }
        }

        function playClip(i) {
          currentClip = i;
          const clip = clips[i];
          if (clip.url) {
            document.getElementById('preview').src = clip.url;
            document.getElementById('preview').play();
          }
          logAnalytics('play_clip');
        }

        function playAll() {
          if (clips.length === 0) return;
          currentClip = 0;
          playClip(0);
          logAnalytics('play_all');
        }

        document.getElementById('preview').onended = () => {
          if (currentClip !== null && currentClip < clips.length - 1) {
            currentClip++;
            playClip(currentClip);
          }
        };

        function editClip(i) {
          const res = prompt('Enter new resolution (width:height):', '1280:720');
          const fps = prompt('Enter new FPS:', '30');
          if (res || fps) {
            applyResolutionFps(i, res, fps);
          }
          logAnalytics('edit_clip');
        }

        async function applyResolutionFps(i, res, fps) {
          if (!isFFmpegLoaded) await loadFFmpeg();
          const clip = clips[i];
          ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
          let args = ['-i', 'input.mp4'];
          if (res) args.push('-vf', `scale=${res}`);
          if (fps) args.push('-r', fps);
          args.push('output.mp4');
          await ffmpeg.run(...args);
          const data = ffmpeg.FS('readFile', 'output.mp4');
          const blob = new Blob([data.buffer], { type: 'video/mp4' });
          const url = URL.createObjectURL(blob);
          const video = document.createElement('video');
          video.src = url;
          video.onloadedmetadata = () => {
            clips[i] = { name: `${clip.name}_edited`, duration: video.duration, file: blob, url };
            renderTimeline();
            alert('Resolution/FPS applied!');
          };
        }

        function toggleFullscreen() {
          const preview = document.getElementById('preview');
          if (!document.fullscreenElement) {
            preview.requestFullscreen();
          } else {
            document.exitFullscreen();
          }
          logAnalytics('fullscreen');
        }

        function previewEffects() {
          const video = document.getElementById('preview');
          const canvas = document.getElementById('preview-canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          video.style.display = 'none';
          canvas.style.display = 'block';
          function draw() {
            if (!video.paused && !video.ended) {
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              // Apply example effect: invert colors
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imageData.data;
              for (let i = 0; i < data.length; i += 4) {
                data[i] = 255 - data[i];
                data[i + 1] = 255 - data[i + 1];
                data[i + 2] = 255 - data[i + 2];
              }
              ctx.putImageData(imageData, 0, 0);
              requestAnimationFrame(draw);
            }
          }
          video.play();
          draw();
          logAnalytics('preview_effects');
        }

        function renderSuggestions() {
          const container = document.getElementById('suggestions');
          container.innerHTML = suggestions.map((s, i) => `
            <div style="background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.3);color:#00ffff;cursor:pointer;" class="p-3 rounded hover:bg-opacity-20" onclick="applySuggestion('${s.action}')">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-lg">${s.icon}</span>
                <span class="text-sm font-medium">${s.action.charAt(0).toUpperCase() + s.action.slice(1)}</span>
              </div>
              <p class="text-xs" style="color:#00ff00;">${s.desc}</p>
            </div>
          `).join('');
        }

        async function applySuggestion(action) {
          pushToUndo();
          if (clips.length === 0) {
            alert('Add clips first!');
            return;
          }
          const clipIndex = clips.length - 1; // Apply to last clip for simplicity
          if (action === 'trim') {
            await applyTrim(clipIndex);
          } else if (action === 'silence') {
            await applySilenceRemoval(clipIndex);
          } else if (action === 'subtitles') {
            await applySubtitles(clipIndex);
          } else if (action === 'voiceover') {
            await applyVoiceover(clipIndex);
          } else if (action === 'noise') {
            await applyNoiseReduction(clipIndex);
          } else if (action === 'smart') {
            await applySmartAssembly();
          } else if (action === 'overlay') {
            await applyTextOverlay(clipIndex);
          } else if (action === 'extractaudio') {
            extractAudio(clipIndex);
          } else {
            alert(`Applying ${action}...`);
            setTimeout(() => alert(`${action} applied successfully! ✓`), 1000);
          }
          logAnalytics(`apply_${action}`);
        }

        async function applyTrim(index) {
          if (!isFFmpegLoaded) await loadFFmpeg();
          const clip = clips[index];
          const start = prompt('Enter start time (seconds):', '0');
          const duration = prompt('Enter duration (seconds):', clip.duration.toString());
          if (start && duration) {
            try {
              ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
              await ffmpeg.run('-i', 'input.mp4', '-ss', start, '-t', duration, '-c', 'copy', 'output.mp4');
              const data = ffmpeg.FS('readFile', 'output.mp4');
              const blob = new Blob([data.buffer], { type: 'video/mp4' });
              const url = URL.createObjectURL(blob);
              const video = document.createElement('video');
              video.src = url;
              video.onloadedmetadata = () => {
                clips[index] = { name: `${clip.name}_trimmed`, duration: video.duration, file: blob, url };
                renderTimeline();
                alert('Trim applied successfully! ✓');
              };
            } catch (e) {
              alert('Error applying trim: ' + e.message);
            }
          }
        }

        async function applySilenceRemoval(index) {
          if (!isFFmpegLoaded) await loadFFmpeg();
          const clip = clips[index];
          try {
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
            await ffmpeg.run('-i', 'input.mp4', '-af', 'silenceremove=1:0:-50dB', 'output.mp4');
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const video = document.createElement('video');
            video.src = url;
            video.onloadedmetadata = () => {
              clips[index] = { name: `${clip.name}_silence_removed`, duration: video.duration, file: blob, url };
              renderTimeline();
              alert('Silence removal applied! ✓');
            };
          } catch (e) {
            alert('Error applying silence removal: ' + e.message);
          }
        }

        async function applySubtitles(index) {
          alert('Subtitles generation is stubbed. In real impl, use Transcribe.js or similar.');
          // TODO: Integrate Transcribe.js for STT
        }

        async function applyVoiceover(index) {
          const text = prompt('Enter voiceover text:');
          if (text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const audioCtx = new AudioContext();
            const dest = audioCtx.createMediaStreamDestination();
            const recorder = new MediaRecorder(dest.stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
              const blob = new Blob(chunks, { type: 'audio/webm' });
              if (!isFFmpegLoaded) await loadFFmpeg();
              const clip = clips[index];
              ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
              ffmpeg.FS('writeFile', 'voice.webm', await fetchFile(blob));
              await ffmpeg.run('-i', 'input.mp4', '-i', 'voice.webm', '-filter_complex', '[0:a][1:a]amix=inputs=2:duration=first', 'output.mp4');
              const data = ffmpeg.FS('readFile', 'output.mp4');
              const newBlob = new Blob([data.buffer], { type: 'video/mp4' });
              const url = URL.createObjectURL(newBlob);
              const video = document.createElement('video');
              video.src = url;
              video.onloadedmetadata = () => {
                clips[index] = { name: `${clip.name}_voiceover`, duration: video.duration, file: newBlob, url };
                renderTimeline();
                alert('Voiceover applied! ✓');
              };
            };
            // Connect speech to recorder
            // Note: SpeechSynthesis doesn't directly connect, need hack or library
            alert('Voiceover recording stubbed. Use SpeechSynthesisRecorder for full impl.');
            utterance.onend = () => recorder.stop();
            speechSynthesis.speak(utterance);
            recorder.start();
          }
        }

        async function applyNoiseReduction(index) {
          if (!isFFmpegLoaded) await loadFFmpeg();
          const clip = clips[index];
          try {
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
            await ffmpeg.run('-i', 'input.mp4', '-af', 'afftdn', 'output.mp4');
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const video = document.createElement('video');
            video.src = url;
            video.onloadedmetadata = () => {
              clips[index] = { name: `${clip.name}_noise_reduced`, duration: video.duration, file: blob, url };
              renderTimeline();
              alert('Noise reduction applied! ✓');
            };
          } catch (e) {
            alert('Error applying noise reduction: ' + e.message);
          }
        }

        async function applySmartAssembly() {
          // Stub: just concat with fade transition
          await exportVideo('mp4', true); // true for smart with transitions
          alert('Smart assembly applied (concat with fades)!');
        }

        async function applyTextOverlay(index) {
          const text = prompt('Enter text to overlay:');
          const pos = prompt('Enter position (x:y):', '10:10');
          if (text && pos) {
            if (!isFFmpegLoaded) await loadFFmpeg();
            const clip = clips[index];
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(clip.file));
            await ffmpeg.run('-i', 'input.mp4', '-vf', `drawtext=text='${text}':x=${pos.split(':')[0]}:y=${pos.split(':')[1]}:fontsize=24:fontcolor=white`, 'output.mp4');
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const video = document.createElement('video');
            video.src = url;
            video.onloadedmetadata = () => {
              clips[index] = { name: `${clip.name}_overlay`, duration: video.duration, file: blob, url };
              renderTimeline();
              alert('Text overlay applied! ✓');
            };
          }
        }

        function askAI() {
          const prompt = document.getElementById('ai-prompt').value;
          if (prompt) {
            alert(`Applying custom AI: ${prompt}...`);
            setTimeout(() => alert(`Custom AI applied successfully! ✓`), 1000);
            logAnalytics('ask_ai');
          }
        }

        async function uploadToCloud() {
          if (clips.length === 0) {
            alert('Add clips to upload!');
            return;
          }
          const provider = prompt('Select provider (aws/gdrive/dropbox):', cloudProvider);
          if (!provider) return;
          cloudProvider = provider;
          try {
            for (let i = 0; i < clips.length; i++) {
              const clip = clips[i];
              const formData = new FormData();
              formData.append('file', clip.file, clip.name);
              formData.append('provider', provider);
              const response = await fetch('/api/cloud/upload', { method: 'POST', body: formData });
              if (!response.ok) throw new Error('Upload failed');
            }
            alert(`✓ Uploaded ${clips.length} clips to ${provider.toUpperCase()}`);
            notifications.unshift({ id: Date.now(), type: 'system', msg: `Uploaded to ${provider}`, time: 'Just now', unread: true });
            renderNotifications();
            logAnalytics('upload_cloud');
          } catch (e) {
            alert('Upload failed: ' + e.message);
          }
        }

        async function loadFromCloud() {
          const provider = prompt('Select provider (aws/gdrive/dropbox):', cloudProvider);
          if (!provider) return;
          cloudProvider = provider;
          try {
            const response = await fetch(`/api/cloud/list?provider=${provider}`);
            if (!response.ok) throw new Error('Failed to fetch files');
            const files = await response.json();
            if (files.length === 0) {
              alert('No files found in cloud storage');
              return;
            }
            const fileList = files.map((f, i) => `${i + 1}. ${f.name}`).join('\n');
            const selection = prompt(`Select file number:\n${fileList}`);
            if (!selection) return;
            const fileIndex = parseInt(selection) - 1;
            if (fileIndex < 0 || fileIndex >= files.length) {
              alert('Invalid selection');
              return;
            }
            const selectedFile = files[fileIndex];
            const downloadResponse = await fetch(`/api/cloud/download?provider=${provider}&key=${selectedFile.key}`);
            if (!downloadResponse.ok) throw new Error('Download failed');
            const blob = await downloadResponse.blob();
            processClip(blob, selectedFile.name);
            alert(`✓ Loaded ${selectedFile.name} from ${provider.toUpperCase()}`);
            logAnalytics('load_cloud');
          } catch (e) {
            alert('Load failed: ' + e.message);
          }
        }

        async function loadFFmpeg() {
          if (!ffmpeg) {
            ffmpeg = createFFmpeg({ log: true });
          }
          try {
            await ffmpeg.load();
            isFFmpegLoaded = true;
          } catch (error) {
            alert('Failed to load FFmpeg: ' + error.message);
            throw error;
          }
        }

        async function exportVideo(format = prompt('Export format (mp4/webm/mov/gif):', 'mp4'), optimize = confirm('Optimize for web?'), smart = false) {
          if (clips.length === 0) {
            alert('Add clips to export!');
            return;
          }
          if (!format) return;
          alert(`Exporting as ${format}... This may take a few minutes.`);
          if (!isFFmpegLoaded) {
            await loadFFmpeg();
          }
          try {
            // Write clips to FS
            for (let i = 0; i < clips.length; i++) {
              ffmpeg.FS('writeFile', `clip${i}.mp4`, await fetchFile(clips[i].file));
            }
            // Create concat list
            let concatList = clips.map((_, i) => `file 'clip${i}.mp4'`).join('\n');
            ffmpeg.FS('writeFile', 'concat.txt', concatList);
            // Run concat with optional transitions for smart
            let args = ['-f', 'concat', '-safe', '0', '-i', 'concat.txt'];
            if (smart) {
              args.push('-filter_complex', clips.map((_, i) => `[${i}:v]fade=t=out:st=${clips[i].duration-0.5}:d=0.5[v${i}];` + clips.slice(1).map((_, j) => `[v${j}][${j+1}:v]overlay`).join(';'));
            }
            if (optimize && format !== 'gif') args.push('-crf', '23', '-preset', 'medium');
            if (format === 'gif') {
              args = ['-f', 'concat', '-safe', '0', '-i', 'concat.txt', '-vf', 'fps=10,scale=320:-1:flags=lanczos,palettegen', 'palette.png'];
              await ffmpeg.run(...args);
              args = ['-i', 'concat.txt', '-i', 'palette.png', '-filter_complex', 'fps=10,scale=320:-1:flags=lanczos[x];[x][1:v]paletteuse', 'output.gif'];
            } else {
              args.push('-c', 'copy', `output.${format}`);
            }
            await ffmpeg.run(...args);
            // Read output
            const ext = format === 'gif' ? 'gif' : format;
            const data = ffmpeg.FS('readFile', `output.${ext}`);
            const mimeType = ext === 'gif' ? 'image/gif' : ext === 'webm' ? 'video/webm' : ext === 'mov' ? 'video/quicktime' : 'video/mp4';
            const blob = new Blob([data.buffer], { type: mimeType });
            const url = URL.createObjectURL(blob);
            // Download
            const a = document.createElement('a');
            a.href = url;
            a.download = `export.${ext}`;
            a.click();
            alert('Export complete! ✓');
            notifications.unshift({ id: Date.now(), type: 'system', msg: `Video exported as ${format}`, time: 'Just now', unread: true });
            renderNotifications();
            logAnalytics('export_video');
          } catch (error) {
            alert('Export failed: ' + error.message);
          }
        }

        document.addEventListener('click', (e) => {
          const dropdown = document.getElementById('notif-dropdown');
          const btn = e.target.closest('button[onclick="toggleNotifications()"]');
          if (!dropdown.contains(e.target) && !btn) dropdown.style.display = 'none';
        });

        // Particle System
        function createParticles() {
          setInterval(() => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 5000);
          }, 200);
        }

        // Enhanced Visual Effects
        function enhanceVisuals() {
          document.querySelectorAll('h3').forEach(h => h.classList.add('enhanced-text'));
          document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
              btn.style.filter = 'brightness(1.2) saturate(1.5)';
            });
            btn.addEventListener('mouseleave', () => {
              btn.style.filter = 'brightness(1) saturate(1)';
            });
          });
        }

        // Theme Switcher
        let currentTheme = 'neon';
        function switchTheme() {
          const themes = ['neon', 'matrix', 'cyberpunk', 'quantum'];
          currentTheme = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
          document.body.className = `cyber-grid theme-${currentTheme}`;
        }

        createParticles();
        enhanceVisuals();
        renderTimeline();
        renderSuggestions();
        renderNotifications();
      </script>
      <div class="main-content"></div>
    </div>
  </body>
</html>
