          verified: true,
          color: 'from-cyan-400 to-cyan-600',

      let currentCategory = 'all';

      function renderProducts() {
        const filtered =
          currentCategory === 'all'
            ? products
            : products.filter(p => p.category === currentCategory);
        document.getElementById('products').innerHTML = filtered
          .map(
            p => `
        <div style="background: rgba(10, 10, 15, 0.8); border-radius: 12px; overflow: hidden; transition: all 0.3s; border: 2px solid transparent; background-image: linear-gradient(rgba(10, 10, 15, 0.8), rgba(10, 10, 15, 0.8)), linear-gradient(135deg, #00ff00, #00ffff, #ff00ff, #ffff00); background-origin: border-box; background-clip: padding-box, border-box; box-shadow: 0 0 20px rgba(0,255,0,0.3);" onmouseover="this.style.transform='translateY(-5px)';this.style.boxShadow='0 0 30px rgba(0,255,0,0.5)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 0 20px rgba(0,255,0,0.3)'">
          <div style="height: 12rem; background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,255,255,0.2)); display: flex; align-items: center; justify-content: center; font-size: 4rem;">
            ${p.category === 'code' ? '💻' : p.category === 'design' ? '🎨' : p.category === 'templates' ? '📄' : '🔌'}
          </div>
          <div style="padding: 1.5rem;">
            <div style="display: flex; align-items: start; justify-content: space-between; margin-bottom: 0.5rem;">
              <h3 style="font-weight: bold; font-size: 1.125rem; color: #00ff00;">${p.name}</h3>
              ${p.verified ? '<span style="color: #10b981; font-size: 1.25rem;">✓</span>' : ''}
            </div>
            <p style="color: #00ffff; font-size: 0.875rem; margin-bottom: 1rem;">High-quality digital product</p>
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 1.5rem; font-weight: bold; color: #00ff00;">${p.price}</span>
              <button onclick="buyNow(${p.id})" style="padding: 0.5rem 1.5rem; background: linear-gradient(135deg, #00ffff, #ff00ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;" onmouseover="this.style.background='linear-gradient(135deg, #ff00ff, #ffff00)'" onmouseout="this.style.background='linear-gradient(135deg, #00ffff, #ff00ff)'">Buy Now</button>
            </div>
          </div>
        </div>
      `
          )
          .join('');
      }

      function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.className =
            'category-btn px-6 py-2 rounded-lg font-medium whitespace-nowrap transition';
          btn.style.background = 'rgba(0,255,255,0.2)';
          btn.style.color = '#00ffff';
          btn.style.border = '1px solid rgba(0,255,255,0.3)';
        });
        event.target.className =
          'category-btn px-6 py-2 rounded-lg font-medium whitespace-nowrap transition';
        event.target.style.background =
          'linear-gradient(135deg, #00ffff, #ff00ff)';
        event.target.style.color = 'white';
        event.target.style.border = 'none';
        renderProducts();
      }

      function buyNow(id) {
        const product = products.find(p => p.id === id);
        
        // Simulate Stripe checkout integration
        const checkoutData = {
          productId: id,
          productName: product.name,
          price: product.price,
          currency: 'USD',
          successUrl: window.location.origin + '/marketplace?success=true',
          cancelUrl: window.location.origin + '/marketplace?canceled=true'
        };
        
        // In real implementation, this would redirect to Stripe Checkout
        if (confirm(`Purchase ${product.name} for $${product.price}?\n\nThis will redirect to Stripe Checkout.`)) {
          // Simulate successful purchase
          setTimeout(() => {
            alert(`✅ Purchase successful!\n\nProduct: ${product.name}\nPrice: $${product.price}\n\nDownload link sent to your email.`);
            
            // Add purchase notification
            const purchaseNotif = {
              id: Date.now(),
              type: 'system',
              user: 'HOOTNER Store',
              text: `Successfully purchased "${product.name}"`,
              time: 'Just now',
              timestamp: Date.now(),
              unread: true,
              icon: '🛒',
              group: 'today'
            };
            
            notifications.unshift(purchaseNotif);
            updateBadge();
            
            if (notifSoundEnabled) playNotificationSound();
          }, 1500);
        }
      }

      renderProducts();

      let notifications = [
        {
          id: 1,
          type: 'like',
          user: 'john_dev',
          text: 'liked your product "React Component Pack"',
          time: '5m ago',
          timestamp: Date.now() - 300000,
          unread: true,
          icon: '❤️',
          group: 'today',
        },
        {
          id: 2,
          type: 'comment',
          user: 'sarah_designer',
          text: 'commented on "UI Design System"',
          time: '1h ago',
          timestamp: Date.now() - 3600000,
          unread: true,
          icon: '💬',
          group: 'today',
        },
        {
          id: 3,
          type: 'follow',
          user: 'mike_coder',
          text: 'started following you',
          time: '2h ago',
          timestamp: Date.now() - 7200000,
          unread: true,
          icon: '👤',
          group: 'today',
        },
        {
          id: 4,
          type: 'mention',
          user: 'react_master',
          text: 'mentioned you in a post',
          time: '3h ago',
          timestamp: Date.now() - 10800000,
          unread: false,
          icon: '@',
          group: 'today',
        },
        {
          id: 5,
          type: 'system',
          user: 'HOOTNER',
          text: 'Your product "API Integration Kit" has a new review',
          time: '5h ago',
          timestamp: Date.now() - 18000000,
          unread: false,
          icon: '⚠️',
          group: 'today',
        },
        {
          id: 6,
          type: 'like',
          user: 'dev_master',
          text: 'and 5 others liked your product',
          time: '1d ago',
          timestamp: Date.now() - 86400000,
          unread: false,
          icon: '❤️',
          group: 'yesterday',
        },
        {
          id: 7,
          type: 'follow',
          user: 'code_ninja',
          text: 'started following you',
          time: '1d ago',
          timestamp: Date.now() - 90000000,
          unread: false,
          icon: '👤',
          group: 'yesterday',
        },
        {
          id: 8,
          type: 'system',
          user: 'HOOTNER',
          text: 'New feature: Bulk discounts now available!',
          time: '2d ago',
          timestamp: Date.now() - 172800000,
          unread: false,
          icon: '🎉',
          group: 'older',
        },
      ];
      let notifFilter = 'all';
      let notifSoundEnabled = true;

      function toggleNotifications() {
        const dropdown = document.getElementById('notif-dropdown');
        const isVisible = dropdown.style.display === 'flex';
        if (isVisible) {
          dropdown.style.display = 'none';
        } else {
          dropdown.style.display = 'flex';
          renderNotifications();
        }
      }

      function renderNotifications() {
        const container = document.getElementById('notif-list');
        if (!container) return;
        const searchInput = document.getElementById('notif-search');
        const searchQuery = searchInput ? searchInput.value.toLowerCase() : '';

        let filtered = notifications.filter(n => {
          if (notifFilter !== 'all' && n.type !== notifFilter) return false;
          if (
            searchQuery &&
            !n.text.toLowerCase().includes(searchQuery) &&
            !n.user.toLowerCase().includes(searchQuery)
          )
            return false;
          return true;
        });

        if (filtered.length === 0) {
          container.innerHTML =
            '<div style="padding:40px 20px;text-align:center;color:#6b7280;font-size:13px;">No notifications found</div>';
          return;
        }

        const grouped = { today: [], yesterday: [], older: [] };
        filtered.forEach(n => grouped[n.group].push(n));

        let html = '';
        ['today', 'yesterday', 'older'].forEach(group => {
          if (grouped[group].length > 0) {
            html += `<div style="padding:8px 16px;background:rgba(0,255,0,0.05);border-bottom:1px solid rgba(0,255,0,0.1);font-size:11px;font-weight:bold;color:#6b7280;text-transform:uppercase;">${group}</div>`;
            html += grouped[group]
              .map(
                n => `
            <div class="notif-item ${n.unread ? 'unread' : ''}">
              <div style="display:flex;gap:12px;align-items:start;">
                <div style="font-size:24px;flex-shrink:0;">${n.icon}</div>
                <div style="flex:1;min-width:0;" onclick="markRead(${n.id})">
                  <div style="color:#00ff00;font-weight:bold;font-size:13px;margin-bottom:4px;">@${n.user}</div>
                  <div style="color:#00ffff;font-size:13px;margin-bottom:4px;">${n.text}</div>
                  <div style="color:#6b7280;font-size:11px;">${n.time}</div>
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  ${n.unread ? '<div style="width:8px;height:8px;background:#00ffff;border-radius:50%;margin-top:6px;"></div>' : ''}
                  <button onclick="deleteNotification(${n.id});event.stopPropagation()" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;opacity:0.5;" title="Delete">✕</button>
                </div>
              </div>
            </div>
          `
              )
              .join('');
          }
        });

        container.innerHTML = html;
      }

      function markRead(id) {
        event.stopPropagation();
        const notif = notifications.find(n => n.id === id);
        if (notif) notif.unread = false;
        updateBadge();
        renderNotifications();
      }

      function markAllRead() {
        event.stopPropagation();
        notifications.forEach(n => (n.unread = false));
        updateBadge();
        renderNotifications();
        alert('All notifications marked as read');
      }

      function deleteNotification(id) {
        event.stopPropagation();
        notifications = notifications.filter(n => n.id !== id);
        updateBadge();
        renderNotifications();
      }

      function clearAllNotifications() {
        event.stopPropagation();
        if (confirm('Clear all notifications? This cannot be undone.')) {
          notifications = [];
          updateBadge();
          renderNotifications();
          alert('All notifications cleared');
        }
      }

      function setNotifFilter(filter) {
        event.stopPropagation();
        notifFilter = filter;
        document.querySelectorAll('.notif-filter').forEach(btn => {
          btn.classList.remove('active');
          btn.style.background = 'transparent';
        });
        const activeBtn = document.querySelector(`[data-filter="${filter}"]`);
        if (activeBtn) {
          activeBtn.classList.add('active');
          activeBtn.style.background = 'rgba(0,255,255,0.2)';
        }
        renderNotifications();
      }

      function filterNotifications() {
        renderNotifications();
      }

      function toggleNotifSound() {
        event.stopPropagation();
        notifSoundEnabled = !notifSoundEnabled;
        const btn = document.getElementById('sound-btn');
        btn.textContent = notifSoundEnabled ? '🔔' : '🔕';
        btn.style.opacity = notifSoundEnabled ? '1' : '0.5';
        alert(
          notifSoundEnabled
            ? 'Notification sound enabled'
            : 'Notification sound disabled'
        );
      }

      function loadMoreNotifications() {
        event.stopPropagation();
        const newNotifs = [
          {
            id: Date.now(),
            type: 'like',
            user: 'user_' + Math.floor(Math.random() * 1000),
            text: 'liked your product',
            time: 'Just now',
            timestamp: Date.now(),
            unread: true,
            icon: '❤️',
            group: 'today',
          },
          {
            id: Date.now() + 1,
            type: 'comment',
            user: 'dev_' + Math.floor(Math.random() * 1000),
            text: 'commented on your listing',
            time: 'Just now',
            timestamp: Date.now(),
            unread: true,
            icon: '💬',
            group: 'today',
          },
        ];
        notifications = [...newNotifs, ...notifications];
        updateBadge();
        renderNotifications();
        if (notifSoundEnabled) playNotificationSound();
        alert('Loaded 2 new notifications');
      }

      function playNotificationSound() {
        const audio = new Audio(
          'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDajzsKElyx6OyrWBUIQ5zd8sFuJAUuhM/z24k2CBhku+zooVARC0yl4fG5ZRwFNo3V7859KQUofsz'
        );
        audio.volume = 0.3;
        audio.play().catch(() => {});
      }

      function updateBadge() {
        const unreadCount = notifications.filter(n => n.unread).length;
        const badge = document.getElementById('notif-badge');
        if (unreadCount > 0) {
          badge.textContent = unreadCount;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      }

      function simulateRealTimeNotifications() {
        setInterval(() => {
          if (Math.random() > 0.7) {
            const types = ['like', 'comment', 'follow', 'mention'];
            const icons = ['❤️', '💬', '👤', '@'];
            const texts = [
              'liked your product',
              'commented on your listing',
              'started following you',
              'mentioned you',
            ];
            const idx = Math.floor(Math.random() * types.length);

            const newNotif = {
              id: Date.now(),
              type: types[idx],
              user: 'user_' + Math.floor(Math.random() * 1000),
              text: texts[idx],
              time: 'Just now',
              timestamp: Date.now(),
              unread: true,
              icon: icons[idx],
              group: 'today',
            };

            notifications.unshift(newNotif);
            updateBadge();
            const dropdown = document.getElementById('notif-dropdown');
            if (dropdown && dropdown.style.display === 'flex') {
              renderNotifications();
            }
            if (notifSoundEnabled) playNotificationSound();
          }
        }, 30000);
      }

      document.addEventListener('click', e => {
        const dropdown = document.getElementById('notif-dropdown');
        const notifBtn = e.target.closest(
          'button[onclick="toggleNotifications()"]'
        );
        const insideDropdown = e.target.closest('#notif-dropdown');

        if (dropdown && !insideDropdown && !notifBtn) {
          dropdown.style.display = 'none';
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        updateBadge();
        simulateRealTimeNotifications();
      });
    </script>
    <div class="main-content"></div>
  </body>
</html>
