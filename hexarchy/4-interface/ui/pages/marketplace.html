<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="shared-styles.css" />
  <title>🛒 Marketplace - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #0a0a0f);
      color: #00ff00;
    }

    .product-card {
      transition: all 0.3s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
    }
  </style>
</head>

<body class="min-h-screen">
  <script src="../components/auth-guard.js"></script>
  <script src="../components/header-enhanced.js"></script>

  <div style="padding: 20px; max-width: 1400px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <div>
        <h1 style="font-size: 2rem; font-weight: bold; color: #00ff00; margin-bottom: 8px;">🛒 Marketplace</h1>
        <p style="color: #00ffff; margin: 0;">Secure digital storefront powered by Stripe</p>
      </div>
      <button onclick="toggleCart()"
        style="position: relative; padding: 12px 24px; background: linear-gradient(135deg, #00ffff, #ff00ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;"
        onmouseover="this.style.background='linear-gradient(135deg, #ff00ff, #ffff00)'"
        onmouseout="this.style.background='linear-gradient(135deg, #00ffff, #ff00ff)'">
        🛒 Cart
        <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
      </button>
    </div>

    <div style="display: flex; gap: 16px; margin-bottom: 24px;">
      <input type="text" id="search-input" placeholder="🔍 Search products..." oninput="filterProducts()"
        style="flex: 1; padding: 12px 16px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 8px; color: #00ff00; font-size: 14px;">
      <select id="sort-select" onchange="filterProducts()"
        style="padding: 12px 16px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 8px; color: #00ff00; font-size: 14px; cursor: pointer;">
        <option value="default">Sort by</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="name">Name A-Z</option>
      </select>
    </div>

    <div style="display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;">
      <button onclick="setCategory('all')" class="category-btn" data-category="all"
        style="padding: 10px 20px; background: linear-gradient(135deg, #00ffff, #ff00ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap;">All</button>
      <button onclick="setCategory('code')" class="category-btn" data-category="code"
        style="padding: 10px 20px; background: rgba(0, 255, 255, 0.2); color: #00ffff; border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap;">💻
        Code</button>
      <button onclick="setCategory('design')" class="category-btn" data-category="design"
        style="padding: 10px 20px; background: rgba(0, 255, 255, 0.2); color: #00ffff; border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap;">🎨
        Design</button>
      <button onclick="setCategory('templates')" class="category-btn" data-category="templates"
        style="padding: 10px 20px; background: rgba(0, 255, 255, 0.2); color: #00ffff; border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap;">📄
        Templates</button>
      <button onclick="setCategory('plugins')" class="category-btn" data-category="plugins"
        style="padding: 10px 20px; background: rgba(0, 255, 255, 0.2); color: #00ffff; border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap;">🔌
        Plugins</button>
    </div>

    <div id="products" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
    </div>
  </div>

  <div id="cart-modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 10000; display: flex; align-items: center; justify-content: center;">
    <div
      style="background: linear-gradient(135deg, #0a0a0f, #1a1a2e); border: 3px solid; border-image: linear-gradient(135deg, #00ff00, #00ffff, #ff00ff) 1; border-radius: 24px; padding: 32px; min-width: 500px; max-width: 600px; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 1.5rem; font-weight: bold; color: #00ff00;">🛒 Shopping Cart</h2>
        <button onclick="toggleCart()"
          style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 24px;">✕</button>
      </div>
      <div id="cart-items" style="margin-bottom: 24px;"></div>
      <div style="border-top: 2px solid rgba(0, 255, 0, 0.3); padding-top: 16px; margin-top: 16px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <span style="font-size: 1.25rem; font-weight: bold; color: #00ffff;">Total:</span>
          <span id="cart-total" style="font-size: 1.5rem; font-weight: bold; color: #00ff00;">$0</span>
        </div>
        <button onclick="checkout()"
          style="width: 100%; padding: 16px; background: linear-gradient(135deg, #00ff00, #00ffff); color: #000; border: none; border-radius: 12px; cursor: pointer; font-size: 1.125rem; font-weight: bold; transition: all 0.3s;"
          onmouseover="this.style.background='linear-gradient(135deg, #00ffff, #ff00ff)'"
          onmouseout="this.style.background='linear-gradient(135deg, #00ff00, #00ffff)'">Checkout with Stripe</button>
      </div>
    </div>
  </div>

  <script src="../components/footer-enhanced.js"></script>

  <script>
    const API_URL = 'http://localhost:4000/api/marketplace';
    let products = [];
    let currentCategory = 'all';
    let currentPage = 1;
    let hasMore = true;
    let loading = false;
    let cart = JSON.parse(localStorage.getItem('hootner_cart') || '[]');
    const stripe = Stripe('pk_test_51234567890');

    async function loadProducts(reset = false) {
      if (loading || (!hasMore && !reset)) return;
      loading = true;
      document.getElementById('loading').style.display = 'block';

      try {
        if (reset) {
          currentPage = 1;
          products = [];
        }

        const params = new URLSearchParams();
        if (currentCategory !== 'all') params.append('category', currentCategory);
        const search = document.getElementById('search-input').value;
        if (search) params.append('search', search);
        const sort = document.getElementById('sort-select').value;
        if (sort !== 'default') params.append('sort', sort);
        params.append('page', currentPage);
        params.append('limit', 9);

        const res = await fetch(`${API_URL}/products?${params}`);
        const data = await res.json();

        products = reset ? data.products : [...products, ...data.products];
        hasMore = data.hasMore;
        currentPage++;

        renderProducts(reset);
      } catch (error) {
        console.error('Failed to load products:', error);
        showNotification('❌ Failed to load products');
      } finally {
        loading = false;
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderProducts(reset = false) {
      const container = document.getElementById('products');
      const html = products.map(p => `
          <div class="product-card" style="background: rgba(10, 10, 15, 0.8); border-radius: 12px; overflow: hidden; border: 2px solid rgba(0, 255, 0, 0.3); box-shadow: 0 0 20px rgba(0,255,0,0.3); display: flex; gap: 24px; padding: 24px;">
            <div style="width: 200px; height: 200px; flex-shrink: 0; background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,255,255,0.2)); display: flex; align-items: center; justify-content: center; font-size: 4rem; border-radius: 8px;">${p.icon}</div>
            <div style="flex: 1; display: flex; flex-direction: column;">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                <h3 style="font-weight: bold; font-size: 1.5rem; color: #00ff00;">${p.name}</h3>
                ${p.verified ? '<span style="color: #10b981; font-size: 1.5rem;" title="Verified seller">✓</span>' : ''}
              </div>
              <p style="color: #00ffff; font-size: 1rem; margin-bottom: 16px; flex: 1;">${p.description}</p>
              <div style="display: flex; gap: 12px; margin-bottom: 16px; font-size: 0.875rem; color: #6b7280;">
                <span>⭐ ${p.rating}</span>
                <span>•</span>
                <span>🛒 ${p.sales} sales</span>
              </div>
              <div style="display: flex; gap: 12px; align-items: center;">
                <button onclick="contactSeller('${p._id}')" style="padding: 10px 20px; background: rgba(0, 255, 255, 0.2); border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 8px; color: #00ffff; cursor: pointer; font-size: 1rem; transition: all 0.3s;" onmouseover="this.style.background='rgba(0, 255, 255, 0.3)'" onmouseout="this.style.background='rgba(0, 255, 255, 0.2)'">💬 Contact Seller</button>
                <span style="font-size: 2rem; font-weight: bold; color: #00ff00; margin-left: auto; margin-right: 16px;">$${p.price}</span>
                <button onclick="addToCart('${p._id}')" style="padding: 12px 32px; background: linear-gradient(135deg, #00ffff, #ff00ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.3s;" onmouseover="this.style.background='linear-gradient(135deg, #ff00ff, #ffff00)'" onmouseout="this.style.background='linear-gradient(135deg, #00ffff, #ff00ff)'">Add to Cart</button>
              </div>
            </div>
          </div>
        `).join('');

      if (reset) container.innerHTML = html;
      else container.innerHTML += html;
    }

    function setCategory(cat) {
      currentCategory = cat;
      hasMore = true;
      document.querySelectorAll('.category-btn').forEach(btn => {
        if (btn.dataset.category === cat) {
          btn.style.background = 'linear-gradient(135deg, #00ffff, #ff00ff)';
          btn.style.color = 'white';
          btn.style.border = 'none';
        } else {
          btn.style.background = 'rgba(0, 255, 255, 0.2)';
          btn.style.color = '#00ffff';
          btn.style.border = '1px solid rgba(0, 255, 255, 0.3)';
        }
      });
      loadProducts(true);
    }

    function filterProducts() {
      hasMore = true;
      loadProducts(true);
    }

    function addToCart(id) {
      const product = products.find(p => p._id === id);
      const existing = cart.find(item => item._id === id);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({ _id: product._id, name: product.name, price: product.price, icon: product.icon, quantity: 1 });
      }
      localStorage.setItem('hootner_cart', JSON.stringify(cart));
      updateCartBadge();
      showNotification(`✅ ${product.name} added to cart!`);
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item._id !== id);
      localStorage.setItem('hootner_cart', JSON.stringify(cart));
      updateCartBadge();
      renderCart();
    }

    function updateQuantity(id, delta) {
      const item = cart.find(i => i._id === id);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) removeFromCart(id);
        else {
          localStorage.setItem('hootner_cart', JSON.stringify(cart));
          renderCart();
        }
      }
    }

    function toggleCart() {
      const modal = document.getElementById('cart-modal');
      modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
      if (modal.style.display === 'flex') renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      if (cart.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #6b7280; padding: 40px;">Your cart is empty</p>';
      } else {
        container.innerHTML = cart.map(item => `
            <div style="display: flex; gap: 16px; padding: 16px; background: rgba(0, 255, 0, 0.05); border-radius: 8px; margin-bottom: 12px;">
              <div style="font-size: 3rem;">${item.icon}</div>
              <div style="flex: 1;">
                <h4 style="color: #00ff00; font-weight: bold; margin-bottom: 4px;">${item.name}</h4>
                <p style="color: #00ffff; font-size: 0.875rem;">$${item.price} each</p>
              </div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <button onclick="updateQuantity('${item._id}', -1)" style="width: 28px; height: 28px; background: rgba(0, 255, 0, 0.2); border: 1px solid rgba(0, 255, 0, 0.3); border-radius: 4px; color: #00ff00; cursor: pointer; font-weight: bold;">-</button>
                <span style="color: #00ff00; font-weight: bold; min-width: 24px; text-align: center;">${item.quantity}</span>
                <button onclick="updateQuantity('${item._id}', 1)" style="width: 28px; height: 28px; background: rgba(0, 255, 0, 0.2); border: 1px solid rgba(0, 255, 0, 0.3); border-radius: 4px; color: #00ff00; cursor: pointer; font-weight: bold;">+</button>
                <button onclick="removeFromCart('${item._id}')" style="width: 28px; height: 28px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 4px; color: #ef4444; cursor: pointer; font-weight: bold; margin-left: 8px;">×</button>
              </div>
              <div style="color: #00ff00; font-weight: bold; font-size: 1.125rem;">$${item.price * item.quantity}</div>
            </div>
          `).join('');
      }

      document.getElementById('cart-total').textContent = '$' + total;
    }

    function updateCartBadge() {
      const badge = document.getElementById('cart-badge');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    async function checkout() {
      if (cart.length === 0) return;

      try {
        const userId = localStorage.getItem('hootner_user_id') || 'guest';
        const res = await fetch(`${API_URL}/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: cart, userId })
        });

        const { url } = await res.json();
        window.location.href = url;
      } catch (error) {
        console.error('Checkout failed:', error);
        showNotification('❌ Checkout failed. Please try again.');
      }
    }

    function showNotification(text) {
      const notif = document.createElement('div');
      notif.textContent = text;
      notif.style.cssText = 'position: fixed; top: 100px; right: 20px; background: #00ff00; color: #000; padding: 16px 24px; border-radius: 8px; font-weight: bold; z-index: 10001; box-shadow: 0 4px 12px rgba(0, 255, 0, 0.5);';
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    loadProducts();
    updateCartBadge();

    window.addEventListener('scroll', () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
        loadProducts();
      }
    });


    function contactSeller(productId) {
      const product = products.find(p => p._id === productId);
      const modal = document.createElement('div');
      modal.style.cssText = 'position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 10000; display: flex; align-items: center; justify-content: center;';
      modal.innerHTML = `
          <div style="background: linear-gradient(135deg, #0a0a0f, #1a1a2e); border: 3px solid; border-image: linear-gradient(135deg, #00ff00, #00ffff, #ff00ff) 1; border-radius: 24px; padding: 32px; min-width: 500px; max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
              <h2 style="font-size: 1.5rem; font-weight: bold; color: #00ff00;">💬 Contact Seller</h2>
              <button onclick="this.closest('div').parentElement.remove()" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 24px;">✕</button>
            </div>
            <div style="margin-bottom: 16px; padding: 16px; background: rgba(0, 255, 0, 0.05); border-radius: 8px;">
              <div style="color: #00ffff; font-size: 0.875rem; margin-bottom: 4px;">Product:</div>
              <div style="color: #00ff00; font-weight: bold;">${product.name}</div>
            </div>
            <form onsubmit="sendMessage(event, '${productId}')">
              <div style="margin-bottom: 16px;">
                <label style="display: block; color: #00ffff; margin-bottom: 8px; font-weight: 600;">Your Email *</label>
                <input type="email" name="email" required style="width: 100%; padding: 12px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 8px; color: #00ff00;">
              </div>
              <div style="margin-bottom: 16px;">
                <label style="display: block; color: #00ffff; margin-bottom: 8px; font-weight: 600;">Message *</label>
                <textarea name="message" required rows="4" style="width: 100%; padding: 12px; background: rgba(10, 10, 15, 0.8); border: 2px solid rgba(0, 255, 0, 0.3); border-radius: 8px; color: #00ff00;"></textarea>
              </div>
              <button type="submit" style="width: 100%; padding: 16px; background: linear-gradient(135deg, #00ff00, #00ffff); color: #000; border: none; border-radius: 12px; cursor: pointer; font-size: 1.125rem; font-weight: bold;">Send Message</button>
            </form>
          </div>
        `;
      document.body.appendChild(modal);
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    async function sendMessage(e, productId) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const data = {
        productId,
        email: formData.get('email'),
        message: formData.get('message')
      };

      try {
        const res = await fetch(`${API_URL}/contact-seller`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          showNotification('✅ Message sent to seller!');
          form.closest('div').parentElement.remove();
        } else {
          throw new Error('Failed');
        }
      } catch (error) {
        showNotification('❌ Failed to send message');
      }
    }

    document.addEventListener('click', (e) => {
      const modal = document.getElementById('cart-modal');
      if (e.target === modal) toggleCart();
    });

  </script>
</body>

</html>
