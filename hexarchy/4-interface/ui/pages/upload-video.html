<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Session Revocation System -->
  <script src="../assets/security/session-revocation.js"></script>
  
  <link rel="stylesheet" href="shared-styles.css" />
  <title>📤 Upload Video - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e);
      color: #00ff00;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    
    .glass { 
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .upload-zone {
      border: 3px dashed rgba(0, 255, 0, 0.3);
      background: rgba(0, 255, 0, 0.05);
      transition: all 0.3s;
    }
    
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: rgba(0, 255, 255, 0.6);
      background: rgba(0, 255, 255, 0.1);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #00ff00, #00ffff);
      color: #000;
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    
    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
    }
    
    .progress-bar {
      height: 8px;
      background: rgba(0, 255, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00ffff);
      transition: width 0.3s;
    }
  </style>
</head>
<body class="p-6">
  <div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-4xl font-bold mb-2" style="color: #00ffff;">📤 Upload Video</h1>
      <p class="text-gray-400">Upload your videos to view and download them later</p>
    </div>

    <!-- Upload Form -->
    <div class="glass rounded-2xl p-8 mb-6">
      <!-- Drag & Drop Zone -->
      <div id="dropZone" class="upload-zone rounded-xl p-12 text-center mb-6">
        <div class="text-6xl mb-4">🎬</div>
        <h3 class="text-2xl font-bold mb-2" style="color: #00ffff;">Drag & Drop Video</h3>
        <p class="text-gray-400 mb-4">or click to browse</p>
        <input type="file" id="fileInput" accept="video/*" class="hidden">
        <button onclick="document.getElementById('fileInput').click()" class="btn-primary">
          Choose Video File
        </button>
        <p class="text-sm text-gray-500 mt-4">Supports: MP4, WebM, MOV (Max 100MB)</p>
      </div>

      <!-- File Info -->
      <div id="fileInfo" class="hidden mb-6">
        <div class="flex items-center gap-4 bg-black/30 rounded-lg p-4">
          <div class="text-4xl">🎥</div>
          <div class="flex-1">
            <p class="font-bold" id="fileName"></p>
            <p class="text-sm text-gray-400" id="fileSize"></p>
          </div>
          <button onclick="clearFile()" class="text-red-400 hover:text-red-300 text-2xl">×</button>
        </div>
      </div>

      <!-- Title Input -->
      <div class="mb-6">
        <label class="block text-sm font-bold mb-2" style="color: #00ffff;">Video Title</label>
        <input 
          type="text" 
          id="videoTitle" 
          placeholder="My Awesome Video" 
          class="w-full px-4 py-3 bg-black/40 border border-green-400/30 rounded-lg text-green-400 focus:outline-none focus:border-cyan-400"
        >
      </div>

      <!-- Progress -->
      <div id="uploadProgress" class="hidden mb-6">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-cyan-400">Uploading...</span>
          <span id="progressPercent" class="text-green-400">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Upload Button -->
      <button 
        id="uploadBtn" 
        onclick="uploadVideo()" 
        disabled 
        class="btn-primary w-full disabled:opacity-50 disabled:cursor-not-allowed"
      >
        🚀 Upload Video
      </button>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="hidden glass rounded-2xl p-8 text-center">
      <div class="text-6xl mb-4">✅</div>
      <h3 class="text-2xl font-bold mb-2" style="color: #00ff00;">Upload Successful!</h3>
      <p class="text-gray-400 mb-6">Your video has been saved</p>
      <div class="flex gap-3 justify-center">
        <a href="dashboard.html" class="btn-primary">
          📹 View My Videos
        </a>
        <button onclick="resetForm()" class="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold">
          Upload Another
        </button>
      </div>
    </div>
  </div>

  <script>
    let selectedFile = null;
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    
    // Drag & Drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('video/')) {
        handleFile(file);
      } else {
        alert('Please drop a valid video file');
      }
    });
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });
    
    function handleFile(file) {
      if (file.size > 100 * 1024 * 1024) {
        alert('File too large! Max 100MB');
        return;
      }
      
      selectedFile = file;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileSize').textContent = formatFileSize(file.size);
      document.getElementById('videoTitle').value = file.name.replace(/\.[^/.]+$/, '');
      fileInfo.classList.remove('hidden');
      uploadBtn.disabled = false;
    }
    
    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.add('hidden');
      uploadBtn.disabled = true;
    }
    
    async function uploadVideo() {
      if (!selectedFile) return;
      
      const title = document.getElementById('videoTitle').value || selectedFile.name;
      const uploadProgress = document.getElementById('uploadProgress');
      const progressFill = document.getElementById('progressFill');
      const progressPercent = document.getElementById('progressPercent');
      
      uploadBtn.disabled = true;
      uploadProgress.classList.remove('hidden');
      
      // Simulate upload (in production, this would upload to S3)
      for (let i = 0; i <= 100; i += 10) {
        await new Promise(resolve => setTimeout(resolve, 200));
        progressFill.style.width = i + '%';
        progressPercent.textContent = i + '%';
      }
      
      // Save to localStorage (fallback until S3 upload is implemented)
      const videoData = {
        title: title,
        filename: selectedFile.name,
        size: selectedFile.size,
        date: new Date().toISOString(),
        url: URL.createObjectURL(selectedFile), // Temporary URL
        blob: selectedFile // Store the file blob
      };
      
      const videos = JSON.parse(localStorage.getItem('generatedVideos') || '[]');
      videos.unshift(videoData);
      localStorage.setItem('generatedVideos', JSON.stringify(videos));
      
      // Show success
      document.querySelector('.glass').classList.add('hidden');
      document.getElementById('successMessage').classList.remove('hidden');
    }
    
    function resetForm() {
      clearFile();
      document.getElementById('videoTitle').value = '';
      document.getElementById('uploadProgress').classList.add('hidden');
      document.getElementById('successMessage').classList.add('hidden');
      document.querySelector('.glass').classList.remove('hidden');
    }
    
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>
</body>
</html>
