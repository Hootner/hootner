<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Session Manager - Hootner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .admin-panel {
      background: rgba(20, 20, 30, 0.95);
      border: 1px solid rgba(0, 255, 0, 0.3);
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.3), 0 0 80px rgba(0, 255, 255, 0.2);
    }

    h1 {
      color: #00ff00;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    button {
      background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
      border: 2px solid #00ff00;
      color: #0a0a0f;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
    }

    button:hover {
      background: linear-gradient(135deg, #00cc00 0%, #00ff00 100%);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
      transform: translateY(-2px);
    }

    button.danger {
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      border-color: #ff0000;
    }

    button.danger:hover {
      background: linear-gradient(135deg, #cc0000 0%, #ff0000 100%);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }

    .status-panel {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: #00ffff;
    }

    .status-value {
      color: #00ff00;
      font-weight: 600;
    }

    .log-panel {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 0, 0.2);
      border-radius: 8px;
      padding: 15px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .log-entry.success {
      color: #00ff00;
    }

    .log-entry.warning {
      color: #ffaa00;
    }

    .log-entry.error {
      color: #ff0000;
    }

    .timestamp {
      color: #888;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h1>🦉 Admin Session Manager</h1>

    <div class="status-panel">
      <div class="status-item">
        <span class="status-label">Active Sessions:</span>
        <span class="status-value" id="active-sessions">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">Session Revocation Key:</span>
        <span class="status-value" id="revocation-key">Loading...</span>
      </div>
      <div class="status-item">
        <span class="status-label">Last Action:</span>
        <span class="status-value" id="last-action">None</span>
      </div>
    </div>

    <div class="button-group">
      <button onclick="kickAllTesters()">🚪 Kick All Testers Out</button>
      <button onclick="invalidateAllSessions()" class="danger">❌ Invalidate All Sessions</button>
      <button onclick="rotateRevocationKey()">🔄 Rotate Session Key</button>
      <button onclick="checkActiveSessions()">📊 Check Active Sessions</button>
    </div>

    <div class="log-panel" id="log-panel">
      <div class="log-entry success">
        <span class="timestamp">[Ready]</span>
        Admin session manager initialized
      </div>
    </div>
  </div>

  <script>
    // Session revocation management
    const SESSION_REVOCATION_KEY = 'hootner_session_revocation';
    const SESSION_VERSION_KEY = 'hootner_session_version';

    function log(message, type = 'success') {
      const logPanel = document.getElementById('log-panel');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      
      const now = new Date();
      const timestamp = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
      
      entry.innerHTML = `<span class="timestamp">[${timestamp}]</span>${message}`;
      logPanel.appendChild(entry);
      logPanel.scrollTop = logPanel.scrollHeight;
      
      document.getElementById('last-action').textContent = message;
    }

    function getCurrentRevocationKey() {
      let key = localStorage.getItem(SESSION_REVOCATION_KEY);
      if (!key) {
        key = Date.now().toString();
        localStorage.setItem(SESSION_REVOCATION_KEY, key);
      }
      return key;
    }

    function kickAllTesters() {
      if (!confirm('Are you sure you want to force logout ALL testers EVERYWHERE?\n\nThis will:\n- Invalidate all active sessions across all browsers\n- Force immediate logout on their next page load/request\n- Require re-authentication for everyone\n\nThis affects ALL users except those who login AFTER this action.')) {
        return;
      }

      // Generate new revocation timestamp - this is the KEY that kicks everyone out
      const newKey = Date.now().toString();
      localStorage.setItem(SESSION_REVOCATION_KEY, newKey);
      
      // Broadcast to other tabs if they're open
      window.dispatchEvent(new StorageEvent('storage', {
        key: SESSION_REVOCATION_KEY,
        newValue: newKey,
        storageArea: localStorage
      }));
      
      // Clear all session-related data
      const keysToRemove = [
        'hootner_auth_token',
        'hootner_session',
        'hootner_user',
        'hootner_session_token',
        'hootner_fingerprint'
      ];
      
      keysToRemove.forEach(key => {
        localStorage.removeItem(key);
        sessionStorage.removeItem(key);
      });

      log('✅ All testers have been kicked out!', 'success');
      log(`🔑 New revocation key: ${newKey}`, 'success');
      document.getElementById('revocation-key').textContent = newKey;
      
      setTimeout(() => {
        alert('SUCCESS!\n\nAll testers have been logged out.\nThey will need to re-authenticate on their next request.');
      }, 100);
    }

    function invalidateAllSessions() {
      if (!confirm('⚠️ WARNING: This will invalidate ALL sessions including yours!\n\nContinue?')) {
        return;
      }

      // Nuclear option - clear everything
      localStorage.clear();
      sessionStorage.clear();
      
      // Set new revocation key
      const newKey = Date.now().toString();
      localStorage.setItem(SESSION_REVOCATION_KEY, newKey);

      log('💥 All sessions invalidated (including yours)', 'warning');
      log(`🔑 New revocation key: ${newKey}`, 'success');
      document.getElementById('revocation-key').textContent = newKey;
      
      setTimeout(() => {
        alert('All sessions have been invalidated.\n\nYou will need to reload this page.');
      }, 100);
    }

    function rotateRevocationKey() {
      const newKey = Date.now().toString();
      localStorage.setItem(SESSION_REVOCATION_KEY, newKey);
      
      log(`🔄 Session key rotated to: ${newKey}`, 'success');
      document.getElementById('revocation-key').textContent = newKey;
    }

    function checkActiveSessions() {
      const authToken = localStorage.getItem('hootner_auth_token');
      const sessionActive = sessionStorage.getItem('hootner_session');
      const user = localStorage.getItem('hootner_user');
      
      let count = 0;
      if (authToken) count++;
      if (sessionActive) count++;
      
      document.getElementById('active-sessions').textContent = count;
      
      if (count > 0) {
        log(`📊 Found ${count} active session(s)`, 'success');
        if (user) {
          try {
            const userData = JSON.parse(user);
            log(`👤 Active user: ${userData.username}`, 'success');
          } catch (e) {
            log('⚠️ Could not parse user data', 'warning');
          }
        }
      } else {
        log('✅ No active sessions detected', 'success');
      }
    }

    // Initialize display
    document.addEventListener('DOMContentLoaded', () => {
      const currentKey = getCurrentRevocationKey();
      document.getElementById('revocation-key').textContent = currentKey;
      checkActiveSessions();
      log('Admin panel ready', 'success');
    });

    // Auto-refresh active sessions every 5 seconds
    setInterval(checkActiveSessions, 5000);
  </script>
</body>
</html>
