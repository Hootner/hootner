<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦉 Social Feed - Hootner (React)</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --neon-green: #00ff41;
        --neon-cyan: #00ffff;
        --neon-magenta: #ff00ff;
        --neon-yellow: #ffff00;
        --text-primary: #00ff41;
        --text-secondary: #00ffff;
        --bg-dark: #0a0a0f;
      }

      body {
        background: #0a0a0f;
        color: #00ff41;
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
      }

      nav {
        height: 80px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
      }

      .main-content {
        margin-top: 80px;
        padding: 20px;
      }

      /* Video Modal Styles */
      .video-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .video-modal-content {
        width: 100%;
        max-width: 1400px;
        background: rgba(10, 10, 15, 0.95);
        border: 2px solid rgba(0, 255, 65, 0.3);
        border-radius: 16px;
        overflow: hidden;
      }

      .video-player-container {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
      }

      .video-player-container video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* Watch Party Badge */
      .watch-party-badge {
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
    </style>
    <script>
      // Backend API Configuration
      const API_CONFIG = {
        VIDEO_API: 'http://localhost:5003',
        GRAPHQL_API: 'http://localhost:4000/graphql',
        ANALYTICS_API: 'http://localhost:5003/api/analytics',
        WATCH_PARTY_WS: 'ws://localhost:5004'
      };
    </script>
  </head>

  <body>
    <nav class="bg-slate-900 border-b border-slate-700">
      <div
        style="
          padding: 12px 40px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div style="display: flex; align-items: center; gap: 24px">
          <a
            href="index.html"
            style="
              font-size: 24px;
              font-weight: bold;
              background: linear-gradient(135deg, #00ff00, #00ffff, #ff00ff);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              text-decoration: none;
            "
            >🦉 HOOTNER</a
          >
          <div style="position: relative">
            <span
              style="
                color: #00ffff;
                cursor: pointer;
                font-size: 20px;
                padding: 8px;
                position: relative;
                display: inline-block;
              "
            >
              🔔
              <span
                style="
                  position: absolute;
                  top: -2px;
                  right: 2px;
                  background: #ef4444;
                  color: white;
                  border-radius: 50%;
                  width: 16px;
                  height: 16px;
                  font-size: 10px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-weight: bold;
                "
                >3</span
              >
            </span>
          </div>
        </div>
        <div class="flex gap-2 items-center">
          <a
            href="profile.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >👤 Profile</a
          >
          <a
            href="design-showcase.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >🎨 Design</a
          >
          <a
            href="feed.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >📰 Social</a
          >
          <a
            href="marketplace.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >🛒 Marketplace</a
          >
          <a
            href="dashboard.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >📈 Dashboard</a
          >
          <a
            href="video-player.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >▶️ Video</a
          >
          <a
            href="auto-editor.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >✂️ Editor</a
          >
          <a
            href="code-editor.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >💻 Code</a
          >
          <a
            href="settings.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >⚙️ Settings</a
          >
          <a
            href="login.html"
            style="font-size: 16px; text-decoration: none; padding: 12px 16px"
            class="text-slate-100 hover:text-white"
            >🔐 Login</a
          >
        </div>
      </div>
    </nav>

    <div class="main-content">
      <div id="root"></div>
    </div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ============================================================================
      // Backend API Integration
      // ============================================================================
      
      // Fetch video from backend
      const fetchVideo = async (videoId) => {
        try {
          const response = await fetch(`${API_CONFIG.VIDEO_API}/api/video/${videoId}`);
          return await response.json();
        } catch (error) {
          console.error('Failed to fetch video:', error);
          return null;
        }
      };

      // Generate video using AI
      const generateVideo = async (prompt, options = {}) => {
        try {
          const response = await fetch(`${API_CONFIG.VIDEO_API}/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt,
              num_frames: options.numFrames || 24,
              format: 'mp4',
              ...options
            })
          });
          return await response.json();
        } catch (error) {
          console.error('Failed to generate video:', error);
          return null;
        }
      };

      // Track analytics event
      const trackEvent = async (videoId, eventType, data = {}) => {
        try {
          await fetch(`${API_CONFIG.ANALYTICS_API}/track`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              session_id: localStorage.getItem('session_id') || generateSessionId(),
              video_id: videoId,
              event_type: eventType,
              timestamp: Date.now(),
              data
            })
          });
        } catch (error) {
          console.error('Failed to track event:', error);
        }
      };

      // Get video analytics
      const getVideoAnalytics = async (videoId) => {
        try {
          const response = await fetch(`${API_CONFIG.ANALYTICS_API}/${videoId}`);
          return await response.json();
        } catch (error) {
          console.error('Failed to fetch analytics:', error);
          return null;
        }
      };

      // Generate session ID
      const generateSessionId = () => {
        const id = 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('session_id', id);
        return id;
      };

      // ============================================================================
      // Stories Component
      // ============================================================================
      const Stories = () => {
        const stories = [
          { id: 1, user: 'You', avatar: '🦉', hasStory: true, isLive: false },
          { id: 2, user: 'TechGuru', avatar: '👨‍💻', hasStory: true, isLive: true },
          { id: 3, user: 'VideoCreator', avatar: '🎬', hasStory: true, isLive: false },
          { id: 4, user: 'Musician', avatar: '🎵', hasStory: true, isLive: false },
          { id: 5, user: 'Designer', avatar: '🎨', hasStory: true, isLive: false },
        ];

        return (
          <div style={{
            display: 'flex',
            gap: '12px',
            padding: '20px',
            background: 'rgba(10,10,15,0.8)',
            borderRadius: '12px',
            border: '1px solid rgba(0,255,65,0.3)',
            marginBottom: '24px',
            overflowX: 'auto'
          }}>
            {stories.map(story => (
              <div key={story.id} style={{
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: '8px',
                cursor: 'pointer',
                minWidth: '80px'
              }}>
                <div style={{
                  width: '70px',
                  height: '70px',
                  borderRadius: '50%',
                  background: story.hasStory
                    ? 'linear-gradient(135deg, #ff00ff, #00ffff)'
                    : 'rgba(100,100,100,0.3)',
                  padding: '3px',
                  position: 'relative'
                }}>
                  <div style={{
                    width: '100%',
                    height: '100%',
                    borderRadius: '50%',
                    background: '#0a0a0f',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    fontSize: '28px'
                  }}>
                    {story.avatar}
                  </div>
                  {story.isLive && (
                    <div style={{
                      position: 'absolute',
                      bottom: '0',
                      left: '50%',
                      transform: 'translateX(-50%)',
                      background: '#ef4444',
                      color: 'white',
                      fontSize: '10px',
                      padding: '2px 8px',
                      borderRadius: '10px',
                      fontWeight: 'bold'
                    }}>
                      LIVE
                    </div>
                  )}
                </div>
                <span style={{
                  fontSize: '12px',
                  color: '#00ffff',
                  textAlign: 'center'
                }}>
                  {story.user}
                </span>
              </div>
            ))}
          </div>
        );
      };

      // ============================================================================
      // Create Post Component
      // ============================================================================
      const CreatePost = ({ onPost }) => {
        const [content, setContent] = useState('');
        const [mediaType, setMediaType] = useState(null);

        const handlePost = () => {
          if (content.trim()) {
            onPost({ content, mediaType });
            setContent('');
            setMediaType(null);
          }
        };

        return (
          <div style={{
            background: 'rgba(10,10,15,0.8)',
            borderRadius: '12px',
            border: '2px solid rgba(0,255,65,0.3)',
            padding: '24px',
            marginBottom: '24px',
            boxShadow: '0 0 20px rgba(0,255,65,0.3)'
          }}>
            <div style={{
              display: 'flex',
              gap: '12px',
              marginBottom: '16px'
            }}>
              <div style={{
                width: '48px',
                height: '48px',
                background: 'linear-gradient(135deg,#00ff41,#00ffff)',
                borderRadius: '50%',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '24px'
              }}>
                🦉
              </div>
              <textarea
                value={content}
                onChange={(e) => setContent(e.target.value)}
                placeholder="What's happening in the Hootner universe?"
                style={{
                  flex: 1,
                  background: 'rgba(0,0,0,0.3)',
                  border: '1px solid rgba(0,255,255,0.3)',
                  borderRadius: '8px',
                  padding: '12px',
                  color: '#00ffff',
                  fontSize: '14px',
                  resize: 'none',
                  minHeight: '80px'
                }}
              />
            </div>
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center'
            }}>
              <div style={{ display: 'flex', gap: '12px' }}>
                <button style={{
                  background: 'rgba(0,255,255,0.1)',
                  border: '1px solid rgba(0,255,255,0.3)',
                  color: '#00ffff',
                  padding: '8px 16px',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontSize: '14px'
                }}>
                  🎬 Video
                </button>
                <button style={{
                  background: 'rgba(0,255,255,0.1)',
                  border: '1px solid rgba(0,255,255,0.3)',
                  color: '#00ffff',
                  padding: '8px 16px',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontSize: '14px'
                }}>
                  📷 Photo
                </button>
                <button style={{
                  background: 'rgba(0,255,255,0.1)',
                  border: '1px solid rgba(0,255,255,0.3)',
                  color: '#00ffff',
                  padding: '8px 16px',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontSize: '14px'
                }}>
                  🎵 Audio
                </button>
              </div>
              <button
                onClick={handlePost}
                style={{
                  background: content.trim()
                    ? 'linear-gradient(135deg, #00ff41, #00ffff)'
                    : 'rgba(100,100,100,0.3)',
                  border: 'none',
                  color: '#000',
                  padding: '10px 24px',
                  borderRadius: '8px',
                  cursor: content.trim() ? 'pointer' : 'not-allowed',
                  fontSize: '14px',
                  fontWeight: 'bold'
                }}
                disabled={!content.trim()}
              >
                Post
              </button>
            </div>
          </div>
        );
      };

      // ============================================================================
      // AI Video Generation Modal
      // ============================================================================
      const AIVideoModal = ({ isOpen, onClose, onGenerate }) => {
        const [prompt, setPrompt] = useState('');
        const [generating, setGenerating] = useState(false);
        const [progress, setProgress] = useState(0);

        const handleGenerate = async () => {
          if (!prompt.trim()) return;
          
          setGenerating(true);
          setProgress(0);

          const progressInterval = setInterval(() => {
            setProgress(prev => prev >= 90 ? 90 : prev + 10);
          }, 500);

          const result = await generateVideo(prompt, { num_frames: 24 });
          
          clearInterval(progressInterval);
          setProgress(100);
          
          if (result && result.job_id) {
            setTimeout(() => {
              onGenerate({
                videoId: result.job_id,
                prompt,
                url: result.download_url || `/api/video/stream/${result.job_id}.mp4`,
                isHDR: true,
                duration: '0:24'
              });
              setGenerating(false);
              setPrompt('');
              onClose();
            }, 1000);
          } else {
            setGenerating(false);
            alert('Video generation failed. Check if backend is running.');
          }
        };

        if (!isOpen) return null;

        return (
          <div className="video-modal" onClick={onClose}>
            <div className="video-modal-content" onClick={(e) => e.stopPropagation()} 
              style={{ maxWidth: '600px', padding: '32px' }}>
              <h2 style={{ color: '#00ff41', fontSize: '24px', marginBottom: '20px' }}>
                🎬 Generate AI Video
              </h2>
              <textarea
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="Describe your video (e.g., 'A robot dancing in space')"
                disabled={generating}
                style={{
                  width: '100%',
                  background: 'rgba(0,0,0,0.3)',
                  border: '1px solid rgba(0,255,255,0.3)',
                  borderRadius: '12px',
                  padding: '16px',
                  color: '#00ffff',
                  fontSize: '14px',
                  minHeight: '100px',
                  marginBottom: '16px'
                }}
              />
              {generating && (
                <div style={{ marginBottom: '16px' }}>
                  <div style={{ color: '#00ffff', marginBottom: '8px' }}>
                    Generating: {progress}%
                  </div>
                  <div style={{ background: 'rgba(0,0,0,0.3)', borderRadius: '4px', height: '8px' }}>
                    <div style={{
                      width: `${progress}%`,
                      height: '100%',
                      background: 'linear-gradient(90deg, #00ff41, #00ffff)',
                      transition: 'width 0.3s'
                    }} />
                  </div>
                </div>
              )}
              <button
                onClick={handleGenerate}
                disabled={!prompt.trim() || generating}
                style={{
                  width: '100%',
                  background: prompt.trim() && !generating
                    ? 'linear-gradient(135deg, #00ff41, #00ffff)'
                    : 'rgba(100,100,100,0.3)',
                  border: 'none',
                  color: '#000',
                  padding: '14px',
                  borderRadius: '12px',
                  cursor: prompt.trim() && !generating ? 'pointer' : 'not-allowed',
                  fontSize: '16px',
                  fontWeight: 'bold'
                }}
              >
                {generating ? '⚡ Generating...' : '🎬 Generate Video'}
              </button>
            </div>
          </div>
        );
      };

      // ============================================================================
      // Video Player Modal
      // ============================================================================
      const VideoPlayerModal = ({ isOpen, video, onClose }) => {
        const videoRef = useRef(null);

        useEffect(() => {
          if (isOpen && video) {
            trackEvent(video.videoId, 'view', { source: 'social_feed' });
          }
        }, [isOpen, video]);

        if (!isOpen || !video) return null;

        return (
          <div className="video-modal" onClick={onClose}>
            <div className="video-modal-content" onClick={(e) => e.stopPropagation()}>
              <div className="video-player-container">
                <video
                  ref={videoRef}
                  src={`${API_CONFIG.VIDEO_API}${video.url}`}
                  controls
                  autoPlay
                  onPlay={() => trackEvent(video.videoId, 'play', {})}
                  onPause={() => trackEvent(video.videoId, 'pause', {})}
                />
                <div style={{
                  position: 'absolute',
                  top: '16px',
                  left: '16px',
                  background: 'linear-gradient(135deg, #00ff00, #00ffff)',
                  color: '#000',
                  padding: '6px 12px',
                  borderRadius: '6px',
                  fontSize: '12px',
                  fontWeight: 'bold'
                }}>
                  8K HDR10
                </div>
                <button onClick={onClose} style={{
                  position: 'absolute',
                  top: '16px',
                  right: '16px',
                  background: 'rgba(0,0,0,0.8)',
                  border: '1px solid #fff',
                  color: '#fff',
                  width: '40px',
                  height: '40px',
                  borderRadius: '50%',
                  cursor: 'pointer',
                  fontSize: '20px'
                }}>
                  ✕
                </button>
              </div>
              <div style={{ padding: '24px' }}>
                <h3 style={{ color: '#00ff41', fontSize: '18px', marginBottom: '8px' }}>
                  {video.prompt || 'AI Generated Video'}
                </h3>
                <p style={{ color: '#888', fontSize: '14px' }}>
                  Generated with 3D U-Net • HDR10 • Dolby Atmos 7.1.4
                </p>
              </div>
            </div>
          </div>
        );
      };

      // ============================================================================
      // Post Card with Video Support
      // ============================================================================
      const PostCard = ({ post, onLike, onComment, onShare, onSave }) => {
        const [showComments, setShowComments] = useState(false);
        const [commentText, setCommentText] = useState('');
        const [comments, setComments] = useState(post.comments || []);

        const handleAddComment = () => {
          if (commentText.trim()) {
            const newComment = {
              id: Date.now(),
              author: 'You',
              avatar: '🦉',
              content: commentText,
              time: 'Just now',
              likes: 0
            };
            setComments([...comments, newComment]);
            setCommentText('');
            onComment(post.id, newComment);
          }
        };

        return (
          <article style={{
            background: 'rgba(10,10,15,0.8)',
            borderRadius: '12px',
            border: '2px solid rgba(0,255,65,0.3)',
            padding: '24px',
            marginBottom: '24px',
            boxShadow: '0 0 20px rgba(0,255,65,0.3)'
          }}>
            {/* Post Header */}
            <div style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              marginBottom: '16px'
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                <div style={{
                  width: '48px',
                  height: '48px',
                  background: 'linear-gradient(135deg,#00ff41,#00ffff)',
                  borderRadius: '50%',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '24px'
                }}>
                  {post.avatar}
                </div>
                <div>
                  <div style={{
                    fontWeight: 600,
                    color: '#00ff41',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '8px'
                  }}>
                    {post.author}
                    {post.verified && <span style={{ color: '#00ffff' }}>✓</span>}
                  </div>
                  <div style={{ fontSize: '13px', color: '#888' }}>
                    {post.time} • {post.visibility || '🌍 Public'}
                  </div>
                </div>
              </div>
              <button style={{
                background: 'none',
                border: 'none',
                color: '#00ffff',
                cursor: 'pointer',
                fontSize: '20px'
              }}>
                ⋯
              </button>
            </div>

            {/* Post Content */}
            <p style={{
              color: '#00ffff',
              marginBottom: '16px',
              fontSize: '15px',
              lineHeight: '1.6'
            }}>
              {post.content}
            </p>

            {/* Video/Image Media */}
            {post.mediaType === 'video' && (
              <div style={{
                position: 'relative',
                borderRadius: '12px',
                overflow: 'hidden',
                marginBottom: '16px',
                background: '#000',
                aspectRatio: '16/9'
              }}>
                <div style={{
                  width: '100%',
                  height: '100%',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  background: 'linear-gradient(135deg, rgba(0,255,65,0.1), rgba(0,255,255,0.1))'
                }}>
                  <div style={{
                    width: '80px',
                    height: '80px',
                    background: 'rgba(0,255,255,0.2)',
                    border: '3px solid #00ffff',
                    borderRadius: '50%',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    cursor: 'pointer',
                    fontSize: '32px'
                  }}>
                    ▶️
                  </div>
                </div>
                <div style={{
                  position: 'absolute',
                  bottom: '12px',
                  right: '12px',
                  background: 'rgba(0,0,0,0.8)',
                  padding: '4px 8px',
                  borderRadius: '4px',
                  fontSize: '12px',
                  color: '#fff'
                }}>
                  {post.duration || '2:45'}
                </div>
                {post.isHDR && (
                  <div style={{
                    position: 'absolute',
                    top: '12px',
                    left: '12px',
                    background: 'linear-gradient(135deg, #00ff00, #00ffff)',
                    color: '#000',
                    padding: '4px 8px',
                    borderRadius: '4px',
                    fontSize: '11px',
                    fontWeight: 'bold'
                  }}>
                    8K HDR10
                  </div>
                )}
              </div>
            )}

            {post.mediaType === 'image' && (
              <div style={{
                borderRadius: '12px',
                overflow: 'hidden',

            {/* Comments Section */}

                      height: '36px',

                          background: 'none',
                          border: 'none',

                    </div>
                  </div>
                ))}

                  }}>

      // ============================================================================
      // Main Feed Component
      // ============================================================================
      const Feed = () => {
        const [posts, setPosts] = useState([]);
        const [showAIModal, setShowAIModal] = useState(false);
        const [showVideoModal, setShowVideoModal] = useState(false);
        const [selectedVideo, setSelectedVideo] = useState(null);

        useEffect(() => {
          const initialPosts = [
            {
              id: 1,
              author: 'CinemaCreator',
              avatar: '🎬',
              verified: true,
              content: 'Just rendered my first 8K HDR10 video with Dolby Atmos 7.1.4! The quality is absolutely stunning! 🤩 #8KHDR #DolbyAtmos',
              time: '2h ago',
              visibility: '🌍 Public',
              mediaType: 'video',
              isHDR: true,
              duration: '3:24',
              likes: 1247,
              shares: 89,
              liked: false,
              saved: false,
              comments: [
                {
                  id: 1,
                  author: 'TechEnthusiast',
                  avatar: '👨‍💻',
                  content: 'This is incredible! What specs are you using?',
                  time: '1h ago',
                  likes: 24
                },
                {
                  id: 2,
                  author: 'VideoGeek',
                  avatar: '🎥',
                  content: 'The HDR10 grading looks perfect! 🔥',
                  time: '45m ago',
                  likes: 12
                }
              ]
            },
            {
              id: 2,
              author: 'AIResearcher',
              avatar: '🤖',
              verified: true,
              content: 'Working on a new AI model for real-time video upscaling. Early results show 40% improvement in quality! Stay tuned for the demo. #AIVideo #MachineLearning',
              time: '4h ago',
              mediaType: 'image',
              likes: 892,
              shares: 156,
              liked: true,
              saved: true,
              comments: []
            },
            {
              id: 3,
              author: 'MusicProducer',
              avatar: '🎵',
              verified: false,
              content: 'New track dropping tonight at midnight! Created entirely with spatial audio for the ultimate immersive experience 🎧✨',
              time: '6h ago',
              mediaType: null,
              likes: 2341,
              shares: 234,
              liked: false,
              saved: false,
              comments: []
            },
            {
              id: 4,
              author: 'DevOpsNinja',
              avatar: '⚙️',
              verified: true,
              content: 'Just deployed our new microservices architecture with zero downtime! Kubernetes + Istio makes it seamless. #DevOps #Kubernetes',
              time: '8h ago',
              mediaType: null,
              likes: 567,
              shares: 78,
              liked: false,
              saved: false,
              comments: []
            },
            {
              id: 5,
              author: 'DesignMaster',
              avatar: '🎨',
              verified: true,
              content: 'New UI design system complete! Check out these gradient combinations for dark mode interfaces. Pure neon aesthetics! 🌈',
              time: '12h ago',
              mediaType: 'image',
              likes: 1876,
              shares: 321,
              liked: true,
              saved: false,
              comments: []
            }
          ];
          setPosts(initialPosts);
        }, []);

        const handleLike = (id) => {
          setPosts(prev =>
            prev.map(post =>
              post.id === id
                ? {
                    ...post,
                    liked: !post.liked,
                    likes: post.likes + (post.liked ? -1 : 1),
                  }
                : post
            )
          );
        };

        const handleComment = (id, comment) => {
          setPosts(prev =>
            prev.map(post =>
              post.id === id
                ? {
                    ...post,
                    comments: [...(post.comments || []), comment]
                  }
                : post
            )
          );
        };

        const handleShare = (id) => {
          setPosts(prev =>
            prev.map(post =>
              post.id === id ? { ...post, shares: post.shares + 1 } : post
            )
          );
          alert('🔗 Link copied to clipboard!');
        };

        const handleSave = (id) => {
          setPosts(prev =>
            prev.map(post =>
              post.id === id ? { ...post, saved: !post.saved } : post
            )
          );
        };

        const handleNewPost = ({ content, mediaType }) => {
          const newPost = {
            id: Date.now(),
            author: 'You',
            avatar: '🦉',
            verified: true,
            content,
            time: 'Just now',
            visibility: '🌍 Public',
            mediaType,
            likes: 0,
            shares: 0,
            liked: false,
            saved: false,
            comments: []
          };
          setPosts([newPost, ...posts]);
        };

        return (
          <div style={{
            display: 'grid',
            gridTemplateColumns: '1fr 350px',
            gap: '24px',
            maxWidth: '1400px',
            margin: '0 auto',

            <div>

              {posts.map(post => (
                <PostCard

                  post={post}
                  onLike={handleLike}
                  onComment={handleComment}
                  onShare={handleShare}
                  onSave={handleSave}
                />
              ))}
            </div>

            {/* Sidebar */}
            <TrendingSidebar />
          </div>
        );
      };

      ReactDOM.render(<Feed />, document.getElementById('root'));
    </script>
  </body>
