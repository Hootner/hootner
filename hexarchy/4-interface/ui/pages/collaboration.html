<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shared-styles.css" />
    <title>HOOTNER Collaboration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-900 text-white min-h-screen">
    <script src="../components/auth-guard.js"></script>
    <script src="../components/header-enhanced.js"></script>

    <div style="padding-top: 20px;">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="text-2xl font-bold text-blue-400">🦉 HOOTNER Collaboration</h1>
                <div class="flex items-center space-x-4">
                    <span id="onlineUsers" class="text-green-400">👥 0 online</span>
                    <button id="shareScreen" class="px-4 py-2 bg-red-600 rounded hover:bg-red-700">
                        <i class="fas fa-desktop mr-2"></i>Share Screen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-80 bg-gray-800 p-4 overflow-y-auto">
            <!-- Video Call Section -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-3 text-blue-400">Video Conference</h3>
                <div class="space-y-3">
                    <button id="startCall" class="w-full px-4 py-2 bg-green-600 rounded hover:bg-green-700">
                        <i class="fas fa-video mr-2"></i>Start Video Call
                    </button>
                    <button id="joinCall" class="w-full px-4 py-2 bg-blue-600 rounded hover:bg-blue-700">
                        <i class="fas fa-phone mr-2"></i>Join Call
                    </button>
                    <input id="roomId" type="text" placeholder="Room ID"
                        class="w-full px-3 py-2 bg-gray-700 rounded border border-gray-600">
                </div>

                <!-- Local Video -->
                <div class="mt-4">
                    <video id="localVideo" class="w-full rounded bg-black" muted autoplay></video>
                    <div class="flex justify-center space-x-2 mt-2">
                        <button id="toggleVideo" class="px-3 py-1 bg-gray-600 rounded hover:bg-gray-700">
                            <i class="fas fa-video"></i>
                        </button>
                        <button id="toggleAudio" class="px-3 py-1 bg-gray-600 rounded hover:bg-gray-700">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Participants -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-3 text-purple-400">Participants</h3>
                <div id="participantsList" class="space-y-2">
                    <!-- Participants will be added here -->
                </div>
            </div>

            <!-- Chat -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-3 text-green-400">Team Chat</h3>
                <div id="chatMessages" class="h-40 bg-gray-700 rounded p-3 overflow-y-auto mb-3 text-sm">
                    <!-- Chat messages will appear here -->
                </div>
                <div class="flex">
                    <input id="chatInput" type="text" placeholder="Type a message..."
                        class="flex-1 px-3 py-2 bg-gray-700 rounded-l border border-gray-600">
                    <button id="sendChat" class="px-4 py-2 bg-blue-600 rounded-r hover:bg-blue-700">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <!-- File Sharing -->
            <div>
                <h3 class="text-lg font-semibold mb-3 text-yellow-400">File Sharing</h3>
                <div class="space-y-2">
                    <input id="fileInput" type="file" class="hidden" multiple>
                    <button onclick="document.getElementById('fileInput').click()"
                        class="w-full px-4 py-2 bg-yellow-600 rounded hover:bg-yellow-700">
                        <i class="fas fa-upload mr-2"></i>Upload Files
                    </button>
                    <div id="sharedFiles" class="space-y-1">
                        <!-- Shared files will appear here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Remote Videos -->
            <div class="flex-1 p-4">
                <div id="remoteVideos" class="grid grid-cols-2 gap-4 h-full">
                    <!-- Remote video streams will appear here -->
                </div>

                <!-- Screen Share Display -->
                <div id="screenShareContainer" class="hidden">
                    <video id="screenShareVideo" class="w-full h-full rounded bg-black"></video>
                </div>
            </div>

            <!-- Collaborative Whiteboard -->
            <div class="h-80 bg-gray-800 p-4">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-lg font-semibold text-cyan-400">Collaborative Whiteboard</h3>
                    <div class="flex space-x-2">
                        <button id="clearBoard" class="px-3 py-1 bg-red-600 rounded hover:bg-red-700">Clear</button>
                        <select id="brushColor" class="px-2 py-1 bg-gray-700 rounded">
                            <option value="#ffffff">White</option>
                            <option value="#ff0000">Red</option>
                            <option value="#00ff00">Green</option>
                            <option value="#0000ff">Blue</option>
                            <option value="#ffff00">Yellow</option>
                        </select>
                        <input id="brushSize" type="range" min="1" max="20" value="3" class="w-20">
                    </div>
                </div>
                <canvas id="whiteboard" class="w-full h-60 bg-white rounded cursor-crosshair"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Initialize Socket.IO
        const socket = io();
        let peer;
        let localStream;
        let remoteStreams = new Map();
        let isVideoEnabled = true;
        let isAudioEnabled = true;
        let currentRoom = null;

        // Initialize PeerJS
        peer = new Peer();

        peer.on('open', (id) => {
            console.log('Peer ID:', id);
        });

        // Get user media
        async function initializeMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (error) {
                console.error('Error accessing media devices:', error);
            }
        }

        // Start video call
        document.getElementById('startCall').addEventListener('click', async () => {
            if (!localStream) await initializeMedia();

            const roomId = Math.random().toString(36).substring(7);
            document.getElementById('roomId').value = roomId;
            currentRoom = roomId;

            socket.emit('join-room', roomId);
            addChatMessage('System', `Room created: ${roomId}`);
        });

        // Join video call
        document.getElementById('joinCall').addEventListener('click', async () => {
            const roomId = document.getElementById('roomId').value;
            if (!roomId) return;

            if (!localStream) await initializeMedia();

            currentRoom = roomId;
            socket.emit('join-room', roomId);
            addChatMessage('System', `Joined room: ${roomId}`);
        });

        // Handle incoming calls
        peer.on('call', (call) => {
            call.answer(localStream);

            call.on('stream', (remoteStream) => {
                addRemoteVideo(call.peer, remoteStream);
            });
        });

        // Socket events
        socket.on('user-connected', (userId) => {
            if (localStream) {
                const call = peer.call(userId, localStream);

                call.on('stream', (remoteStream) => {
                    addRemoteVideo(userId, remoteStream);
                });
            }
        });

        socket.on('user-disconnected', (userId) => {
            removeRemoteVideo(userId);
        });

        // Add remote video
        function addRemoteVideo(userId, stream) {
            const videoElement = document.createElement('video');
            videoElement.srcObject = stream;
            videoElement.autoplay = true;
            videoElement.className = 'w-full h-full rounded bg-black';
            videoElement.id = `video-${userId}`;

            const container = document.createElement('div');
            container.className = 'relative';
            container.appendChild(videoElement);

            const label = document.createElement('div');
            label.className = 'absolute bottom-2 left-2 bg-black bg-opacity-50 px-2 py-1 rounded text-sm';
            label.textContent = `User ${userId.substring(0, 8)}`;
            container.appendChild(label);

            document.getElementById('remoteVideos').appendChild(container);
            remoteStreams.set(userId, stream);

            updateParticipantsList();
        }

        // Remove remote video
        function removeRemoteVideo(userId) {
            const videoElement = document.getElementById(`video-${userId}`);
            if (videoElement) {
                videoElement.parentElement.remove();
            }
            remoteStreams.delete(userId);
            updateParticipantsList();
        }

        // Update participants list
        function updateParticipantsList() {
            const list = document.getElementById('participantsList');
            list.innerHTML = '';

            // Add self
            const selfItem = document.createElement('div');
            selfItem.className = 'flex items-center space-x-2 p-2 bg-gray-700 rounded';
            selfItem.innerHTML = `
                <div class="w-3 h-3 bg-green-400 rounded-full"></div>
                <span>You</span>
                <span class="text-xs text-gray-400">(Host)</span>
            `;
            list.appendChild(selfItem);

            // Add remote participants
            remoteStreams.forEach((stream, userId) => {
                const item = document.createElement('div');
                item.className = 'flex items-center space-x-2 p-2 bg-gray-700 rounded';
                item.innerHTML = `
                    <div class="w-3 h-3 bg-green-400 rounded-full"></div>
                    <span>User ${userId.substring(0, 8)}</span>
                `;
                list.appendChild(item);
            });

            document.getElementById('onlineUsers').textContent = `👥 ${remoteStreams.size + 1} online`;
        }

        // Toggle video
        document.getElementById('toggleVideo').addEventListener('click', () => {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    isVideoEnabled = videoTrack.enabled;
                    document.getElementById('toggleVideo').innerHTML =
                        isVideoEnabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
                }
            }
        });

        // Toggle audio
        document.getElementById('toggleAudio').addEventListener('click', () => {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    isAudioEnabled = audioTrack.enabled;
                    document.getElementById('toggleAudio').innerHTML =
                        isAudioEnabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
                }
            }
        });

        // Screen sharing
        document.getElementById('shareScreen').addEventListener('click', async () => {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('screenShareVideo').srcObject = screenStream;
                document.getElementById('screenShareContainer').classList.remove('hidden');

                // Notify others about screen share
                socket.emit('screen-share-start', currentRoom);

                screenStream.getVideoTracks()[0].onended = () => {
                    document.getElementById('screenShareContainer').classList.add('hidden');
                    socket.emit('screen-share-end', currentRoom);
                };
            } catch (error) {
                console.error('Error sharing screen:', error);
            }
        });

        // Chat functionality
        document.getElementById('sendChat').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message && currentRoom) {
                socket.emit('chat-message', { room: currentRoom, message, sender: 'You' });
                addChatMessage('You', message);
                input.value = '';
            }
        }

        socket.on('chat-message', (data) => {
            addChatMessage(data.sender, data.message);
        });

        function addChatMessage(sender, message) {
            const chatMessages = document.getElementById('chatMessages');
            const messageElement = document.createElement('div');
            messageElement.className = 'mb-2';
            messageElement.innerHTML = `
                <span class="font-semibold text-blue-400">${sender}:</span>
                <span class="ml-2">${message}</span>
                <div class="text-xs text-gray-400">${new Date().toLocaleTimeString()}</div>
            `;
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Whiteboard functionality
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;

            const brushColor = document.getElementById('brushColor').value;
            const brushSize = document.getElementById('brushSize').value;

            ctx.strokeStyle = brushColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();

            // Emit drawing data
            socket.emit('whiteboard-draw', {
                room: currentRoom,
                x1: lastX,
                y1: lastY,
                x2: e.offsetX,
                y2: e.offsetY,
                color: brushColor,
                size: brushSize
            });

            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);

        // Receive whiteboard data
        socket.on('whiteboard-draw', (data) => {
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.size;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(data.x1, data.y1);
            ctx.lineTo(data.x2, data.y2);
            ctx.stroke();
        });

        // Clear whiteboard
        document.getElementById('clearBoard').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('whiteboard-clear', currentRoom);
        });

        socket.on('whiteboard-clear', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // File sharing
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const fileItem = document.createElement('div');
                fileItem.className = 'flex items-center justify-between p-2 bg-gray-700 rounded text-sm';
                fileItem.innerHTML = `
                    <span><i class="fas fa-file mr-2"></i>${file.name}</span>
                    <button class="text-blue-400 hover:text-blue-300" onclick="downloadFile('${file.name}')">
                        <i class="fas fa-download"></i>
                    </button>
                `;
                document.getElementById('sharedFiles').appendChild(fileItem);

                // Notify others about file share
                socket.emit('file-shared', {
                    room: currentRoom,
                    fileName: file.name,
                    fileSize: file.size
                });
            });
        });

        socket.on('file-shared', (data) => {
            addChatMessage('System', `📎 ${data.fileName} shared (${(data.fileSize / 1024).toFixed(1)} KB)`);
        });

        // Initialize
        initializeMedia();
        updateParticipantsList();

        // Add welcome message
        setTimeout(() => {
            addChatMessage('System', 'Welcome to HOOTNER Collaboration Hub! 🦉');
        }, 1000);
    </script>
    <script src="../components/footer-enhanced.js"></script>
</body>

</html>
