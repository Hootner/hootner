<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Streaming - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e); color: #00ff00; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .neon { box-shadow: 0 0 20px rgba(0,212,255,0.3); }
    .live-indicator { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-red-400 to-pink-400 bg-clip-text text-transparent">
        📡 Live Streaming Control
      </h1>
      <div class="flex items-center space-x-4">
        <div id="streamStatus" class="flex items-center space-x-2">
          <div class="w-3 h-3 bg-red-500 rounded-full live-indicator"></div>
          <span class="text-red-400 font-semibold">OFFLINE</span>
        </div>
        <button id="streamToggle" onclick="toggleStream()" 
                class="bg-red-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700">
          🔴 Start Stream
        </button>
      </div>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <div class="lg:col-span-2">
        <div class="glass rounded-xl p-6 neon">
          <h3 class="text-lg font-semibold mb-4 text-cyan-400">Stream Preview</h3>
          <div id="streamPreview" class="bg-black rounded-lg aspect-video flex items-center justify-center">
            <div class="text-gray-500 text-center">
              <div class="text-6xl mb-4">📹</div>
              <div>Stream Offline</div>
            </div>
          </div>
          <div class="mt-4 flex space-x-4">
            <button onclick="switchCamera()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
              📷 Switch Camera
            </button>
            <button onclick="toggleAudio()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
              🎤 Toggle Audio
            </button>
            <button onclick="shareScreen()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
              🖥️ Share Screen
            </button>
          </div>
        </div>
      </div>
      
      <div class="space-y-6">
        <div class="glass rounded-xl p-6 neon">
          <h3 class="text-lg font-semibold mb-4 text-cyan-400">Stream Stats</h3>
          <div class="space-y-3">
            <div class="flex justify-between">
              <span>Viewers</span>
              <span id="viewerCount" class="text-green-400 font-bold">0</span>
            </div>
            <div class="flex justify-between">
              <span>Bitrate</span>
              <span id="bitrate" class="text-cyan-400 font-bold">0 kbps</span>
            </div>
            <div class="flex justify-between">
              <span>FPS</span>
              <span id="fps" class="text-yellow-400 font-bold">0</span>
            </div>
            <div class="flex justify-between">
              <span>Duration</span>
              <span id="duration" class="text-purple-400 font-bold">00:00:00</span>
            </div>
          </div>
        </div>
        
        <div class="glass rounded-xl p-6 neon">
          <h3 class="text-lg font-semibold mb-4 text-cyan-400">Chat</h3>
          <div id="chatMessages" class="h-48 overflow-y-auto bg-gray-900 rounded p-3 mb-3 text-sm">
            <div class="text-gray-500 text-center">No messages yet</div>
          </div>
          <div class="flex">
            <input id="chatInput" type="text" placeholder="Type a message..." 
                   class="flex-1 p-2 bg-gray-800 border border-gray-600 rounded-l text-white text-sm">
            <button onclick="sendMessage()" 
                    class="bg-blue-600 text-white px-4 py-2 rounded-r hover:bg-blue-700">
              Send
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="glass rounded-xl p-6 neon">
      <h3 class="text-lg font-semibold mb-4 text-cyan-400">Stream Settings</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium mb-2">Quality</label>
          <select id="quality" class="w-full p-2 bg-gray-800 border border-gray-600 rounded text-white">
            <option value="720p">720p</option>
            <option value="1080p" selected>1080p</option>
            <option value="4K">4K</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Bitrate</label>
          <select id="bitrateSelect" class="w-full p-2 bg-gray-800 border border-gray-600 rounded text-white">
            <option value="2500">2.5 Mbps</option>
            <option value="5000" selected>5 Mbps</option>
            <option value="8000">8 Mbps</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Server</label>
          <select id="server" class="w-full p-2 bg-gray-800 border border-gray-600 rounded text-white">
            <option value="us-east">US East</option>
            <option value="us-west" selected>US West</option>
            <option value="eu">Europe</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script>
    let socket;
    let isStreaming = false;
    let streamStartTime = null;
    let durationInterval = null;
    
    function initStreaming() {
      try {
        socket = io('http://localhost:3005');
        socket.on('streamStats', updateStreamStats);
        socket.on('chatMessage', addChatMessage);
        socket.on('viewerUpdate', updateViewers);
      } catch (e) {
        console.log('Using mock streaming data');
        startMockStreaming();
      }
    }
    
    function toggleStream() {
      isStreaming = !isStreaming;
      const button = document.getElementById('streamToggle');
      const status = document.getElementById('streamStatus');
      
      if (isStreaming) {
        button.textContent = '⏹️ Stop Stream';
        button.className = 'bg-red-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700';
        status.innerHTML = '<div class="w-3 h-3 bg-green-500 rounded-full live-indicator"></div><span class="text-green-400 font-semibold">LIVE</span>';
        
        document.getElementById('streamPreview').innerHTML = `
          <video autoplay muted class="w-full h-full object-cover rounded-lg">
            <source src="/demo-stream.mp4" type="video/mp4">
          </video>
        `;
        
        streamStartTime = Date.now();
        durationInterval = setInterval(updateDuration, 1000);
        startMockStats();
      } else {
        button.textContent = '🔴 Start Stream';
        button.className = 'bg-green-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-700';
        status.innerHTML = '<div class="w-3 h-3 bg-red-500 rounded-full live-indicator"></div><span class="text-red-400 font-semibold">OFFLINE</span>';
        
        document.getElementById('streamPreview').innerHTML = `
          <div class="text-gray-500 text-center">
            <div class="text-6xl mb-4">📹</div>
            <div>Stream Offline</div>
          </div>
        `;
        
        clearInterval(durationInterval);
        resetStats();
      }
    }
    
    function updateDuration() {
      if (!streamStartTime) return;
      const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
      const hours = Math.floor(elapsed / 3600);
      const minutes = Math.floor((elapsed % 3600) / 60);
      const seconds = elapsed % 60;
      
      document.getElementById('duration').textContent = 
        `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function startMockStats() {
      setInterval(() => {
        if (!isStreaming) return;
        
        const viewers = Math.floor(Math.random() * 50) + 100;
        const bitrate = Math.floor(Math.random() * 1000) + 4500;
        const fps = Math.floor(Math.random() * 5) + 58;
        
        document.getElementById('viewerCount').textContent = viewers;
        document.getElementById('bitrate').textContent = bitrate + ' kbps';
        document.getElementById('fps').textContent = fps;
      }, 2000);
    }
    
    function resetStats() {
      document.getElementById('viewerCount').textContent = '0';
      document.getElementById('bitrate').textContent = '0 kbps';
      document.getElementById('fps').textContent = '0';
      document.getElementById('duration').textContent = '00:00:00';
    }
    
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;
      
      addChatMessage({
        user: 'You',
        message: message,
        timestamp: Date.now()
      });
      
      input.value = '';
    }
    
    function addChatMessage(data) {
      const container = document.getElementById('chatMessages');
      if (container.children.length === 1 && container.children[0].textContent === 'No messages yet') {
        container.innerHTML = '';
      }
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'mb-2';
      messageDiv.innerHTML = `
        <span class="text-cyan-400 font-semibold">${data.user}:</span>
        <span class="text-white">${data.message}</span>
      `;
      
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
    }
    
    function switchCamera() {
      if (isStreaming) {
        addChatMessage({ user: 'System', message: 'Camera switched', timestamp: Date.now() });
      }
    }
    
    function toggleAudio() {
      if (isStreaming) {
        addChatMessage({ user: 'System', message: 'Audio toggled', timestamp: Date.now() });
      }
    }
    
    function shareScreen() {
      if (isStreaming) {
        addChatMessage({ user: 'System', message: 'Screen sharing started', timestamp: Date.now() });
      }
    }
    
    function startMockStreaming() {
      setInterval(() => {
        if (isStreaming && Math.random() > 0.7) {
          const users = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve'];
          const messages = ['Great stream!', 'Love this content', 'Amazing quality', 'Keep it up!', 'Awesome!'];
          
          addChatMessage({
            user: users[Math.floor(Math.random() * users.length)],
            message: messages[Math.floor(Math.random() * messages.length)],
            timestamp: Date.now()
          });
        }
      }, 3000);
    }
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    document.addEventListener('DOMContentLoaded', initStreaming);
  </script>
</body>
</html>
