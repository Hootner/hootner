<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Session Revocation System -->
  <script src="../assets/security/session-revocation.js"></script>
  
  <link rel="stylesheet" href="shared-styles.css" />
  <title>Advanced Analytics - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e); color: #00ff00; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .neon { box-shadow: 0 0 20px rgba(0,212,255,0.3); }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-4xl font-bold mb-8 bg-gradient-to-r from-green-400 to-cyan-400 bg-clip-text text-transparent">
      🧠 Advanced Analytics
    </h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="glass rounded-xl p-6 neon">
        <h3 class="text-lg font-semibold mb-4 text-cyan-400">AI Predictions</h3>
        <div id="ai-predictions" class="space-y-3">
          <div class="flex justify-between">
            <span>Next Hour Traffic</span>
            <span class="text-green-400 font-bold">+23%</span>
          </div>
          <div class="flex justify-between">
            <span>Revenue Forecast</span>
            <span class="text-green-400 font-bold">$15.2K</span>
          </div>
          <div class="flex justify-between">
            <span>User Growth</span>
            <span class="text-green-400 font-bold">+8.5%</span>
          </div>
        </div>
      </div>
      
      <div class="glass rounded-xl p-6 neon">
        <h3 class="text-lg font-semibold mb-4 text-cyan-400">Performance Score</h3>
        <div class="text-center">
          <div id="performance-score" class="text-5xl font-bold text-green-400 mb-2">94</div>
          <div class="text-sm text-gray-400">Excellent Performance</div>
          <div class="w-full bg-gray-700 rounded-full h-2 mt-4">
            <div class="bg-green-400 h-2 rounded-full" style="width: 94%"></div>
          </div>
        </div>
      </div>
      
      <div class="glass rounded-xl p-6 neon">
        <h3 class="text-lg font-semibold mb-4 text-cyan-400">Real-time Alerts</h3>
        <div id="realtime-alerts" class="space-y-2">
          <div class="text-sm p-2 bg-green-900/30 rounded border-l-2 border-green-400">
            ✅ All systems operational
          </div>
          <div class="text-sm p-2 bg-yellow-900/30 rounded border-l-2 border-yellow-400">
            ⚠️ High CPU usage detected
          </div>
        </div>
      </div>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="glass rounded-xl p-6 neon">
        <h3 class="text-lg font-semibold mb-4 text-cyan-400">Traffic Heatmap</h3>
        <div id="heatmap" class="h-64"></div>
      </div>
      
      <div class="glass rounded-xl p-6 neon">
        <h3 class="text-lg font-semibold mb-4 text-cyan-400">User Journey Flow</h3>
        <div id="user-flow" class="h-64"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // Import API configuration
    import { API_ENDPOINTS } from '/config/api-endpoints.js';
    
    // Initialize advanced analytics
    let socket;
    
    function initAnalytics() {
      try {
        socket = io(API_ENDPOINTS.WS_URL);
        socket.on('analytics', updateAnalytics);
        socket.on('predictions', updatePredictions);
      } catch (e) {
        console.log('Using mock analytics data');
        startMockAnalytics();
      }
      
      createHeatmap();
      createUserFlow();
    }
    
    function updateAnalytics(data) {
      if (data.performanceScore) {
        document.getElementById('performance-score').textContent = data.performanceScore;
      }
    }
    
    function updatePredictions(data) {
      const container = document.getElementById('ai-predictions');
      container.innerHTML = Object.entries(data).map(([key, value]) => 
        `<div class="flex justify-between">
          <span>${key}</span>
          <span class="text-green-400 font-bold">${value}</span>
        </div>`
      ).join('');
    }
    
    function createHeatmap() {
      const data = Array.from({length: 24}, (_, i) => ({
        hour: i,
        value: Math.random() * 100
      }));
      
      const svg = d3.select('#heatmap').append('svg')
        .attr('width', '100%')
        .attr('height', '100%');
        
      const colorScale = d3.scaleSequential(d3.interpolateViridis)
        .domain([0, 100]);
        
      svg.selectAll('rect')
        .data(data)
        .enter()
        .append('rect')
        .attr('x', (d, i) => i * 20)
        .attr('y', 50)
        .attr('width', 18)
        .attr('height', 30)
        .attr('fill', d => colorScale(d.value));
    }
    
    function createUserFlow() {
      const svg = d3.select('#user-flow').append('svg')
        .attr('width', '100%')
        .attr('height', '100%');
        
      const nodes = [
        {id: 'Landing', x: 50, y: 50},
        {id: 'Dashboard', x: 150, y: 50},
        {id: 'Video', x: 250, y: 50},
        {id: 'Marketplace', x: 150, y: 150}
      ];
      
      svg.selectAll('circle')
        .data(nodes)
        .enter()
        .append('circle')
        .attr('cx', d => d.x)
        .attr('cy', d => d.y)
        .attr('r', 20)
        .attr('fill', '#00ff00');
        
      svg.selectAll('text')
        .data(nodes)
        .enter()
        .append('text')
        .attr('x', d => d.x)
        .attr('y', d => d.y + 35)
        .attr('text-anchor', 'middle')
        .attr('fill', '#00ffff')
        .attr('font-size', '12px')
        .text(d => d.id);
    }
    
    function startMockAnalytics() {
      setInterval(() => {
        const score = Math.floor(Math.random() * 20) + 80;
        document.getElementById('performance-score').textContent = score;
        
        const predictions = {
          'Traffic Growth': `+${Math.floor(Math.random() * 30)}%`,
          'Revenue Forecast': `$${(Math.random() * 10 + 10).toFixed(1)}K`,
          'User Retention': `${(Math.random() * 10 + 85).toFixed(1)}%`
        };
        updatePredictions(predictions);
      }, 5000);
    }
    
    document.addEventListener('DOMContentLoaded', initAnalytics);
  </script>
</body>
</html>
