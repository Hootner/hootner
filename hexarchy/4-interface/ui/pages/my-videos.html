<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="shared-styles.css" />
  <title>📹 My Videos - HOOTNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e);
      color: #00ff00;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    
    .glass { 
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .video-card {
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.05), rgba(0, 255, 255, 0.05));
      border: 2px solid rgba(0, 255, 0, 0.2);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s;
    }
    
    .video-card:hover {
      border-color: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      transform: translateY(-4px);
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #00ff00, #00ffff);
      color: #000;
    }
    
    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    
    .btn-secondary {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid rgba(0, 255, 0, 0.3);
      color: #00ff00;
    }
    
    .btn-secondary:hover {
      background: rgba(0, 255, 0, 0.2);
      border-color: rgba(0, 255, 255, 0.5);
    }
    
    .spinner {
      border: 3px solid rgba(0, 255, 0, 0.3);
      border-top: 3px solid #00ff00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="p-6">
  <!-- Header -->
  <div class="max-w-7xl mx-auto mb-8">
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-4xl font-bold mb-2" style="color: #00ffff;">📹 My Videos</h1>
        <p class="text-gray-400">View, download, and manage your generated videos</p>
      </div>
      <button onclick="refreshVideos()" class="btn btn-primary">
        🔄 Refresh
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading" class="flex justify-center items-center min-h-[400px]">
    <div>
      <div class="spinner mx-auto mb-4"></div>
      <p class="text-center text-cyan-400">Loading your videos...</p>
    </div>
  </div>

  <!-- Error State -->
  <div id="error" class="hidden max-w-4xl mx-auto glass rounded-2xl p-8 text-center">
    <div class="text-6xl mb-4">⚠️</div>
    <h2 class="text-2xl font-bold mb-2 text-red-400">Failed to Load Videos</h2>
    <p class="text-gray-400 mb-6" id="errorMessage"></p>
    <button onclick="refreshVideos()" class="btn btn-primary">
      Try Again
    </button>
  </div>

  <!-- Empty State -->
  <div id="empty" class="hidden max-w-4xl mx-auto glass rounded-2xl p-12 text-center">
    <div class="text-6xl mb-4">🎬</div>
    <h2 class="text-2xl font-bold mb-2" style="color: #00ffff;">No Videos Yet</h2>
    <p class="text-gray-400 mb-6">Generate your first AI video to see it here</p>
    <a href="/ai-video.html" class="inline-block btn btn-primary">
      🎨 Create Video
    </a>
  </div>

  <!-- Videos Grid -->
  <div id="videos-grid" class="hidden max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Videos will be inserted here -->
  </div>

  <!-- Video Modal -->
  <div id="videoModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="closeModal(event)">
    <div class="glass rounded-2xl max-w-4xl w-full p-6" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-2xl font-bold" style="color: #00ffff;">Video Player</h3>
        <button onclick="closeModal()" class="text-3xl hover:text-red-400 transition-colors">×</button>
      </div>
      <video id="modalVideo" controls class="w-full rounded-lg mb-4" style="max-height: 70vh;">
        Your browser does not support video playback.
      </video>
      <div class="flex gap-3">
        <button id="downloadBtn" class="btn btn-primary flex-1">
          ⬇️ Download Video
        </button>
        <button onclick="closeModal()" class="btn btn-secondary">
          Close
        </button>
      </div>
    </div>
  </div>

  <script>
    const S3_BUCKET = 'hootner-videos-504165876439';
    const CLOUDFRONT_URL = 'https://daxqx65ar35pp.cloudfront.net'; // Update if you have a CloudFront for videos
    const API_URL = 'https://p5huox4j01.execute-api.us-east-1.amazonaws.com/prod';
    
    let videos = [];
    
    async function loadVideos() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const emptyEl = document.getElementById('empty');
      const gridEl = document.getElementById('videos-grid');
      
      // Show loading
      loadingEl.classList.remove('hidden');
      errorEl.classList.add('hidden');
      emptyEl.classList.add('hidden');
      gridEl.classList.add('hidden');
      
      try {
        // Try API endpoint first
        const response = await fetch(`${API_URL}/videos`, {
          headers: {
            'Content-Type': 'application/json'
          }
        });
        
        if (!response.ok) {
          throw new Error('API request failed');
        }
        
        const data = await response.json();
        videos = data.videos || [];
        
        if (videos.length === 0) {
          // Check localStorage for locally generated videos
          const localVideos = JSON.parse(localStorage.getItem('generatedVideos') || '[]');
          videos = localVideos;
        }
        
        loadingEl.classList.add('hidden');
        
        if (videos.length === 0) {
          emptyEl.classList.remove('hidden');
        } else {
          renderVideos();
          gridEl.classList.remove('hidden');
        }
      } catch (error) {
        console.error('Error loading videos:', error);
        
        // Fallback: try to load from localStorage
        const localVideos = JSON.parse(localStorage.getItem('generatedVideos') || '[]');
        
        if (localVideos.length > 0) {
          videos = localVideos;
          loadingEl.classList.add('hidden');
          renderVideos();
          gridEl.classList.remove('hidden');
        } else {
          // Show error
          loadingEl.classList.add('hidden');
          errorEl.classList.remove('hidden');
          document.getElementById('errorMessage').textContent = 
            'Could not connect to video service. Please check your connection or try uploading a video.';
        }
      }
    }
    
    function renderVideos() {
      const grid = document.getElementById('videos-grid');
      grid.innerHTML = '';
      
      videos.forEach((video, index) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        
        const videoUrl = video.url || video.path || `https://${S3_BUCKET}.s3.amazonaws.com/${video.key || video.filename}`;
        const thumbnailUrl = video.thumbnail || videoUrl; // Use video as thumbnail fallback
        const title = video.title || video.name || `Video ${index + 1}`;
        const date = video.created || video.date || new Date().toLocaleDateString();
        const size = video.size ? formatFileSize(video.size) : 'Unknown size';
        
        card.innerHTML = `
          <div class="relative">
            <video 
              src="${videoUrl}" 
              class="w-full h-48 object-cover cursor-pointer"
              muted
              onmouseover="this.play()"
              onmouseout="this.pause(); this.currentTime=0;"
              onclick="openVideo('${videoUrl}', '${title}')"
            ></video>
            <div class="absolute top-2 right-2 bg-black/70 px-3 py-1 rounded-full text-xs">
              ${size}
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-bold text-lg mb-2" style="color: #00ffff;">${title}</h3>
            <p class="text-sm text-gray-400 mb-4">📅 ${date}</p>
            <div class="flex gap-2">
              <button onclick="openVideo('${videoUrl}', '${title}')" class="btn btn-primary flex-1 text-sm py-2">
                ▶️ Play
              </button>
              <button onclick="downloadVideo('${videoUrl}', '${title}')" class="btn btn-secondary text-sm py-2 px-4">
                ⬇️
              </button>
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    function openVideo(url, title) {
      const modal = document.getElementById('videoModal');
      const video = document.getElementById('modalVideo');
      const downloadBtn = document.getElementById('downloadBtn');
      
      video.src = url;
      modal.classList.remove('hidden');
      
      downloadBtn.onclick = () => downloadVideo(url, title);
    }
    
    function closeModal(event) {
      if (!event || event.target === event.currentTarget || !event.target) {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('modalVideo');
        modal.classList.add('hidden');
        video.pause();
        video.src = '';
      }
    }
    
    async function downloadVideo(url, title) {
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = `${title.replace(/[^a-z0-9]/gi, '_')}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(downloadUrl);
        
        showToast('✅ Download started!', 'success');
      } catch (error) {
        console.error('Download error:', error);
        showToast('❌ Download failed. Try right-click > Save As', 'error');
      }
    }
    
    function refreshVideos() {
      loadVideos();
    }
    
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg font-bold z-50 ${
        type === 'success' ? 'bg-green-600' : 'bg-red-600'
      } text-white shadow-2xl`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => document.body.removeChild(toast), 300);
      }, 3000);
    }
    
    // Initialize
    loadVideos();
    
    // ESC key to close modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
  </script>
</body>
</html>
