name: Copilot Commit Enhancement
on:
  push:
    branches: [main, develop]

jobs:
  enhance-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Generate Enhanced Commit Message
        run: |
          # Get the diff
          DIFF=$(git diff HEAD~1 HEAD)
          
          # Use Copilot to enhance commit message
          echo "🤖 Copilot Pro Enhanced Commit Analysis:" >> commit-analysis.md
          echo "Files changed: $(git diff --name-only HEAD~1 HEAD | wc -l)" >> commit-analysis.md
          echo "Lines added: $(git diff --shortstat HEAD~1 HEAD)" >> commit-analysis.md
          
      - name: Update README with latest changes
        run: |
          echo "Last updated: $(date)" >> README.md
          echo "Latest commit enhanced by Copilot Pro" >> README.md