name: PR Merge Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - develop
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate'
        required: false

jobs:
  # Job 1: Dry-run merge testing
  dry-run-merge:
    name: 🧪 Dry-Run Merge Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      
      - name: Fetch target branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
      
      - name: Check for merge conflicts
        id: conflict-check
        run: |
          echo "Analyzing merge conflicts..."
          MERGE_BASE=$(git merge-base HEAD origin/${{ github.event.pull_request.base.ref }})
          MERGE_TREE=$(git merge-tree $MERGE_BASE HEAD origin/${{ github.event.pull_request.base.ref }})
          
          if echo "$MERGE_TREE" | grep -q '<<<<<<<'; then
            echo "conflicts=true" >> $GITHUB_OUTPUT
            echo "❌ Merge conflicts detected!"
            echo "$MERGE_TREE" | grep -A 5 -B 5 '<<<<<<'
            exit 1
          else
            echo "conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ No merge conflicts detected"
          fi
      
      - name: Comment conflict status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Merge Conflict Detected**\n\nThis PR has conflicts with the base branch. Please resolve them before merging.\n\nSee the workflow logs for details on conflicting files.'
            })

  # Job 2: Code quality and validation
  validation:
    name: ✅ Code Validation
    runs-on: ubuntu-latest
    needs: dry-run-merge
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Check infrastructure
        run: node check-infrastructure.js
      
      - name: Validate MCP protocol
        run: npm run mcp:validate
        continue-on-error: true
      
      - name: Test dual-agent connections
        run: npm run dual-agent:test
        continue-on-error: true

  # Job 3: Security scanning
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: dry-run-merge
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run security audit script
        run: npm run security:audit
        continue-on-error: true
      
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.68.0
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  # Job 4: Run tests
  tests:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    needs: validation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Run integration tests
        run: npm run test:integration
        continue-on-error: true
      
      - name: Run smoke tests
        run: npm run test:smoke
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            coverage/

  # Job 5: Pre-merge validation summary
  merge-ready-check:
    name: 📊 Merge Ready Status
    runs-on: ubuntu-latest
    needs: [dry-run-merge, validation, security, tests]
    if: always()
    
    steps:
      - name: Check all jobs status
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = [
              { name: 'Dry-Run Merge', status: '${{ needs.dry-run-merge.result }}' },
              { name: 'Validation', status: '${{ needs.validation.result }}' },
              { name: 'Security', status: '${{ needs.security.result }}' },
              { name: 'Tests', status: '${{ needs.tests.result }}' }
            ];
            
            const failed = jobs.filter(j => j.status === 'failure');
            const warnings = jobs.filter(j => j.status === 'cancelled' || j.status === 'skipped');
            
            let summary = '## 📊 Merge Validation Summary\n\n';
            
            jobs.forEach(job => {
              const icon = job.status === 'success' ? '✅' : 
                          job.status === 'failure' ? '❌' : '⚠️';
              summary += `${icon} **${job.name}**: ${job.status}\n`;
            });
            
            if (failed.length === 0) {
              summary += '\n✅ **All checks passed!** This PR is ready for merge.\n';
            } else {
              summary += `\n❌ **${failed.length} check(s) failed.** Please address the issues before merging.\n`;
            }
            
            // Post comment to PR
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
            
            // Fail if critical checks failed
            if (failed.some(j => j.name === 'Dry-Run Merge')) {
              core.setFailed('Merge conflicts must be resolved');
            }

  # Job 6: Auto-label based on validation results
  auto-label:
    name: 🏷️ Auto Label
    runs-on: ubuntu-latest
    needs: [dry-run-merge, validation, security, tests]
    if: always()
    
    steps:
      - name: Add labels based on status
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [];
            
            // Add status labels
            if ('${{ needs.dry-run-merge.result }}' === 'success') {
              labels.push('merge-ready');
            } else if ('${{ needs.dry-run-merge.result }}' === 'failure') {
              labels.push('conflicts');
            }
            
            if ('${{ needs.security.result }}' === 'failure') {
              labels.push('security-review-needed');
            }
            
            if ('${{ needs.tests.result }}' === 'failure') {
              labels.push('tests-failing');
            }
            
            // Add labels to PR
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }
