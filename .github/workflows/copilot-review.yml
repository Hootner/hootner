name: Copilot Pro Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Copilot Code Analysis
        uses: github/copilot-cli-action@v1
        with:
          command: 'gh copilot suggest "Review this PR for security issues and code quality"'
          
      - name: Auto-fix with Copilot
        run: |
          # Use Copilot CLI to suggest fixes
          gh copilot suggest "Fix linting errors in changed files"
          
      - name: Comment PR with suggestions
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **Copilot Pro Analysis Complete**\n\nUse `@workspace /fix` in your IDE for bulk fixes\nUse `Ctrl+I` for inline suggestions'
            })