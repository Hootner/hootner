name: Smart Agent Orchestrator
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      agents:
        description: 'Agents to run (comma-separated: security,quality,performance)'
        required: false
        default: 'security,quality'

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.2.1'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Agent Orchestrator
        run: |
          AGENTS="${{ github.event.inputs.agents || 'security,quality' }}"
          node -e "
          const agents = '$AGENTS'.split(',');
          const { execSync } = require('child_process');
          
          agents.forEach(agent => {
            console.log(\`🤖 Running \${agent} agent...\`);
            try {
              switch(agent.trim()) {
                case 'security':
                  execSync('node copilot-delegate.js security', {stdio: 'inherit'});
                  break;
                case 'quality':
                  execSync('node copilot-delegate.js analyze package.json', {stdio: 'inherit'});
                  break;
                case 'performance':
                  execSync('node copilot-delegate.js optimize copilot-delegate.js', {stdio: 'inherit'});
                  break;
                case 'validate':
                  execSync('node copilot-delegate.js validate', {stdio: 'inherit'});
                  break;
              }
              console.log(\`✅ \${agent} completed\`);
            } catch (error) {
              console.log(\`❌ \${agent} failed\`);
            }
          });
          "