name: Copilot Task Monitor
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  monitor-copilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          
      - name: Monitor Copilot Progress
        run: |
          if [ -f "copilot-tasks.json" ]; then
            node copilot-delegate.js monitor
            echo "## 🤖 Copilot Task Status" >> $GITHUB_STEP_SUMMARY
            node copilot-delegate.js monitor >> $GITHUB_STEP_SUMMARY
          else
            echo "No Copilot tasks found"
          fi
          
      - name: Check for completed tasks
        run: |
          # Look for COPILOT comments in recent commits
          git log --since="30 minutes ago" --grep="COPILOT:" --oneline || echo "No Copilot activity"