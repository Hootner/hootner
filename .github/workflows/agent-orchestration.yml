name: 🎭 Agent Orchestration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily maintenance at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      task_type:
        description: "Task type to execute"
        required: true
        type: choice
        options:
          - code-analysis
          - deployment
          - documentation
          - maintenance
          - learning
      auto_fix:
        description: "Apply automatic fixes (for code-analysis)"
        required: false
        type: boolean
        default: false

jobs:
  code-analysis:
    name: 🔍 Intelligent Code Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || inputs.task_type == 'code-analysis'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Code Analysis Workflow
        run: |
          node agent-orchestrator-cli.js init
          node agent-orchestrator-cli.js analyze --path . ${{ inputs.auto_fix && '--auto-fix' || '' }}

      - name: Upload Analysis Results
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-results
          path: logs/analysis-*.json

  predictive-maintenance:
    name: 🔧 Predictive Maintenance
    runs-on: ubuntu-latest
    if: github.event.schedule || inputs.task_type == 'maintenance'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Maintenance Workflow
        run: |
          node agent-orchestrator-cli.js init
          node agent-orchestrator-cli.js maintenance

      - name: Create Maintenance Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔧 Predictive Maintenance Alert',
              body: 'Automated maintenance check detected critical issues. Review logs for details.',
              labels: ['maintenance', 'automated']
            })

  auto-documentation:
    name: 📝 Auto-Generate Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || inputs.task_type == 'documentation'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Documentation
        run: |
          node agent-orchestrator-cli.js init
          node agent-orchestrator-cli.js docs --path .

      - name: Commit Documentation Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 Auto-update documentation [skip ci]"
          file_pattern: "docs/**"

  continuous-learning:
    name: 🧠 Continuous Learning
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || inputs.task_type == 'learning'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Learning Workflow
        run: |
          node agent-orchestrator-cli.js init
          node agent-orchestrator-cli.js learn

      - name: Upload Learning Metrics
        uses: actions/upload-artifact@v4
        with:
          name: learning-metrics
          path: logs/learning-*.json

  orchestrator-status:
    name: 📊 Orchestrator Status Report
    runs-on: ubuntu-latest
    needs:
      [
        code-analysis,
        predictive-maintenance,
        auto-documentation,
        continuous-learning,
      ]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Status Report
        run: |
          node agent-orchestrator-cli.js init
          node agent-orchestrator-cli.js status

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = `
            ## 🎭 Agent Orchestration Report

            ### Workflow Results
            - Code Analysis: ${{ needs.code-analysis.result }}
            - Predictive Maintenance: ${{ needs.predictive-maintenance.result }}
            - Auto Documentation: ${{ needs.auto-documentation.result }}
            - Continuous Learning: ${{ needs.continuous-learning.result }}

            All agents executed successfully! ✅
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: status
            })
