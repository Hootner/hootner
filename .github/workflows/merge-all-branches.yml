name: Merge All Branches into Main

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform dry run without actual merging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  list-branches:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.get-branches.outputs.branches }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get all branches
        id: get-branches
        run: |
          # Get all remote branches except main and the current branch
          branches=$(git branch -r | grep -v 'HEAD' | grep -vE '^[[:space:]]*origin/main$' | sed 's|origin/||' | tr '\n' ' ')
          echo "Found branches: $branches"
          
          # Convert to JSON array
          branch_array=$(echo "$branches" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s .)
          echo "branches=$branch_array" >> $GITHUB_OUTPUT

  merge-branches:
    needs: list-branches
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.list-branches.outputs.branches) }}
      fail-fast: false
      max-parallel: 1
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch branch
        run: |
          echo "Fetching branch: ${{ matrix.branch }}"
          git fetch origin ${{ matrix.branch }}

      - name: Check if branch can be merged
        id: check-merge
        run: |
          # Check if branch is already merged
          if git branch -r --merged origin/main | grep -q "origin/${{ matrix.branch }}"; then
            echo "already_merged=true" >> $GITHUB_OUTPUT
            echo "Branch ${{ matrix.branch }} is already merged into main"
            exit 0
          fi
          
          # Check if branch is up to date with main
          git merge-base --is-ancestor origin/main origin/${{ matrix.branch }} && echo "up_to_date=true" >> $GITHUB_OUTPUT || echo "up_to_date=false" >> $GITHUB_OUTPUT
          
          echo "already_merged=false" >> $GITHUB_OUTPUT

      - name: Attempt merge (dry run)
        if: steps.check-merge.outputs.already_merged != 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "DRY RUN: Would merge ${{ matrix.branch }} into main"
          git merge --no-commit --no-ff origin/${{ matrix.branch }} || echo "Merge conflict detected"
          git merge --abort || true

      - name: Merge branch into main
        if: steps.check-merge.outputs.already_merged != 'true' && github.event.inputs.dry_run == 'false'
        id: merge
        continue-on-error: true
        run: |
          echo "Merging ${{ matrix.branch }} into main..."
          
          # Attempt automatic merge
          if git merge --no-ff origin/${{ matrix.branch }} -m "Merge branch '${{ matrix.branch }}' into main"; then
            echo "merge_status=success" >> $GITHUB_OUTPUT
            echo "✅ Successfully merged ${{ matrix.branch }}"
          else
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            echo "⚠️ Merge conflict detected for ${{ matrix.branch }}"
            git merge --abort
            exit 1
          fi

      - name: Push changes
        if: steps.check-merge.outputs.already_merged != 'true' && github.event.inputs.dry_run == 'false' && steps.merge.outputs.merge_status == 'success'
        run: |
          git push origin main
          echo "✅ Pushed merged changes to main"

      - name: Create issue for merge conflict
        if: steps.merge.outputs.merge_status == 'conflict' && github.event.inputs.dry_run == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ matrix.branch }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge conflict: ${branch} into main`,
              body: `Automatic merge of branch \`${branch}\` into \`main\` failed due to merge conflicts.
              
              ## Action Required
              Please manually resolve the conflicts and merge this branch.
              
              ## Steps to resolve:
              1. \`git checkout main\`
              2. \`git pull origin main\`
              3. \`git merge ${branch}\`
              4. Resolve conflicts
              5. \`git commit\`
              6. \`git push origin main\`
              
              Branch: \`${branch}\``,
              labels: ['merge-conflict', 'needs-attention']
            });

  summary:
    needs: merge-branches
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Merge Summary
        run: |
          echo "## Merge All Branches Summary"
          echo "Workflow completed. Check individual job results for details."
          echo "Mode: ${{ github.event.inputs.dry_run == 'true' && 'DRY RUN' || 'ACTUAL MERGE' }}"
