<!doctype html>
<html lang="en">
  <head>
  <link rel="stylesheet" href="../html-pages/styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOOTNER Code Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- HOOTNER Extensions -->
    <script src="error-handler.js"></script>
    <script src="lsp-client.js"></script>
    <script src="monaco-extensions.js"></script>
    <script src="performance-optimizer.js"></script>
    <script src="renderer-manager.js"></script>
    <script src="ui-enhancements.js"></script>
    <script src="feature-expansions.js"></script>
    <script src="security-compliance.js"></script>
    <script src="cross-integration.js"></script>

    <style>
      :root {
        --bg: #1e1e1e;
        --sidebar-bg: #252526;
        --tab-bg: #2d2d30;
        --accent: #007acc;
        --text: #cccccc;
        --text-muted: #969696;
        --border: #3c3c3c;
        --hover: #2a2d2e;
        --active: #37373d;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
      }
      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .main-content {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .top-bar {
        background: #323233;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text-muted);
      }
      .top-bar button {
        background: none;
        border: none;
        color: var(--text);
        padding: 6px 12px;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .top-bar button:hover {
        background: var(--hover);
      }
      .activity-bar {
        width: 50px;
        background: #333333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 8px;
        border-right: 1px solid var(--border);
        gap: 4px;
      }
      .activity-icon {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        cursor: pointer;
        border-radius: 6px;
        transition: all 0.2s;
      }
      .activity-icon:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .activity-icon.active {
        color: white;
        position: relative;
      }
      .activity-icon.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--accent);
      }
      .sidebar {
        width: 280px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }
      .sidebar-header {
        padding: 10px 12px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #858585;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sidebar-actions button {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 16px;
        padding: 4px;
        cursor: pointer;
        border-radius: 4px;
      }
      .sidebar-actions button:hover {
        color: white;
        background: rgba(255, 255, 255, 0.1);
      }
      .file-tree {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      .file-item {
        padding: 3px 8px;
        cursor: pointer;
        font-size: 13.5px;
        display: flex;
        align-items: center;
        gap: 6px;
        border-radius: 4px;
        margin: 0 6px;
        transition: background 0.2s;
      }
      .file-item:hover {
        background: var(--hover);
      }
      .file-item.active {
        background: var(--active);
        color: white;
      }
      .file-item.folder {
        font-weight: 500;
      }
      .file-item.nested {
        padding-left: 28px;
      }
      .file-icon {
        font-size: 15px;
        width: 18px;
        text-align: center;
      }
      .editor-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }
      .tabs {
        display: flex;
        background: var(--tab-bg);
        height: 36px;
        overflow-x: auto;
        border-bottom: 1px solid var(--border);
      }
      .tabs::-webkit-scrollbar {
        height: 0;
      }
      .tab {
        padding: 0 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-muted);
        cursor: pointer;
        min-width: fit-content;
        border-right: 1px solid var(--border);
        transition: all 0.2s;
      }
      .tab.active {
        background: var(--bg);
        color: white;
      }
      .tab:hover:not(.active) {
        background: var(--hover);
      }
      .tab-close {
        opacity: 0;
        font-size: 18px;
        padding: 4px;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .tab:hover .tab-close {
        opacity: 1;
      }
      .tab-close:hover {
        background: rgba(255, 0, 0, 0.4);
        color: white;
      }
      .unsaved-dot {
        width: 8px;
        height: 8px;
        background: #ff9800;
        border-radius: 50%;
      }
      #editor {
        flex: 1;
      }
      .split-view {
        display: flex;
        flex: 1;
      }
      .editor-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .preview-pane {
        flex: 1;
        background: white;
        border-left: 1px solid var(--border);
      }
      .preview-iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .terminal-container {
        height: 100%;
        background: #000;
      }
      .ai-panel {
        position: fixed;
        right: 0;
        top: 38px;
        bottom: 0;
        width: 350px;
        background: var(--sidebar-bg);
        border-left: 1px solid var(--border);
        transform: translateX(100%);
        transition: transform 0.3s;
        z-index: 50;
        display: flex;
        flex-direction: column;
      }
      .ai-panel.open {
        transform: translateX(0);
      }
      .ai-chat {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .ai-message {
        margin: 8px 0;
        padding: 8px;
        border-radius: 8px;
      }
      .ai-message.user {
        background: var(--accent);
        color: white;
        margin-left: 20px;
      }
      .ai-message.assistant {
        background: var(--hover);
        margin-right: 20px;
      }
      .ai-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        border-top: 1px solid var(--border);
      }
      .git-status {
        position: fixed;
        bottom: 80px;
        left: 50px;
        right: 0;
        height: 200px;
        background: var(--sidebar-bg);
        border-top: 1px solid var(--border);
        transform: translateY(100%);
        transition: transform 0.3s;
        z-index: 40;
      }
      .git-status.open {
        transform: translateY(0);
      }
      .collab-cursor {
        position: absolute;
        width: 2px;
        height: 20px;
        background: #ff00ff;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }
      .snippet-panel {
        position: fixed;
        left: 330px;
        top: 38px;
        width: 300px;
        height: 400px;
        background: var(--sidebar-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        display: none;
        z-index: 100;
        flex-direction: column;
      }
      .snippet-item {
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
      }
      .snippet-item:hover {
        background: var(--hover);
      }
      .diff-viewer {
        position: fixed;
        inset: 50px;
        background: var(--bg);
        border: 2px solid var(--accent);
        border-radius: 8px;
        display: none;
        z-index: 200;
        flex-direction: column;
      }
      .diff-side {
        flex: 1;
        overflow: auto;
        padding: 12px;
        font-family: monospace;
        font-size: 13px;
      }
      .diff-add {
        background: rgba(0, 255, 0, 0.1);
      }
      .diff-remove {
        background: rgba(255, 0, 0, 0.1);
      }
      .perf-overlay {
        position: fixed;
        top: 38px;
        right: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #0f0;
        padding: 8px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 11px;
        z-index: 150;
      }
      .plugin-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        background: #ff0;
        color: #000;
        font-size: 8px;
        padding: 2px 4px;
        border-radius: 3px;
      }
      .panel {
        height: 220px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: height 0.3s;
      }
      .panel-header {
        padding: 6px 12px;
        background: var(--sidebar-bg);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
      }
      .panel-tab {
        padding: 4px 10px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .panel-tab.active {
        background: var(--accent);
        color: white;
      }
      .panel-content {
        flex: 1;
        padding: 12px;
        overflow-y: auto;
        font-family: 'Consolas', monospace;
        font-size: 13px;
        line-height: 1.5;
      }
      .output-line {
        margin: 2px 0;
      }
      .output-line.error {
        color: #f48771;
      }
      .output-line.success {
        color: #4ec9b0;
      }
      .status-bar {
        background: linear-gradient(135deg, #0e639c, #1177bb);
        color: white;
        padding: 0 24px;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 120px;
        box-shadow: 0 -4px 16px rgba(0, 122, 204, 0.5);
        font-weight: 500;
      }
      .status-bar select {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 12px 18px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .status-bar select:hover {
        background: rgba(0, 0, 0, 0.6);
        border-color: rgba(255, 255, 255, 0.4);
      }
      .status-bar span {
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 6px;
        transition: all 0.2s;
        font-size: 14px;
      }
      .status-bar span:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .sidebar.hidden {
        display: none;
      }
      .zen-mode .activity-bar,
      .zen-mode .sidebar,
      .zen-mode .panel,
      .zen-mode .status-bar {
        display: none !important;
      }
      .zen-mode .editor-container {
        flex: 1;
      }
      .welcome-screen {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.97);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(10px);
      }
      .welcome-content {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        padding: 48px 80px;
        border-radius: 20px;
        text-align: center;
        border: 2px solid var(--accent);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.9);
        max-width: 680px;
      }
      .welcome-content h2 {
        font-size: 40px;
        background: linear-gradient(90deg, #00ff99, #00ffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
      }
      .quick-actions {
        position: fixed;
        bottom: 28px;
        right: 28px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 100;
      }
      .quick-btn {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0e639c, #1177bb);
        border: none;
        color: white;
        font-size: 26px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0, 122, 204, 0.5);
        transition: all 0.3s ease;
      }
      .quick-btn:hover {
        transform: scale(1.18) rotate(12deg);
        box-shadow: 0 12px 32px rgba(0, 122, 204, 0.7);
      }
      .enterprise-bar {
        background: #2d2d30;
        height: 32px;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 12px;
        border-bottom: 1px solid var(--border);
      }
      .enterprise-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .enterprise-btn:hover {
        background: var(--hover);
        border-color: var(--accent);
      }
    </style>
    <link rel="stylesheet" href="glass-ui.css">
  <script src="glass-ui.js" defer></script>
</head>
</head>
  <body>
    <div class="container">
      <div class="top-bar">
        <div>File Edit View Run Tools</div>
        <div>
          <button onclick="newFile()">New File</button>
          <button onclick="saveCode()">Save</button>
          <button onclick="runCode()">Run ▸</button>
          <button onclick="exportProject()">Export ZIP</button>
        </div>
      </div>

      <div class="main-content">
        <aside class="activity-bar" role="navigation" aria-label="Activity Bar"></aside>

        <aside class="sidebar">
          <div class="sidebar-header">
            <span>EXPLORER</span>
            <div class="sidebar-actions">
              <button onclick="newFile()" title="New File">📄</button>
              <button onclick="createFolder()" title="New Folder">📁</button>
            </div>
          </div>
          <div class="file-tree" id="fileTree"></div>
        </aside>

        <section class="editor-container" aria-label="Code Editor">
          <div class="tabs" id="tabs" role="tablist"></div>
          <div id="editor" style="flex: 1"></div>

          <div class="panel" id="panel">
            <div class="panel-header">
              <div class="panel-tab active" onclick="showPanel('output')">Output</div>
              <div class="panel-tab" onclick="showPanel('terminal')">Terminal</div>
              <div class="panel-tab" onclick="showPanel('problems')">Problems</div>
              <button
                style="
                  margin-left: auto;
                  background: none;
                  border: none;
                  color: #aaa;
                  font-size: 18px;
                  cursor: pointer;
                "
                onclick="
                  document.getElementById('panel').style.height = '0';
                  setTimeout(() => (this.parentElement.parentElement.style.display = 'none'), 300);
                "
              >
                ✕
              </button>
            </div>
            <div class="panel-content" id="panelContent">
              <div id="output">Welcome! Click Run to execute code.</div>
              <div id="terminal" class="terminal-container" style="display: none"></div>
            </div>
          </div>

          <div class="status-bar"></div>
        </section>
      </div>
    </div>

    <div class="ai-panel" id="aiPanel">
      <div
        style="
          padding: 12px;
          border-bottom: 1px solid var(--border);
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <h3 style="margin: 0">🤖 AI Assistant</h3>
        <button
          onclick="toggleAI()"
          style="
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
          "
        >
          ×
        </button>
      </div>
      <div class="ai-chat" id="aiChat"></div>
      <div class="ai-input">
        <input
          type="text"
          id="aiInput"
          placeholder="Ask AI..."
          style="
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 4px;
          "
        />
        <button
          onclick="sendAI()"
          style="
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          Send
        </button>
      </div>
    </div>

    <div class="git-status" id="gitPanel">
      <div
        style="
          padding: 12px;
          border-bottom: 1px solid var(--border);
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div style="display: flex; gap: 16px; align-items: center">
          <span id="cursorPos">Ln 1, Col 1</span>
          <select id="languageSelect" onchange="changeLanguage()" aria-label="Select Language">
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="htmlmixed">HTML</option>
            <option value="css">CSS</option>
            <option value="markdown">Markdown</option>
          </select>
        </div>
        <div style="display: flex; gap: 16px; align-items: center">
          <select id="themeSelect" onchange="changeTheme()" aria-label="Select Theme">
            <option value="vs-dark">Dark</option>
            <option value="monokai">Monokai</option>
            <option value="dracula">Dracula</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="minimalist">Minimalist</option>
            <option value="high-contrast">High Contrast</option>
          </select>
          <span style="cursor: pointer" onclick="togglePanel()">🗂 Panel</span>
          <span id="v8Version"></span>
          <button
            onclick="toggleGit()"
            style="
              background: none;
              border: none;
              color: var(--text);
              cursor: pointer;
              font-size: 20px;
            "
          >
            ×
          </button>
        </div>
      </div>
      <div style="padding: 12px; overflow-y: auto; height: calc(100% - 50px)" id="gitContent"></div>
    </div>

    <div class="snippet-panel" id="snippetPanel">
      <div
        style="
          padding: 12px;
          border-bottom: 1px solid var(--border);
          display: flex;
          justify-content: space-between;
        "
      >
        <h3 style="margin: 0; font-size: 14px">📝 Snippets</h3>
        <button
          onclick="toggleSnippets()"
          style="background: none; border: none; color: var(--text); cursor: pointer"
        >
          ×
        </button>
      </div>
      <div style="flex: 1; overflow-y: auto" id="snippetList"></div>
    </div>

    <div class="diff-viewer" id="diffViewer">
      <div
        style="
          padding: 12px;
          border-bottom: 1px solid var(--border);
          display: flex;
          justify-content: space-between;
        "
      >
        <h3 style="margin: 0">🔀 Diff Viewer</h3>
        <button
          onclick="document.getElementById('diffViewer').style.display = 'none'"
          style="
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
          "
        >
          ×
        </button>
      </div>
      <div style="display: flex; flex: 1">
        <div class="diff-side" id="diffLeft"></div>
        <div class="diff-side" id="diffRight"></div>
      </div>
    </div>

    <div class="perf-overlay" id="perfOverlay" style="display: none">
      <div>FPS: <span id="fps">60</span></div>
      <div>Memory: <span id="memory">0</span> MB</div>
      <div>Files: <span id="fileCount">0</span></div>
      <div>Lines: <span id="lineCount">0</span></div>
    </div>

    <script>
      const vm = require('vm');
      let editor;
      let errorHandler;
      let lspClient;
      let monacoExtensions;
      let perfOptimizer;
      let rendererManager;
      let uiEnhancer;
      let featureExpansions;
      let securityCompliance;
      let crossIntegration;

      const state = {
        fileSystem: {},
        currentFile: null,
        openTabs: [],
        unsavedChanges: new Set(),
        expandedFolders: new Set(),
        originalContent: {},
        lspConnected: false,
        documentVersion: 0,
      };

      function checkV8Compatibility() {
        const v8Version = process.versions.v8.split('.').map(Number);
        const minVersion = [9, 0, 0];
        const isCompatible =
          v8Version[0] > minVersion[0] ||
          (v8Version[0] === minVersion[0] && v8Version[1] >= minVersion[1]);

        if (!isCompatible) {
          alert(`Warning: V8 ${process.versions.v8} detected. Minimum v9.0 recommended.`);
        }
        return isCompatible;
      }

      window.onload = async () => {
        const initStart = performance.now();

        try {
          perfOptimizer = new PerformanceOptimizer();
          perfOptimizer.startMemoryMonitoring();
          perfOptimizer.optimizeForLongSession();

          rendererManager = new RendererManager();
          rendererManager.initializeDiffWorker();
          rendererManager.initializeAIWorker();

          errorHandler = new ErrorHandler();
          errorHandler.addListener(updateProblemsPanel);

          uiEnhancer = new UIEnhancer();
          uiEnhancer.syncSystemTheme();
          uiEnhancer.enableKeyboardNav();

          featureExpansions = new FeatureExpansions();
          featureExpansions.connectWebSocket().catch(() => {});

          securityCompliance = new SecurityCompliance();
          securityCompliance.applyRoleRestrictions(securityCompliance.getCurrentRole());

          crossIntegration = new CrossIntegration();
          crossIntegration.receiveFromApp();

          // Auto-update listener (Electron)
          if (typeof require !== 'undefined') {
            try {
              const { ipcRenderer } = require('electron');

              ipcRenderer.on('update-available', (event, info) => {
                errorHandler.showNotification(`Update available: v${info.version}`, 'info');
              });

              ipcRenderer.on('update-downloaded', () => {
                const install = confirm('Update downloaded. Install now?');
                if (install) ipcRenderer.send('install-update');
              });
            } catch (e) {
              // Not in Electron environment
            }
          }

          checkV8Compatibility();
          document.getElementById('v8Version').textContent =
            `V8: ${process.versions.v8} | Node: ${process.versions.node}`;

          await errorHandler.tryCatch(async () => {
            loadState();
            if (Object.keys(state.fileSystem).length === 0) {
              createFile('untitled.js', `console.log('Welcome to HOOTNER! 🦉');`);
            }
          }, 'Load state');

          const monaco = await perfOptimizer.measureOperation('Monaco Load', () =>
            perfOptimizer.lazyLoadMonaco()
          );
          window.monaco = monaco;

          await perfOptimizer.measureOperation('Editor Init', async () => {
            try {
              // Initialize Monaco Extensions
              monacoExtensions = new MonacoExtensions(monaco);
              monacoExtensions.registerLanguages();

              // Initialize LSP Client
              lspClient = new LSPClient();

              editor = monaco.editor.create(document.getElementById('editor'), {
                value: '',
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                wordWrap: 'on',
                quickSuggestions: true,
                suggestOnTriggerCharacters: true,
                parameterHints: { enabled: true },
                formatOnPaste: true,
                formatOnType: true,
              });

              editor.onDidChangeCursorPosition(() => {
                try {
                  const pos = editor.getPosition();
                  document.getElementById('cursorPos').textContent =
                    `Ln ${pos.lineNumber}, Col ${pos.column}`;
                } catch (error) {
                  errorHandler.handleError({
                    type: 'monaco',
                    message: error.message,
                    error,
                  });
                }
              });

              editor.onDidChangeModelContent(() => {
                try {
                  if (state.currentFile) {
                    const current = editor.getValue();
                    if (current !== state.originalContent[state.currentFile]) {
                      state.unsavedChanges.add(state.currentFile);
                    } else {
                      state.unsavedChanges.delete(state.currentFile);
                    }
                    renderTabs();
                    saveState();

                    // Notify LSP of changes
                    if (state.lspConnected) {
                      const lang = monacoExtensions.getLanguageByExtension(state.currentFile);
                      state.documentVersion++;
                      lspClient.notifyDidChange(
                        lang,
                        `file:///${state.currentFile}`,
                        current,
                        state.documentVersion
                      );
                    }
                  }
                } catch (error) {
                  errorHandler.handleError({
                    type: 'monaco',
                    message: error.message,
                    error,
                  });
                }
              });

              // Setup LSP providers
              setupLSPProviders();

              renderFileTree();
              renderTabs();
              if (state.currentFile) openFile(state.currentFile);
              if (!localStorage.getItem('hootner_welcomed')) showWelcome();

              uiEnhancer.renderActivityBar();
              uiEnhancer.updateStatusBar();
              setInterval(() => uiEnhancer.updateStatusBar(), 5000);

              const initTime = performance.now() - initStart;
              console.log(`✓ Editor initialized in ${initTime.toFixed(2)}ms`);
              errorHandler.showNotification(
                `HOOTNER Ready! (${initTime.toFixed(0)}ms) 🦉`,
                'success'
              );
            } catch (error) {
              errorHandler.handleError({
                type: 'critical',
                message: 'Editor initialization failed',
                error,
              });
            }
          });
        } catch (error) {
          console.error('Fatal initialization error:', error);
          alert('Failed to initialize editor. Please refresh the page.');
        }
      };

      async function setupLSPProviders() {
        try {
          // Try to connect to LSP servers (optional)
          const servers = {
            javascript: 'ws://localhost:3001/lsp/javascript',
            typescript: 'ws://localhost:3001/lsp/typescript',
            python: 'ws://localhost:3001/lsp/python',
          };

          for (const [lang, url] of Object.entries(servers)) {
            try {
              await errorHandler.withTimeout(
                () => lspClient.connect(lang, url),
                2000,
                `LSP ${lang} connection`
              );
              state.lspConnected = true;
              console.log(`✓ LSP connected: ${lang}`);
            } catch (error) {
              console.warn(`LSP ${lang} not available:`, error.message);
            }
          }

          // Setup completion providers with LSP fallback
          ['javascript', 'typescript', 'python'].forEach(lang => {
            monacoExtensions.setupCompletionProvider(lang, async (model, position) => {
              if (state.lspConnected) {
                const items = await lspClient.getCompletions(lang, model.uri.toString(), position);
                return items.map(item => ({
                  label: item.label,
                  kind:
                    monaco.languages.CompletionItemKind[item.kind] ||
                    monaco.languages.CompletionItemKind.Text,
                  insertText: item.insertText || item.label,
                  documentation: item.documentation,
                }));
              }
              return [];
            });

            monacoExtensions.setupHoverProvider(lang, async (model, position) => {
              if (state.lspConnected) {
                return await lspClient.getHover(lang, model.uri.toString(), position);
              }
              return null;
            });
          });
        } catch (error) {
          console.warn('LSP setup failed:', error);
        }
      }

      function updateProblemsPanel(error) {
        if (error.type === 'cleared') {
          return;
        }

        const panel = document.getElementById('output');
        if (panel && document.querySelector('.panel-tab.active')?.textContent === 'Problems') {
          const stats = errorHandler.getErrorStats();
          panel.innerHTML = `
          <div style="padding: 8px; border-bottom: 1px solid var(--border);">
            <strong>Problems (${stats.total})</strong>
          </div>
          ${stats.recent
            .map(
              err => `
            <div style="padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer;" 
                 onclick="showErrorDetails('${err.id}')">
              <div style="color: #f48771; font-weight: 500;">${err.type.toUpperCase()}</div>
              <div style="font-size: 13px; margin-top: 4px;">${errorHandler.escapeHtml(err.message)}</div>
              <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
                ${new Date(err.timestamp).toLocaleTimeString()}
              </div>
            </div>
          `
            )
            .join('')}
        `;
        }
      }

      window.updateProblems = diagnostics => {
        diagnostics.forEach(diag => {
          errorHandler.handleError({
            type: 'lsp',
            message: diag.message,
            line: diag.range?.start?.line,
            column: diag.range?.start?.character,
            timestamp: Date.now(),
          });
        });
      };

      function createFile(name = prompt('File name:', 'new-file.js'), content = '') {
        try {
          if (!securityCompliance.hasPermission('write')) {
            errorHandler.showNotification('Permission denied: write access required', 'error');
            return;
          }

          if (!name) return;

          const validation = errorHandler.validateFile(name);
          if (!validation.valid) {
            errorHandler.showNotification(validation.errors[0], 'error');
            return;
          }

          if (state.fileSystem[name]) {
            errorHandler.showNotification('File already exists!', 'warning');
            return;
          }

          state.fileSystem[name] = {
            type: 'file',
            content,
            mode: monacoExtensions ? monacoExtensions.getLanguageByExtension(name) : getMode(name),
            parent: null,
          };

          openFile(name);
          renderFileTree();
          saveState();
          securityCompliance.logAudit('file_created', { filename: name });
          errorHandler.showNotification(`File created: ${name}`, 'success');
        } catch (error) {
          errorHandler.handleError({
            type: 'file',
            message: `Failed to create file: ${error.message}`,
            error,
          });
        }
      }

      function createFolder() {
        const name = prompt('Folder name:', 'new-folder');
        if (!name || state.fileSystem[name]) return alert('Invalid or exists');
        state.fileSystem[name] = { type: 'folder', parent: null };
        state.expandedFolders.add(name);
        renderFileTree();
        saveState();
      }

      function openFile(name) {
        try {
          if (state.fileSystem[name]?.type !== 'file') return;
          if (!state.openTabs.includes(name)) state.openTabs.push(name);
          state.currentFile = name;
          const file = state.fileSystem[name];

          editor.setValue(file.content || '');

          const language = monacoExtensions
            ? monacoExtensions.getLanguageByExtension(name)
            : 'javascript';
          monaco.editor.setModelLanguage(editor.getModel(), language);
          document.getElementById('languageSelect').value = language;

          state.originalContent[name] = file.content;
          state.unsavedChanges.delete(name);
          state.documentVersion = 1;

          // Notify LSP
          if (state.lspConnected) {
            lspClient.notifyDidOpen(language, `file:///${name}`, file.content || '');
          }

          renderTabs();
          renderFileTree();
        } catch (error) {
          errorHandler.handleError({
            type: 'file',
            message: `Failed to open file: ${error.message}`,
            error,
          });
        }
      }

      function closeTab(name) {
        state.openTabs = state.openTabs.filter(t => t !== name);
        if (state.currentFile === name) {
          const next =
            state.openTabs[state.openTabs.length - 1] ||
            Object.keys(state.fileSystem).find(k => state.fileSystem[k].type === 'file');
          state.currentFile = next || null;
          if (next) openFile(next);
          else editor.setValue('');
        }
        renderTabs();
        saveState();
      }

      function renderTabs() {
        const container = document.getElementById('tabs');
        const tabsHTML = state.openTabs
          .map(name => {
            const unsaved = state.unsavedChanges.has(name) ? '<div class="unsaved-dot"></div>' : '';
            const active = name === state.currentFile ? 'active' : '';
            return `
          <div class="tab ${active}" onclick="openFile('${name}')" role="tab">
            <span>${unsaved}<span class="file-icon">📄</span>${name}</span>
            <span class="tab-close" onclick="event.stopPropagation(); closeTab('${name}')">×</span>
          </div>`;
          })
          .join('');
        container.innerHTML =
          tabsHTML || '<div style="padding:16px; color:#666;">No open editors</div>';
      }

      function renderFileTree() {
        const tree = document.getElementById('fileTree');
        const build = (parent = null, level = 0) => {
          return Object.keys(state.fileSystem)
            .filter(k => state.fileSystem[k].parent === parent)
            .sort((a, b) => (state.fileSystem[b].type === 'folder' ? 1 : -1))
            .map(key => {
              const item = state.fileSystem[key];
              const isFolder = item.type === 'folder';
              const expanded = state.expandedFolders.has(key);
              const icon = isFolder ? (expanded ? '📂' : '📁') : '📄';
              const indent = level * 20 + 8;
              return `
              <div>
                <div class="file-item ${key === state.currentFile ? 'active' : ''} ${isFolder ? 'folder' : ''}" 
                     style="padding-left:${indent}px"
                     onclick="${isFolder ? `toggleFolder('${key}')` : `openFile('${key}')`}">
                  <span class="file-icon">${icon}</span>
                  <span>${key}</span>
                </div>
                ${isFolder && expanded ? build(key, level + 1) : ''}
              </div>`;
            })
            .join('');
        };
        tree.innerHTML =
          build() ||
          '<div style="padding:20px; color:#666; text-align:center;">No files or folders</div>';
      }

      function toggleFolder(name) {
        state.expandedFolders.has(name)
          ? state.expandedFolders.delete(name)
          : state.expandedFolders.add(name);
        renderFileTree();
        saveState();
      }

      function getMode(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const map = {
          js: 'javascript',
          py: 'python',
          html: 'htmlmixed',
          css: 'css',
          md: 'markdown',
          json: 'application/json',
        };
        return map[ext] || 'javascript';
      }

      function changeLanguage() {
        const mode = document.getElementById('languageSelect').value;
        const langMap = {
          javascript: 'javascript',
          python: 'python',
          htmlmixed: 'html',
          css: 'css',
          markdown: 'markdown',
        };
        monaco.editor.setModelLanguage(editor.getModel(), langMap[mode] || 'javascript');
        if (state.currentFile) state.fileSystem[state.currentFile].mode = mode;
        saveState();
      }

      function changeTheme() {
        const theme = document.getElementById('themeSelect').value;
        if (uiEnhancer) {
          uiEnhancer.applyTheme(theme);

      function toggleMinimap() {
        if (editor) {
          const current = editor.getOptions().get(monaco.editor.EditorOption.minimap).enabled;
          editor.updateOptions({ minimap: { enabled: !current } });

      async function runCode() {
        try {
          securityCompliance.logAudit('code_executed', {
            file: state.currentFile,
          });

          showPanel('output');
          const output = document.getElementById('output');
          output.innerHTML = '';
          const code = editor.getValue();

          const validation = errorHandler.validateCode(code, 'javascript');
          if (!validation.valid) {
            addOutput('✗ Validation failed: ' + validation.error, 'error');
            return;
          }

          await errorHandler.withTimeout(
            async () => {
              const tempConsole = {
                log: (...args) => addOutput(args.join(' '), 'log'),
                error: (...args) => addOutput(args.join(' '), 'error'),
                warn: (...args) => addOutput(args.join(' '), 'warn'),
              };
              vm.runInNewContext(code, { console: tempConsole });
              addOutput('✓ Execution completed', 'success');
            },
            10000,
            'Code execution'
          );
        } catch (error) {
          addOutput('✗ ' + error.message, 'error');
          errorHandler.handleError({
            type: 'runtime',
            message: error.message,
            error,
          });
        }
      }

      function addOutput(text, type = '') {
        const line = document.createElement('div');
        line.className = `output-line ${type}`;
        line.textContent = text;
        document.getElementById('output').appendChild(line);
        line.scrollIntoView({ behavior: 'smooth' });

        if (!state.currentFile) return;
        const blob = new Blob([editor.getValue()], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = state.currentFile;
        a.click();

      let terminal;
      function showPanel(panel) {
        try {
          document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
          if (event?.target) event.target.classList.add('active');
          document.getElementById('panel').style.height = '220px';
          document.getElementById('panel').style.display = 'flex';
          document.getElementById('output').style.display = 'none';
          document.getElementById('terminal').style.display = 'none';

          if (panel === 'output') {
            document.getElementById('output').style.display = 'block';
          } else if (panel === 'terminal') {
            document.getElementById('terminal').style.display = 'block';
            if (!terminal && window.Terminal) {
              terminal = new Terminal({
                theme: { background: '#000', foreground: '#fff' },
              });
              terminal.open(document.getElementById('terminal'));
              terminal.writeln('HOOTNER Terminal v1.0');
              terminal.writeln('Type commands...');
              terminal.onData(data => {
                if (data === '\r') {
                  terminal.writeln('');
                  terminal.write('$ ');
                } else {
                  terminal.write(data);
                }
              });
              terminal.write('$ ');
            }
          } else if (panel === 'problems') {
            document.getElementById('output').style.display = 'block';
            const stats = errorHandler.getErrorStats();
            if (stats.total === 0) {
              document.getElementById('output').innerHTML =
                '<div style="color:#858585; padding: 12px;">✓ No problems detected.</div>';
            } else {
              updateProblemsPanel({});
            }
          }
        } catch (error) {
          console.error('Show panel error:', error);
        }

      async function sendAI() {
        const input = document.getElementById('aiInput');
        const chat = document.getElementById('aiChat');
        const msg = input.value.trim();
        if (!msg) return;

        chat.innerHTML += `<div class="ai-message user">${msg}</div>`;
        input.value = '';

        try {
          const code = editor.getValue();

          // Try real AI first
          if (featureExpansions.aiApiKey) {
            chat.innerHTML += `<div class="ai-message assistant">🤖 Thinking...</div>`;
            const response = await featureExpansions.queryAI(msg, code);
            chat.lastChild.innerHTML = `🤖 ${response}`;
          } else {
            // Fallback to local analysis
            const analysis = await perfOptimizer.measureOperation('AI Analysis', () =>
              rendererManager.offloadToWorker('ai', 'analyze', { code })
            );

            const responses = [
              `I analyzed your code: ${analysis.lines} lines, ${analysis.functions} functions, complexity: ${analysis.complexity}/10`,
              'Try adding error handling with try-catch.',
              'Consider using async/await for better readability.',
              `I found ${analysis.classes} classes in your code.`,
            ];
            chat.innerHTML += `<div class="ai-message assistant">🤖 ${responses[Math.floor(Math.random() * responses.length)]}</div>`;
          }

          chat.scrollTop = chat.scrollHeight;
          perfOptimizer.triggerGarbageCollection();
        } catch (error) {
          chat.innerHTML += `<div class="ai-message assistant">🤖 Error: ${error.message}</div>`;
        }
      }

      async function showDiff() {
        try {
          const viewer = document.getElementById('diffViewer');
          viewer.style.display = 'flex';

          const current = editor.getValue();
          const original = state.originalContent[state.currentFile] || '';

          const changes = await perfOptimizer.measureOperation('Diff Computation', () =>
            rendererManager.offloadToWorker('diff', 'diff', {
              original,
              current,
            })
          );

          document.getElementById('diffLeft').innerHTML =
            '<h4>Original</h4><pre>' +
            original
              .split('\n')
              .map((line, i) => {
                const change = changes.find(c => c.line === i + 1);
                const cls =
                  change?.type === 'removed' || change?.type === 'modified' ? 'diff-remove' : '';
                return `<div class="${cls}">${i + 1}: ${line || ' '}</div>`;
              })
              .join('') +
            '</pre>';

          document.getElementById('diffRight').innerHTML =
            '<h4>Current</h4><pre>' +
            current
              .split('\n')
              .map((line, i) => {
                const change = changes.find(c => c.line === i + 1);
                const cls =
                  change?.type === 'added' || change?.type === 'modified' ? 'diff-add' : '';
                return `<div class="${cls}">${i + 1}: ${line || ' '}</div>`;
              })
              .join('') +
            '</pre>';

          perfOptimizer.triggerGarbageCollection();
        } catch (error) {
          errorHandler.handleError({
            type: 'runtime',
            message: 'Diff failed',
            error,
          });
        }
      }

      let perfInterval;
      function togglePerf() {
        const overlay = document.getElementById('perfOverlay');
        overlay.style.display = overlay.style.display === 'none' ? 'block' : 'none';

        if (overlay.style.display === 'block') {
          let lastTime = performance.now();
          let frames = 0;

          perfInterval = setInterval(() => {
            frames++;
            const now = performance.now();
            if (now >= lastTime + 1000) {
              document.getElementById('fps').textContent = frames;
              frames = 0;
              lastTime = now;
            }

            if (performance.memory) {
              const memMB = (performance.memory.usedJSHeapSize / 1048576).toFixed(2);
              document.getElementById('memory').textContent = memMB;

              if (performance.memory.usedJSHeapSize > perfOptimizer.memoryThreshold) {
                perfOptimizer.triggerGarbageCollection();
              }
            }

            const files = Object.keys(state.fileSystem).filter(
              k => state.fileSystem[k].type === 'file'
            );
            document.getElementById('fileCount').textContent = files.length;

            const lines = files.reduce(
              (sum, k) => sum + (state.fileSystem[k].content?.split('\n').length || 0),
              0
            );
            document.getElementById('lineCount').textContent = lines;
          }, 100);
        } else {
          clearInterval(perfInterval);
        }
      }

      window.showPerfMetrics = () => {
        const metrics = perfOptimizer.getMetrics();
        console.log('📊 Performance Metrics:', metrics);
        alert(JSON.stringify(metrics, null, 2));
      };

      const plugins = [

      ];

        featureExpansions.renderPluginMarketplace('output');

      function connectAPI(service) {
        const apis = {
          prettier: { name: 'Prettier', icon: '✨' },
          eslint: { name: 'ESLint', icon: '🔍' },
          github: { name: 'GitHub', icon: '🐙' },

        addOutput(`${api.icon} Connecting to ${api.name}...`, 'log');

      }

      function togglePanel() {
        const panel = document.getElementById('panel');
        panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
      }

      function newFile() {

      function showWelcome() {
        const div = document.createElement('div');
        div.className = 'welcome-screen';
        div.innerHTML = `
        <div class="welcome-content">
          <h2>Welcome to HOOTNER</h2>
          <p style="font-size:18px; margin:20px 0; color:#ccc;">The most powerful in-browser code editor.</p>
          <p>Multi-tab • Nested folders • Auto-save • Export ZIP • VS Code feel</p>
          <button style="margin-top:32px; padding:14px 40px; background:#007acc; color:white; border:none; border-radius:10px; font-size:18px; cursor:pointer;"
                  onclick="this.parentElement.parentElement.remove(); localStorage.setItem('hootner_welcomed','true')">
            Start Coding 🚀
          </button>
        </div>`;
        document.body.appendChild(div);
      }

      async function saveState() {
        const stateData = {
          fileSystem: state.fileSystem,
          currentFile: state.currentFile,
          openTabs: state.openTabs,
          expandedFolders: [...state.expandedFolders],
          originalContent: state.originalContent,
        };

        localStorage.setItem('hootner_state', JSON.stringify(stateData));

        // Auto-encrypt backup if password is set
        const password = localStorage.getItem('hootner_backup_password');
        if (password) {
          try {
            await securityCompliance.encryptBackup(password);
          } catch (error) {
            console.warn('Auto-backup encryption failed:', error);
          }
        }

        securityCompliance.logAudit('state_saved', {
          files: Object.keys(state.fileSystem).length,
        });
      }

      function loadState() {
        const saved = localStorage.getItem('hootner_state');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            Object.assign(state, data);
            state.expandedFolders = new Set(data.expandedFolders || []);
            state.unsavedChanges = new Set();
          } catch (e) {
            console.error('Failed to load state', e);
            if (errorHandler) {
              errorHandler.handleError({
                type: 'file',
                message: 'Failed to load saved state',
                error: e,
              });
            }
          }
        }
      }

      // Cleanup on page unload
      window.addEventListener('beforeunload', () => {
        if (lspClient) lspClient.disconnectAll();
        if (perfOptimizer) perfOptimizer.stopMemoryMonitoring();
        if (rendererManager) rendererManager.terminateAll();
      });

      // Periodic cache clearing
      setInterval(() => {
        if (perfOptimizer && performance.memory) {
          const sessionTime = performance.now() / 1000 / 60;
          if (sessionTime > 30) {
            perfOptimizer.clearCache();
            console.log('🧹 Periodic cache clear (30min session)');
          }
        }
      }, 600000);

      Promise.all(criticalModules.map(m => lazyLoader.loadModule(m.name, m.path))).then(() => {
        console.log(`⚡ Startup: ${lazyLoader.getStartupTime().toFixed(2)}ms`);

        lazyLoader.loadOnDemand(lazyModules);

    <script>

      document.body.insertAdjacentHTML(

    `
      );

      const commandPalette = {
        visible: false,
        commands: [
          { name: 'Git: Commit', cmd: 'git commit' },
          { name: 'Git: Switch Branch', cmd: 'git branch' },
          { name: 'Git: View Log', cmd: 'git log' },

          { name: 'Security: Export Audit Logs', cmd: 'audit export' },
          { name: 'Security: Encrypt Backup', cmd: 'encrypt backup' },
          { name: 'Security: Set Role', cmd: 'set role' },
          { name: 'Security: Status', cmd: 'security status' },
          { name: 'Integration: Video Preview', cmd: 'video preview' },
          { name: 'Integration: Open Marketplace', cmd: 'open marketplace' },
          { name: 'Integration: Open Dashboard', cmd: 'open dashboard' },
          { name: 'Integration: Share to Social', cmd: 'share social' },
          { name: 'Integration: Sync Analytics', cmd: 'sync analytics' },
          { name: 'AI: Open Agent Panel', cmd: 'ai panel' },
          { name: 'AI: Refactor with Agents', cmd: 'ai refactor' },
          { name: 'AI: Debug with Agents', cmd: 'ai debug' },
          { name: 'AI: Optimize with Agents', cmd: 'ai optimize' },
          { name: 'Cursor: Chat Mode (Ctrl+K)', cmd: 'cursor chat' },
          { name: 'Cursor: Write Mode (Ctrl+L)', cmd: 'cursor write' },
          { name: 'Cursor: Refactor Mode', cmd: 'cursor refactor' },
          { name: 'Cursor: Modernize to TypeScript', cmd: 'cursor modernize' },
          { name: 'Collab: Start Session', cmd: 'collab start' },
          { name: 'Collab: Join Session', cmd: 'collab join' },
          { name: 'Collab: Disconnect', cmd: 'collab disconnect' },
          { name: 'Performance: Memory Report', cmd: 'perf memory' },
          { name: 'Performance: Clear Cache', cmd: 'perf clear' },
          { name: 'Designer: Open Visual Designer', cmd: 'designer open' },
          { name: 'Debug: Add Breakpoint', cmd: 'debug breakpoint' },
          { name: 'Debug: Snooze Suggestion', cmd: 'debug snooze' },
          { name: 'Debug: Export Sessions', cmd: 'debug export' },
          { name: 'Sustainability: Energy Report', cmd: 'sustain report' },
          { name: 'Compliance: AI Ethics Audit', cmd: 'comply ai' },
          { name: 'Compliance: GDPR Audit', cmd: 'comply gdpr' },
          { name: 'Compliance: Export Report', cmd: 'comply export' },
        ],

        toggle() {
          this.visible = !this.visible;
          const palette = document.getElementById('commandPalette');
          palette.style.display = this.visible ? 'block' : 'none';
          if (this.visible) document.getElementById('commandInput').focus();
        },

        async execute(cmd) {
          if (cmd === 'compliance report') {
            featureExpansions.generateComplianceReport();
          } else if (cmd === 'audit export') {
            const format = prompt('Export format (csv/json):', 'csv');
            if (format === 'csv') {
              securityCompliance.exportLogsCSV();
            } else {
              securityCompliance.exportLogsJSON();
            }
          } else if (cmd === 'encrypt backup') {
            const password = prompt('Enter backup password:');
            if (password) {
              await securityCompliance.encryptBackup(password);
              localStorage.setItem('hootner_backup_password', password);
              addOutput('✓ Backup encrypted', 'success');
            }
          } else if (cmd === 'set role') {
            const role = prompt('Enter role (admin/editor/viewer/guest):', 'viewer');
            try {
              securityCompliance.setUserRole(role);
              addOutput(`✓ Role set to: ${role}`, 'success');
              location.reload();
            } catch (error) {
              addOutput(`✗ ${error.message}`, 'error');
            }
          } else if (cmd === 'security status') {
            const status = securityCompliance.getSecurityStatus();
            addOutput(JSON.stringify(status, null, 2), 'log');
          } else if (cmd === 'video preview') {
            const url = prompt('Enter video URL:');
            if (url) crossIntegration.embedVideoPreview(url);
          } else if (cmd === 'open marketplace') {
            crossIntegration.openMarketplace();
          } else if (cmd === 'open dashboard') {
            crossIntegration.openDashboard();
          } else if (cmd === 'share social') {
            const code = editor.getValue();
            const desc = prompt('Description:');
            if (desc) crossIntegration.shareToSocialFeed(code, desc);
          } else if (cmd === 'sync analytics') {
            crossIntegration.syncAnalytics();
          } else if (cmd === 'ai panel') {
            if (window.aiAgentUI) window.aiAgentUI.toggle();
          } else if (cmd === 'ai refactor') {
            if (window.aiAgentUI) window.aiAgentUI.quickAction('refactor');
          } else if (cmd === 'ai debug') {
            if (window.aiAgentUI) window.aiAgentUI.quickAction('debug');
          } else if (cmd === 'ai optimize') {
            if (window.aiAgentUI) window.aiAgentUI.quickAction('optimize');
          } else if (cmd === 'cursor chat') {
            if (window.cursorUI) window.cursorUI.setMode('chat');
          } else if (cmd === 'cursor write') {
            if (window.cursorUI) window.cursorUI.setMode('write');
          } else if (cmd === 'cursor refactor') {
            if (window.cursorUI) window.cursorUI.setMode('refactor');
          } else if (cmd === 'cursor modernize') {
            if (window.cursorUI) window.cursorUI.setMode('modernize');
          } else if (cmd === 'collab start') {
            if (!window.collabSession) {
              window.collabSession = new RealtimeCollaboration(editor);
              window.collabSession.connect();
              addOutput('✓ Collaboration started', 'success');
            }
          } else if (cmd === 'collab join') {
            const roomId = prompt('Enter room ID:');
            if (roomId && !window.collabSession) {
              window.collabSession = new RealtimeCollaboration(editor);
              window.collabSession.connect();
            }
          } else if (cmd === 'collab disconnect') {
            if (window.collabSession) {
              window.collabSession.disconnect();
              window.collabSession = null;
              addOutput('✓ Disconnected', 'success');
            }
          } else if (cmd === 'perf memory') {
            if (window.memoryProfiler) {
              const report = window.memoryProfiler.getReport();
              addOutput(JSON.stringify(report, null, 2), 'log');
            }
          } else if (cmd === 'perf clear') {
            if (window.memoryProfiler) {
              await window.memoryProfiler.clearCache();
              addOutput('✓ Cache cleared', 'success');
            }
          } else if (cmd === 'designer open') {
            if (window.visualDesigner) window.visualDesigner.open();
          } else if (cmd === 'debug breakpoint') {
            const line = prompt('Line number:');
            if (line && window.debugEnhancer) {
              window.debugEnhancer.addBreakpoint(state.currentFile, parseInt(line));
              addOutput(`✓ Breakpoint added at line ${line}`, 'success');
            }
          } else if (cmd === 'debug snooze') {
            const suggestion = prompt('Suggestion to snooze:');
            if (suggestion && window.debugEnhancer) {
              window.debugEnhancer.snoozeSuggestion(suggestion);
              addOutput('✓ Suggestion snoozed for 1 hour', 'success');
            }
          } else if (cmd === 'debug export') {
            if (window.debugEnhancer) {
              const sessions = window.debugEnhancer.exportSessions();
              addOutput(JSON.stringify(sessions, null, 2), 'log');
            }
          } else if (cmd === 'sustain report') {
            if (window.sustainabilityMonitor) {
              const report = window.sustainabilityMonitor.getReport();
              addOutput(JSON.stringify(report, null, 2), 'log');
            }
          } else if (cmd === 'comply ai') {
            if (window.complianceDashboard) {
              const report = window.complianceDashboard.generateReport('AI_ETHICS');
              addOutput(
                `AI Ethics Score: ${report.score.toFixed(1)}%\n${JSON.stringify(report.checks, null, 2)}`,
                'log'
              );
            }
          } else if (cmd === 'comply gdpr') {
            if (window.complianceDashboard) {
              const report = window.complianceDashboard.generateReport('GDPR');
              addOutput(
                `GDPR Score: ${report.score.toFixed(1)}%\n${JSON.stringify(report.checks, null, 2)}`,
                'log'
              );
            }
          } else if (cmd === 'comply export') {
            if (window.complianceDashboard) {
              const report = window.complianceDashboard.exportReport('json');
              addOutput(report, 'log');
            }
          } else {
            featureExpansions.executeCommand(cmd);
          }
          this.toggle();
        },
      };

      document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'P') {
          e.preventDefault();
          commandPalette.toggle();
        }
      });

      document.getElementById('commandInput')?.addEventListener('input', e => {
        const query = e.target.value.toLowerCase();
        const filtered = commandPalette.commands.filter(c => c.name.toLowerCase().includes(query));
        document.getElementById('commandResults').innerHTML = filtered
          .map(
            c =>
              `<div style="padding:12px; cursor:pointer; border-bottom:1px solid var(--border);" 
              onmouseover="this.style.background='var(--hover)'" 
              onmouseout="this.style.background='transparent'"
              onclick="commandPalette.execute('${c.cmd}')">
          <strong>${c.name}</strong>
        </div>`
          )
          .join('');
      });

      // Auto-update preview on change
      if (editor) {
        editor.onDidChangeModelContent(() => {
          if (document.getElementById('previewPane')) {
            updatePreview();
          }
        });
      }
    </script>
