AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  HOOTNER Unified Platform - Complete Infrastructure Full-stack video streaming platform with authentication, subscriptions, and AI services

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs18.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: production
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment

  JWTSecret:
    Type: String
    NoEcho: true
    Description: Secret key for JWT token generation
    Default: change-me-in-production-use-secrets-manager

  CognitoDomain:
    Type: String
    Default: hootner-auth
    Description: Cognito domain prefix

Metadata:
  AWS::ServerlessRepo::Application:
    Name: hootner-platform
    Description: Enterprise video streaming platform with AI integration
    Author: HOOTNER
    SpdxLicenseId: MIT
    LicenseUrl: LICENSE
    ReadmeUrl: README.md
    Labels:
      - video
      - streaming
      - ai
      - platform
    HomePageUrl: https://github.com/hootner/enterprise-platform
    SemanticVersion: 1.0.0
    SourceCodeUrl: https://github.com/hootner/enterprise-platform

Resources:
  # ==================== COGNITO AUTHENTICATION ====================

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub hootner-users-${Environment}
      MfaConfiguration: OPTIONAL
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: name
          Required: true
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        Application: HOOTNER
        Environment: !Ref Environment

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub hootner-client-${Environment}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 7
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        RefreshToken: days
        AccessToken: hours
        IdToken: hours

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${CognitoDomain}-${AWS::AccountId}
      UserPoolId: !Ref UserPool

  # ==================== DYNAMODB TABLES ====================

  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hootner-${Environment}
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hootner-sessions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hootner-analytics-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: videoId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: 'N'
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: videoId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SessionIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  # ==================== S3 BUCKETS ====================

  VideosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-videos-${AWS::AccountId}-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-uploads-${AWS::AccountId}-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTempUploads
            Status: Enabled
            ExpirationInDays: 7
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt VideoProcessorFunction.Arn
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-frontend-${AWS::AccountId}-${Environment}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  # ==================== IAM ROLES ====================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub hootner-lambda-execution-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt MainTable.Arn
                  - !Sub ${MainTable.Arn}/index/*
                  - !GetAtt SessionsTable.Arn
                  - !Sub ${SessionsTable.Arn}/index/*
                  - !GetAtt AnalyticsTable.Arn
                  - !Sub ${AnalyticsTable.Arn}/index/*
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt VideosBucket.Arn
                  - !Sub ${VideosBucket.Arn}/*
                  - !GetAtt UploadsBucket.Arn
                  - !Sub ${UploadsBucket.Arn}/*
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:ListUsers
                Resource: !GetAtt UserPool.Arn

  # ==================== API GATEWAY ====================

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - content-type
          - authorization
          - x-api-key
          - x-csrf-token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 3600
        AllowCredentials: true
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              audience:
                - !Ref UserPoolClient
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}

  # ==================== LAMBDA FUNCTIONS ====================

  GraphQLFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hootner-graphql-${Environment}
      CodeUri: api/graphql/
      Handler: server.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MainTable
          SESSIONS_TABLE: !Ref SessionsTable
          ANALYTICS_TABLE: !Ref AnalyticsTable
          JWT_SECRET: !Ref JWTSecret
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          VIDEOS_BUCKET: !Ref VideosBucket
          ENVIRONMENT: !Ref Environment
      Events:
        GraphQLApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /graphql
            Method: POST
        GraphQLApiGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /graphql
            Method: GET
      Tracing: Active
      Tags:
        Application: HOOTNER
        Environment: !Ref Environment

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hootner-auth-${Environment}
      CodeUri: api/graphql/
      Handler: routes/auth.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MainTable
          SESSIONS_TABLE: !Ref SessionsTable
          JWT_SECRET: !Ref JWTSecret
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          ENVIRONMENT: !Ref Environment
      Events:
        Register:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/register
            Method: POST
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/login
            Method: POST
        Logout:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/logout
            Method: POST
        Refresh:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/refresh
            Method: POST
        Verify:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/verify
            Method: POST
      Tracing: Active

  VideoProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hootner-video-processor-${Environment}
      CodeUri: services/video-generation/
      Handler: lambda-handler.handler
      Runtime: python3.11
      Timeout: 900
      MemorySize: 3008
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MainTable
          VIDEOS_BUCKET: !Ref VideosBucket
          ANALYTICS_TABLE: !Ref AnalyticsTable
          ENVIRONMENT: !Ref Environment
      Events:
        VideoApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/videos/{proxy+}
            Method: ANY
      Tracing: Active

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hootner-analytics-${Environment}
      CodeUri: api/graphql/
      Handler: routes/analytics.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          ANALYTICS_TABLE: !Ref AnalyticsTable
          TABLE_NAME: !Ref MainTable
          ENVIRONMENT: !Ref Environment
      Events:
        TrackEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/analytics/track
            Method: POST
        GetAnalytics:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/analytics/{videoId}
            Method: GET
      Tracing: Active

  MarketplaceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hootner-marketplace-${Environment}
      CodeUri: api/graphql/
      Handler: routes/marketplace.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MainTable
          ENVIRONMENT: !Ref Environment
      Events:
        GetProducts:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/marketplace
            Method: GET
        CreateProduct:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/marketplace
            Method: POST
      Tracing: Active

  MessagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hootner-messages-${Environment}
      CodeUri: api/graphql/
      Handler: routes/messages.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MainTable
          ENVIRONMENT: !Ref Environment
      Events:
        GetMessages:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/messages
            Method: GET
        SendMessage:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/messages
            Method: POST
      Tracing: Active

  # ==================== LAMBDA PERMISSIONS ====================

  UploadsBucketPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt VideoProcessorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt UploadsBucket.Arn

  # ==================== CLOUDFRONT ====================

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub HOOTNER CDN - ${Environment}
        DefaultRootObject: index.html
        Origins:
          - Id: S3-Frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
          - Id: S3-Videos
            DomainName: !GetAtt VideosBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
          - Id: API-Gateway
            DomainName: !Sub ${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3-Frontend
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
        CacheBehaviors:
          - PathPattern: /videos/*
            TargetOriginId: S3-Videos
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: false
            Compress: true
            MinTTL: 0
            DefaultTTL: 3600
            MaxTTL: 86400
          - PathPattern: /api/*
            TargetOriginId: API-Gateway
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: all
            Compress: true
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
          - PathPattern: /graphql
            TargetOriginId: API-Gateway
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: all
            Compress: true
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub HOOTNER OAI - ${Environment}

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  VideosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideosBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${VideosBucket.Arn}/*

  # ==================== MONITORING & ALARMS ====================

  ErrorAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub hootner-errors-${Environment}
      DisplayName: HOOTNER Error Notifications
      Tags:
        - Key: Application
          Value: HOOTNER
        - Key: Environment
          Value: !Ref Environment

  GraphQLErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub hootner-graphql-errors-${Environment}
      AlarmDescription: GraphQL function errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref GraphQLFunction
      AlarmActions:
        - !Ref ErrorAlarmTopic

  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub hootner-api-latency-${Environment}
      AlarmDescription: API Gateway high latency
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      AlarmActions:
        - !Ref ErrorAlarmTopic

# ==================== OUTPUTS ====================

Outputs:
  # API Endpoints
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  GraphQLEndpoint:
    Description: GraphQL API endpoint
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/graphql
    Export:
      Name: !Sub ${AWS::StackName}-GraphQLEndpoint

  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontURL

  # Authentication
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  CognitoLoginUrl:
    Description: Cognito Hosted UI Login URL
    Value: !Sub https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&redirect_uri=https://${CloudFrontDistribution.DomainName}

  # Storage
  VideosBucketName:
    Description: S3 bucket for videos
    Value: !Ref VideosBucket
    Export:
      Name: !Sub ${AWS::StackName}-VideosBucket

  UploadsBucketName:
    Description: S3 bucket for uploads
    Value: !Ref UploadsBucket
    Export:
      Name: !Sub ${AWS::StackName}-UploadsBucket

  FrontendBucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${AWS::StackName}-FrontendBucket

  # Database
  MainTableName:
    Description: Main DynamoDB table
    Value: !Ref MainTable
    Export:
      Name: !Sub ${AWS::StackName}-MainTable

  SessionsTableName:
    Description: Sessions DynamoDB table
    Value: !Ref SessionsTable
    Export:
      Name: !Sub ${AWS::StackName}-SessionsTable

  AnalyticsTableName:
    Description: Analytics DynamoDB table
    Value: !Ref AnalyticsTable
    Export:
      Name: !Sub ${AWS::StackName}-AnalyticsTable

  # Monitoring
  ErrorAlarmTopicArn:
    Description: SNS topic for error notifications
    Value: !Ref ErrorAlarmTopic
    Export:
      Name: !Sub ${AWS::StackName}-ErrorAlarmTopic

  # Quick Start Commands
  DeploymentInfo:
    Description: Deployment information and next steps
    Value: !Sub |
      HOOTNER Platform Successfully Deployed!

      Environment: ${Environment}
      Region: ${AWS::Region}

      🌐 Access URLs:
      - Frontend: https://${CloudFrontDistribution.DomainName}
      - GraphQL API: https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/graphql
      - Auth Login: https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login

      📦 Next Steps:
      1. Upload frontend: aws s3 sync apps/frontend/dist s3://${FrontendBucket}
      2. Configure environment variables in your local .env file
      3. Test authentication: Visit the Cognito login URL
      4. Deploy video processing: Ensure Python dependencies are built

      📊 Monitoring:
      - CloudWatch Dashboard: https://console.aws.amazon.com/cloudwatch
      - Lambda Logs: https://console.aws.amazon.com/lambda
      - Error Notifications: Check email subscribed to ${ErrorAlarmTopic}