AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HOOTNER - Enterprise Video Streaming Platform

Parameters:
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: sk_test_placeholder

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 1024
    Timeout: 30
    Environment:
      Variables:
        TABLE_NAME: !Ref HootnerTable
        JWT_SECRET_ARN: !Ref JWTSecret
        STRIPE_SECRET_ARN: !Ref StripeSecret

Resources:
  HootnerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: '''*'''
        AllowHeaders: '''*'''
        AllowOrigin: '''*'''

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: hootner-api-key
      Enabled: true

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref HootnerApi
          Stage: prod
      Throttle:
        RateLimit: 400
        BurstLimit: 500

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/jwt
      GenerateSecretString:
        PasswordLength: 64

  StripeSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: hootner/stripe
      SecretString: !Sub '{"key":"${StripeSecretKey}"}'

  HootnerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hootner-activities
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  GraphQLFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/graphql/
      Handler: lambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HootnerTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref JWTSecret
                - !Ref StripeSecret
      Events:
        GraphQL:
          Type: Api
          Properties:
            RestApiId: !Ref HootnerApi
            Path: /graphql
            Method: ANY
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref HootnerApi
            Path: /api/{proxy+}
            Method: ANY

  VideoStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-videos-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - '*'

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-uploads-${AWS::AccountId}

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hootner-frontend-${AWS::AccountId}

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: Hootner OAI

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  CloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3
            DomainName: !GetAtt FrontendBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
          - Id: API
            DomainName: !Sub ${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        CacheBehaviors:
          - PathPattern: /graphql
            TargetOriginId: API
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            ForwardedValues:
              QueryString: true
              Headers:
                - '*'
            MinTTL: 0
          - PathPattern: /api/*
            TargetOriginId: API
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            ForwardedValues:
              QueryString: true
              Headers:
                - '*'
            MinTTL: 0

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: hootner-users
      AutoVerifiedAttributes:
        - email

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: hootner-web
      GenerateSecret: false

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: hootner-dlq

  VideoProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: hootner-video-processing
      VisibilityTimeout: 900
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: hootner-notifications

  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hootner-api-errors
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref NotificationTopic

Outputs:
  GraphQLEndpoint:
    Value: !Sub https://${HootnerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/graphql
  ApiKey:
    Value: !Ref ApiKey
  CloudFrontURL:
    Value: !GetAtt CloudFront.DomainName
  UserPoolId:
    Value: !Ref UserPool