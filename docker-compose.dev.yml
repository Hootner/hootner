# HOOTNER Development Environment
# DynamoDB Local + Redis for local development

version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: hootner-dynamodb-dev
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - dynamodb_dev_data:/data
    networks:
      - hootner-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hootner-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --requirepass dev_redis_password
    volumes:
      - redis_dev_data:/data
    networks:
      - hootner-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "dev_redis_password", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  hootner-dev:
    driver: bridge

volumes:
  dynamodb_dev_data:
  redis_dev_data:
