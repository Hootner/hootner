version: '3.8'

networks:
  backend:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: fd00::/64
  frontend:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.21.0.0/16
        - subnet: fd01::/64

services:
  web-hootner-app:
    build:
      context: .
      dockerfile: Dockerfile
      shm_size: '256mb'
    ports:
      - '10.182.75.69:5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - LOG_LEVEL=info
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SERVICE_TOKEN=${SERVICE_TOKEN:?SERVICE_TOKEN is required}
    volumes:
      - ./apps:/app/apps
      - ./logs:/app/logs
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', 'healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '10.182.75.69:3000:3000'
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://web-hootner-app:5000
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - web-hootner-app

  worker-agent:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    deploy:
      replicas: 2
    depends_on:
      - redis

  mongodb:
    image: mongo:7-jammy
    command: mongod --auth --bind_ip_all --tlsMode requireTLS --tlsCertificateKeyFile /etc/ssl/mongodb.pem --logpath /var/log/mongodb/mongod.log --logappend
    ports:
      - '127.0.0.1:27017:27017'
    networks:
      - backend
    environment:
      - MONGO_INITDB_DATABASE=web-hootner-app-dev
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?Password required}
    volumes:
      - mongodb_data:/data/db
      - ./logs/mongodb:/var/log/mongodb
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'mongosh --eval ''db.adminCommand("ping")'' || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?Password required} --tls-port 6380 --port 0 --tls-cert-file /etc/ssl/redis.crt --tls-key-file /etc/ssl/redis.key --tls-ca-cert-file /etc/ssl/ca.crt --loglevel warning --logfile /var/log/redis/redis.log
    ports:
      - '127.0.0.1:6380:6380'
    networks:
      - backend
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services/auth-service
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SERVICE_TOKEN=${SERVICE_TOKEN:?SERVICE_TOKEN is required}
    depends_on:
      - mongodb
      - redis

  video-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services/video-service
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services/analytics-service
    ports:
      - '3003:3003'
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  audit-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services
    ports:
      - '3004:3004'
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  content-moderation-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services
    ports:
      - '3005:3005'
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  event-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services/event-service
    ports:
      - '3006:3006'
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb
      - redis

  marketplace-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services
    ports:
      - '3007:3007'
    environment:
      - NODE_ENV=development
      - PORT=3007
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  profile-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services
    ports:
      - '3008:3008'
    environment:
      - NODE_ENV=development
      - PORT=3008
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  search-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services
    ports:
      - '3009:3009'
    environment:
      - NODE_ENV=development
      - PORT=3009
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  security-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services
    ports:
      - '3010:3010'
    environment:
      - NODE_ENV=development
      - PORT=3010
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb

  subscription-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services/subscription-service
    ports:
      - '3011:3011'
    environment:
      - NODE_ENV=development
      - PORT=3011
      - LOG_LEVEL=debug
      - SENTRY_DSN=${SENTRY_DSN:-}
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', 'healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: ./services/notification-service
    ports:
      - '3012:3012'
    environment:
      - NODE_ENV=development
      - PORT=3012
      - DATABASE_URL=mongodb://mongodb:27017/web-hootner-app-dev
    depends_on:
      - mongodb
      - redis

  backup-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - '3016:3013'
    environment:
      - NODE_ENV=development
      - PORT=3013
      - BACKUP_BUCKET=hootner-backups
      - S3_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - RETENTION_DAYS=30
    volumes:
      - ./services/backup-service.js:/app/backup-service.js
      - backup_data:/backups
    depends_on:
      - mongodb
      - redis
      - localstack
    restart: unless-stopped

  backup-monitoring:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - '3014:3014'
    environment:
      - NODE_ENV=development
      - PORT=3014
      - SLACK_WEBHOOK=${SLACK_WEBHOOK}
      - ALERT_EMAIL=${ALERT_EMAIL}
    volumes:
      - ./services/backup-monitoring-service.js:/app/backup-monitoring-service.js
      - backup_data:/backups
    depends_on:
      - backup-service
    restart: unless-stopped

  compliance-reporter:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - '3015:3015'
    environment:
      - NODE_ENV=development
      - PORT=3015
    volumes:
      - ./services/compliance-reporter.js:/app/compliance-reporter.js
      - backup_data:/backups
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    ports:
      - '4566:4566'
    environment:
      - SERVICES=s3,dynamodb,sqs,sns,lambda,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=${DOCKER_HOST:-unix:///var/run/docker.sock}
      - LAMBDA_EXECUTOR=local
      - LOG_LEVEL=warning
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs/localstack:/var/log/localstack
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:4566/_localstack/health || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - '127.0.0.1:3013:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?Admin user required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Admin password required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://localhost:3013
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/ssl/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/ssl/grafana.key
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=true
      - GF_SECURITY_X_XSS_PROTECTION=true
    networks:
      - backend
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

  monitoring-service:
    build:
      context: ./services
      dockerfile: ../Dockerfile.monitoring
    ports:
      - '3012:3012'
    environment:
      - NODE_ENV=development
      - PORT=3012
    restart: unless-stopped



volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  backup_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
